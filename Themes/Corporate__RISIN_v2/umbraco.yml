  - alias: relacoesInstitucionais
    name: "Relacoes Institucionais"
    path: RelacoesInstitucionais.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
          /* ── Hero ── */
          .ri-hero { position: relative; background: linear-gradient(135deg,#1F2937,#111827); padding: var(--risin-section-py) 0; overflow: hidden; }
          .ri-hero .grid-bg { position: absolute; inset: 0; opacity: 0.07; background-image: linear-gradient(rgba(5,150,105,0.5) 1px,transparent 1px),linear-gradient(90deg,rgba(5,150,105,0.5) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .ri-hero .g-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .ri-hero .orb-g { position: absolute; top: -80px; right: 80px; width: 400px; height: 400px; background: rgba(5,150,105,0.08); border-radius: 50%; filter: blur(80px); pointer-events: none; }
          .ri-hc { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; text-align: center; }
          .ri-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.06); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.3); border-radius: 9999px; margin-bottom: 24px; }
          .ri-badge svg { width: 16px; height: 16px; color: #34D399; }
          .ri-badge span { font-size: 14px; font-weight: 500; color: #34D399; }
          .ri-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: white; line-height: 1.15; margin-bottom: 20px; }
          .ri-hero h1 .grad { background: linear-gradient(90deg,#34D399,#67E8F9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .ri-hero p { font-size: 18px; color: rgba(255,255,255,0.7); max-width: 680px; margin: 0 auto 40px; line-height: 1.7; }
          .ri-channels { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
          .ri-ch { padding: 8px 18px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--risin-radius-lg); font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8); }
          @@media (max-width: 640px) { .ri-hero h1 { font-size: 32px; } }

          /* ── Shared ── */
          .ri-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .ri-sec-hd { text-align: center; margin-bottom: 48px; }
          .ri-sec-hd h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .ri-sec-hd h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .ri-sec-hd p { color: var(--risin-text-muted); max-width: 640px; margin: 0 auto; line-height: 1.7; }

          /* ── Audiências ── */
          .ri-aud { background: white; padding: var(--risin-section-py) 0; }
          .ri-aud-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 32px; }
          .ri-aud-card { border: 1px solid var(--risin-border); border-radius: var(--risin-radius-2xl); padding: 36px; transition: all var(--risin-transition); position: relative; overflow: hidden; }
          .ri-aud-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
          .ri-aud-card:nth-child(1)::before,.ri-aud-card:nth-child(3)::before { background: linear-gradient(90deg,#059669,#047857); }
          .ri-aud-card:nth-child(2)::before,.ri-aud-card:nth-child(4)::before { background: linear-gradient(90deg,#0891B2,#0369A1); }
          .ri-aud-card:hover { box-shadow: var(--risin-shadow-2xl); transform: translateY(-4px); }
          .ri-aud-icon { width: 60px; height: 60px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
          .ri-aud-icon svg { width: 30px; height: 30px; color: white; }
          .ri-aud-card h3 { font-size: 20px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .ri-aud-card p { font-size: 15px; color: var(--risin-text-muted); line-height: 1.7; margin: 0 0 20px; }
          .ri-aud-items { display: flex; flex-direction: column; gap: 8px; }
          .ri-aud-li { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; color: var(--risin-text-muted); line-height: 1.5; }
          .ri-aud-li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: linear-gradient(135deg,#059669,#0891B2); flex-shrink: 0; margin-top: 4px; }
          @@media (max-width: 768px) { .ri-aud-grid { grid-template-columns: 1fr; } }

          /* ── Proposta de Valor ── */
          .ri-val { background: var(--risin-bg-lighter); padding: var(--risin-section-py) 0; position: relative; overflow: hidden; }
          .ri-val .top-acc { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .ri-val-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
          .ri-val-card { background: white; border-radius: var(--risin-radius-xl); padding: 28px; border: 1px solid var(--risin-border); box-shadow: var(--risin-shadow); transition: all var(--risin-transition); text-align: center; }
          .ri-val-card:hover { box-shadow: var(--risin-shadow-xl); transform: translateY(-4px); border-color: rgba(5,150,105,0.3); }
          .ri-val-ic { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg,#059669,#0891B2); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
          .ri-val-ic svg { width: 24px; height: 24px; color: white; }
          .ri-val-card h3 { font-size: 16px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 10px; }
          .ri-val-card p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; margin: 0; }
          @@media (max-width: 768px) { .ri-val-grid { grid-template-columns: 1fr; } }

          /* ── Contato Direto ── */
          .ri-cont { background: white; padding: var(--risin-section-py) 0; }
          .ri-cont-inner { background: linear-gradient(135deg,#1F2937,#111827); border-radius: var(--risin-radius-2xl); padding: 56px 48px; display: flex; gap: 64px; align-items: center; position: relative; overflow: hidden; }
          .ri-cont-inner .g-line { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .ri-cont-txt { flex: 1; }
          .ri-cont-txt h2 { font-size: 30px; font-weight: 700; color: white; margin-bottom: 12px; }
          .ri-cont-txt h2 .grad { background: linear-gradient(90deg,#34D399,#67E8F9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .ri-cont-txt p { color: rgba(255,255,255,0.7); line-height: 1.7; margin: 0; font-size: 16px; }
          .ri-cont-btns { display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
          .ri-btn-g { display: inline-flex; align-items: center; gap: 8px; height: 48px; padding: 0 28px; background: linear-gradient(90deg,#059669,#047857); color: white; font-weight: 700; font-size: 15px; border-radius: var(--risin-radius-lg); text-decoration: none; transition: all var(--risin-transition); white-space: nowrap; }
          .ri-btn-g:hover { transform: translateY(-2px); box-shadow: var(--risin-shadow-xl); }
          .ri-btn-o { display: inline-flex; align-items: center; gap: 8px; height: 48px; padding: 0 28px; border: 2px solid rgba(255,255,255,0.25); color: white; font-weight: 600; font-size: 15px; border-radius: var(--risin-radius-lg); text-decoration: none; transition: all var(--risin-transition); white-space: nowrap; }
          .ri-btn-o:hover { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.05); }
          .ri-btn-g svg, .ri-btn-o svg { width: 16px; height: 16px; }
          @@media (max-width: 768px) { .ri-cont-inner { flex-direction: column; gap: 32px; padding: 36px 24px; } .ri-cont-btns { width: 100%; } .ri-btn-g, .ri-btn-o { justify-content: center; } }
      </style>
      <main>

          <section class="ri-hero">
              <div class="grid-bg"></div>
              <div class="g-line"></div>
              <div class="orb-g"></div>
              <div class="ri-hc">
                  <div class="ri-badge">
                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
                      <span>Canal Institucional RISIN</span>
                  </div>
                  <h1>Rela&ccedil;&otilde;es <span class="grad">Institucionais</span></h1>
                  <p>Canal dedicado para investidores, grandes empresas, escrit&oacute;rios de advocacia e parceiros estrat&eacute;gicos que desejam conhecer ou integrar o ecossistema RISIN.</p>
                  <div class="ri-channels">
                      <span class="ri-ch">Investidores</span>
                      <span class="ri-ch">Grandes Empresas</span>
                      <span class="ri-ch">Escrit&oacute;rios de Advocacia</span>
                      <span class="ri-ch">Conselheiros</span>
                      <span class="ri-ch">Franqueados</span>
                  </div>
              </div>
          </section>

          <section class="ri-aud">
              <div class="ri-wrap">
                  <div class="ri-sec-hd">
                      <h2>Para Quem &eacute; este <span class="grad">Canal</span></h2>
                      <p>Canais estruturados de di&aacute;logo para cada perfil institucional, com informa&ccedil;&otilde;es completas e contato direto com a lideran&ccedil;a da RISIN.</p>
                  </div>
                  <div class="ri-aud-grid">
                      <div class="ri-aud-card">
                          <div class="ri-aud-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>
                          </div>
                          <h3>Para Investidores</h3>
                          <p>A RISIN oferece oportunidades de investimento em um modelo de neg&oacute;cio validado, com governan&ccedil;a corporativa desde o dia zero e receita recorrente estruturada.</p>
                          <div class="ri-aud-items">
                              <div class="ri-aud-li">Capital social de R$&nbsp;510.000 &mdash; estrutura formal desde 2013</div>
                              <div class="ri-aud-li">4 fontes de receita independentes e recorrentes</div>
                              <div class="ri-aud-li">Potencial de escala: 478 regionais &times; 5.000+ vagas</div>
                              <div class="ri-aud-li">ERP com relat&oacute;rios financeiros em tempo real</div>
                              <div class="ri-aud-li">Auditoria independente e Conselho Consultivo ativo</div>
                          </div>
                      </div>
                      <div class="ri-aud-card">
                          <div class="ri-aud-icon" style="background:linear-gradient(135deg,#0891B2,#0369A1)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
                          </div>
                          <h3>Para Grandes Empresas</h3>
                          <p>Parcerias corporativas estruturadas com acesso a um ecossistema de 5.000+ empresas ativas, integra&ccedil;&atilde;o tecnol&oacute;gica e visibilidade premium em toda a rede.</p>
                          <div class="ri-aud-items">
                              <div class="ri-aud-li">Acesso como fornecedor preferencial do ecossistema</div>
                              <div class="ri-aud-li">Visibilidade em 8 plataformas integradas</div>
                              <div class="ri-aud-li">Contratos claros com SLA e comprometimentos institucionais</div>
                              <div class="ri-aud-li">Oportunidade de co-branding e patrocinador regional</div>
                              <div class="ri-aud-li">Expans&atilde;o proporcional ao crescimento da rede</div>
                          </div>
                      </div>
                      <div class="ri-aud-card">
                          <div class="ri-aud-icon" style="background:linear-gradient(135deg,#059669,#0891B2)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v17.25m0 0c-1.472 0-2.882.265-4.185.75M12 20.25c1.472 0 2.882.265 4.185.75M18.75 4.97A48.416 48.416 0 0012 4.5c-2.291 0-4.545.16-6.75.47m13.5 0c1.01.143 2.01.317 3 .52m-3-.52l2.62 10.726c.122.499-.106 1.028-.589 1.202a5.988 5.988 0 01-2.031.352"/></svg>
                          </div>
                          <h3>Escrit&oacute;rios Jur&iacute;dicos</h3>
                          <p>Oportunidade de parceria como conselheiro jur&iacute;dico do ecossistema ou integrador de compliance para os 5.000+ operadores ativos da rede.</p>
                          <div class="ri-aud-items">
                              <div class="ri-aud-li">Parceria na categoria Jur&iacute;dico do Programa de Parceiros</div>
                              <div class="ri-aud-li">Compensa&ccedil;&atilde;o estruturada conforme Regulamento Interno</div>
                              <div class="ri-aud-li">Acesso a base de clientes do ecossistema</div>
                              <div class="ri-aud-li">Possibilidade de assento no Conselho Consultivo</div>
                          </div>
                      </div>
                      <div class="ri-aud-card">
                          <div class="ri-aud-icon" style="background:linear-gradient(135deg,#047857,#059669)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
                          </div>
                          <h3>Franqueados &amp; Operadores Regionais</h3>
                          <p>Empreendedores que desejam operar uma regional RISIN com o modelo validado nas regionais modelo, suporte completo e marca estabelecida.</p>
                          <div class="ri-aud-items">
                              <div class="ri-aud-li">Investimento de R$&nbsp;100.000 por regional</div>
                              <div class="ri-aud-li">Infraestrutura, sistemas e treinamento fornecidos</div>
                              <div class="ri-aud-li">Royalties sobre receita bruta com modelo transparente</div>
                              <div class="ri-aud-li">478 regionais dispon&iacute;veis em todo o Brasil</div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="ri-val">
              <div class="top-acc"></div>
              <div class="ri-wrap">
                  <div class="ri-sec-hd">
                      <h2>Por que <span class="grad">RISIN</span></h2>
                      <p>Diferenciais competitivos que tornam o ecossistema RISIN uma oportunidade &uacute;nica para parcerias institucionais de longo prazo.</p>
                  </div>
                  <div class="ri-val-grid">
                      <div class="ri-val-card">
                          <div class="ri-val-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg></div>
                          <h3>Governan&ccedil;a S&oacute;lida</h3>
                          <p>Estrutura corporativa com Conselho Consultivo, compliance rigoroso e transpar&ecirc;ncia total desde a constitui&ccedil;&atilde;o em 2013.</p>
                      </div>
                      <div class="ri-val-card">
                          <div class="ri-val-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg></div>
                          <h3>Modelo Patenteado</h3>
                          <p>Sistema originado de patente INPI 1995, desenvolvido pela IBM do Brasil &mdash; base tecnol&oacute;gica e operacional &uacute;nica no mercado.</p>
                      </div>
                      <div class="ri-val-card">
                          <div class="ri-val-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
                          <h3>Escala Nacional Planejada</h3>
                          <p>478 regionais com modelo replicado e validado, representando um dos maiores planos de expans&atilde;o digital empresarial do Brasil.</p>
                      </div>
                  </div>
              </div>
          </section>

          <section class="ri-cont">
              <div class="ri-wrap">
                  <div class="ri-cont-inner">
                      <div class="g-line"></div>
                      <div class="ri-cont-txt">
                          <h2>Inicie uma <span class="grad">Conversa Institucional</span></h2>
                          <p>Nossa equipe est&aacute; preparada para apresentar documentos, m&eacute;tricas e detalhes operacionais conforme o perfil de cada parte interessada. Confidencialidade garantida.</p>
                      </div>
                      <div class="ri-cont-btns">
                          <a href="/contato" class="ri-btn-g">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                              Enviar Mensagem
                          </a>
                          <a href="/governanca" class="ri-btn-o">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25"/></svg>
                              Ver Governan&ccedil;a
                          </a>
                      </div>
                  </div>
              </div>
          </section>

      </main>
  - alias: transparencia
    name: "Transparencia"
    path: Transparencia.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
          /* ── Hero ── */
          .tr-hero { position: relative; background: linear-gradient(135deg,#F0FDF4,#F9FAFB,#EFF6FF); padding: var(--risin-section-py) 0; overflow: hidden; }
          .tr-hero .grid-bg { position: absolute; inset: 0; opacity: 0.2; background-image: linear-gradient(rgba(5,150,105,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(5,150,105,0.1) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .tr-hero .orb-g { position: absolute; top: -40px; right: 80px; width: 360px; height: 360px; background: rgba(5,150,105,0.07); border-radius: 50%; filter: blur(56px); pointer-events: none; }
          .tr-hc { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .tr-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.2); border-radius: 9999px; margin-bottom: 24px; }
          .tr-badge svg { width: 16px; height: 16px; color: #059669; }
          .tr-badge span { font-size: 14px; font-weight: 500; color: #059669; }
          .tr-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: var(--risin-text-dark); line-height: 1.15; margin-bottom: 20px; max-width: 700px; }
          .tr-hero h1 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .tr-hero p { font-size: 18px; color: var(--risin-text-muted); max-width: 680px; line-height: 1.7; margin-bottom: 36px; }
          .tr-hero-pills { display: flex; gap: 10px; flex-wrap: wrap; }
          .tr-pill { padding: 8px 16px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); font-size: 13px; font-weight: 500; color: var(--risin-text-dark); box-shadow: var(--risin-shadow-sm); }
          @@media (max-width: 640px) { .tr-hero h1 { font-size: 32px; } }

          /* ── Shared ── */
          .tr-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .tr-sec-hd { text-align: center; margin-bottom: 48px; }
          .tr-sec-hd h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .tr-sec-hd h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .tr-sec-hd p { color: var(--risin-text-muted); max-width: 640px; margin: 0 auto; line-height: 1.7; }

          /* ── Políticas ── */
          .tr-pol { background: white; padding: var(--risin-section-py) 0; }
          .tr-pol-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
          .tr-pol-card { border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 28px; transition: all var(--risin-transition); position: relative; }
          .tr-pol-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--risin-radius-xl) var(--risin-radius-xl) 0 0; }
          .tr-pol-card:nth-child(odd)::before { background: linear-gradient(90deg,#059669,#047857); }
          .tr-pol-card:nth-child(even)::before { background: linear-gradient(90deg,#0891B2,#0369A1); }
          .tr-pol-card:hover { box-shadow: var(--risin-shadow-xl); transform: translateY(-4px); }
          .tr-pol-icon { width: 48px; height: 48px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
          .tr-pol-icon svg { width: 24px; height: 24px; color: white; }
          .tr-pol-card h3 { font-size: 16px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 8px; }
          .tr-pol-card p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; margin: 0; }
          @@media (max-width: 1024px) { .tr-pol-grid { grid-template-columns: repeat(2,1fr); } }
          @@media (max-width: 640px) { .tr-pol-grid { grid-template-columns: 1fr; } }

          /* ── Compromissos ── */
          .tr-com { background: var(--risin-bg-lighter); padding: var(--risin-section-py) 0; position: relative; overflow: hidden; }
          .tr-com .top-acc { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .tr-com-row { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
          .tr-com-txt h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; }
          .tr-com-txt h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .tr-com-txt p { color: var(--risin-text-muted); line-height: 1.7; margin-bottom: 24px; }
          .tr-com-items { display: flex; flex-direction: column; gap: 12px; }
          .tr-com-item { display: flex; gap: 12px; align-items: flex-start; padding: 14px 18px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); transition: all var(--risin-transition); }
          .tr-com-item:hover { border-color: rgba(5,150,105,0.3); box-shadow: var(--risin-shadow); }
          .tr-com-ic { width: 32px; height: 32px; border-radius: var(--risin-radius); background: linear-gradient(135deg,#059669,#0891B2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
          .tr-com-ic svg { width: 16px; height: 16px; color: white; }
          .tr-com-item strong { display: block; font-size: 14px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 2px; }
          .tr-com-item span { font-size: 13px; color: var(--risin-text-muted); }
          .tr-com-vis { display: flex; justify-content: center; }
          .tr-com-box { background: linear-gradient(135deg,#059669,#0891B2); border-radius: var(--risin-radius-2xl); padding: 48px 36px; text-align: center; color: white; max-width: 300px; width: 100%; }
          .tr-com-box svg { width: 64px; height: 64px; color: rgba(255,255,255,0.9); margin-bottom: 20px; }
          .tr-com-box h3 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
          .tr-com-box p { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.6; margin: 0; }
          @@media (max-width: 768px) { .tr-com-row { grid-template-columns: 1fr; } .tr-com-vis { display: none; } }

          /* ── Documentos ── */
          .tr-docs { background: white; padding: var(--risin-section-py) 0; }
          .tr-docs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
          .tr-doc-card { background: var(--risin-bg-lighter); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 32px; display: flex; gap: 20px; align-items: flex-start; transition: all var(--risin-transition); }
          .tr-doc-card:hover { border-color: rgba(5,150,105,0.3); box-shadow: var(--risin-shadow-lg); }
          .tr-doc-ic { width: 52px; height: 52px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
          .tr-doc-ic svg { width: 26px; height: 26px; color: white; }
          .tr-doc-txt h3 { font-size: 17px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 8px; }
          .tr-doc-txt p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; margin: 0; }
          @@media (max-width: 768px) { .tr-docs-grid { grid-template-columns: 1fr; } }

          /* ── CTA ── */
          .tr-cta { background: linear-gradient(135deg,#059669,#0891B2); padding: var(--risin-section-py) 0; text-align: center; }
          .tr-cta h2 { font-size: 36px; font-weight: 700; color: white; margin-bottom: 16px; }
          .tr-cta p { font-size: 18px; color: rgba(255,255,255,0.85); max-width: 600px; margin: 0 auto 36px; line-height: 1.7; }
          .tr-cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
          .tr-btn-w { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: white; color: #059669; font-weight: 700; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-xl); text-decoration: none; transition: all var(--risin-transition); }
          .tr-btn-w:hover { transform: translateY(-2px); }
          .tr-btn-o { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; border: 2px solid rgba(255,255,255,0.5); color: white; font-weight: 600; font-size: 16px; border-radius: var(--risin-radius-lg); text-decoration: none; transition: all var(--risin-transition); }
          .tr-btn-o:hover { border-color: white; background: rgba(255,255,255,0.1); }
          .tr-btn-w svg, .tr-btn-o svg { width: 18px; height: 18px; }
          @@media (max-width: 640px) { .tr-cta h2 { font-size: 26px; } .tr-cta-btns { flex-direction: column; align-items: center; } }
      </style>
      <main>

          <section class="tr-hero">
              <div class="grid-bg"></div>
              <div class="orb-g"></div>
              <div class="tr-hc">
                  <div class="tr-badge">
                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z"/></svg>
                      <span>Transpar&ecirc;ncia Total desde o Dia Zero</span>
                  </div>
                  <h1>Transpar&ecirc;ncia e <span class="grad">Compliance</span></h1>
                  <p>Pol&iacute;ticas rigorosas, documentos de conformidade e comprometimento inegoci&aacute;vel com a integridade em todas as opera&ccedil;&otilde;es do ecossistema RISIN.</p>
                  <div class="tr-hero-pills">
                      <span class="tr-pill">Governan&ccedil;a</span>
                      <span class="tr-pill">Contrata&ccedil;&atilde;o</span>
                      <span class="tr-pill">Seguran&ccedil;a da Informa&ccedil;&atilde;o</span>
                      <span class="tr-pill">Pol&iacute;tica Financeira</span>
                      <span class="tr-pill">C&oacute;digo de Conduta</span>
                      <span class="tr-pill">LGPD</span>
                  </div>
              </div>
          </section>

          <section class="tr-pol">
              <div class="tr-wrap">
                  <div class="tr-sec-hd">
                      <h2>Pol&iacute;ticas <span class="grad">Corporativas</span></h2>
                      <p>Documentos e diretrizes que regem todas as opera&ccedil;&otilde;es do grupo, garantindo integridade, legalidade e previsibilidade para todos os stakeholders.</p>
                  </div>
                  <div class="tr-pol-grid">
                      <div class="tr-pol-card">
                          <div class="tr-pol-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v17.25m0 0c-1.472 0-2.882.265-4.185.75M12 20.25c1.472 0 2.882.265 4.185.75M18.75 4.97A48.416 48.416 0 0012 4.5c-2.291 0-4.545.16-6.75.47m13.5 0c1.01.143 2.01.317 3 .52m-3-.52l2.62 10.726c.122.499-.106 1.028-.589 1.202a5.988 5.988 0 01-2.031.352"/></svg>
                          </div>
                          <h3>Pol&iacute;tica de Governan&ccedil;a</h3>
                          <p>Estrutura de tomada de decis&atilde;o com responsabilidade e accountability claras para todos os n&iacute;veis. ERP com acesso em tempo real a d&eacute;bito, cr&eacute;dito, despesas e receitas.</p>
                      </div>
                      <div class="tr-pol-card">
                          <div class="tr-pol-icon" style="background:linear-gradient(135deg,#0891B2,#0369A1)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                          </div>
                          <h3>Pol&iacute;tica de Contrata&ccedil;&atilde;o</h3>
                          <p>Processos estruturados de sele&ccedil;&atilde;o, contratos com SLA claros e aviso pr&eacute;vio de 60 dias para rescis&atilde;o em contratos de publicidade e fornecimento.</p>
                      </div>
                      <div class="tr-pol-card">
                          <div class="tr-pol-icon" style="background:linear-gradient(135deg,#059669,#0891B2)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
                          </div>
                          <h3>Seguran&ccedil;a da Informa&ccedil;&atilde;o</h3>
                          <p>Prote&ccedil;&atilde;o de dados conforme LGPD, seguran&ccedil;a de cr&eacute;dito, conformidade regulat&oacute;ria e integridade de todas as transa&ccedil;&otilde;es do ecossistema.</p>
                      </div>
                      <div class="tr-pol-card">
                          <div class="tr-pol-icon" style="background:linear-gradient(135deg,#047857,#059669)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75"/></svg>
                          </div>
                          <h3>Pol&iacute;tica Financeira</h3>
                          <p>Gest&atilde;o transparente de caixa, CRD (Coeficiente de Rateio de Despesas), relat&oacute;rios peri&oacute;dicos para s&oacute;cios e auditorias financeiras independentes.</p>
                      </div>
                      <div class="tr-pol-card">
                          <div class="tr-pol-icon" style="background:linear-gradient(135deg,#0891B2,#059669)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                          </div>
                          <h3>C&oacute;digo de Conduta</h3>
                          <p>Diretrizes &eacute;ticas para colaboradores, parceiros e franqueados. Comprometimento com pr&aacute;ticas sustent&aacute;veis, respeito e responsabilidade corporativa.</p>
                      </div>
                      <div class="tr-pol-card">
                          <div class="tr-pol-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296"/></svg>
                          </div>
                          <h3>Auditoria Independente</h3>
                          <p>Auditorias regulares por terceiros, acesso a documentos de conformidade para s&oacute;cios e canal direto com o Conselho Consultivo de 7 especialistas.</p>
                      </div>
                  </div>
              </div>
          </section>

          <section class="tr-com">
              <div class="top-acc"></div>
              <div class="tr-wrap">
                  <div class="tr-com-row">
                      <div class="tr-com-txt">
                          <h2>Comprometimentos <span class="grad">Concretos</span></h2>
                          <p>A transpar&ecirc;ncia na RISIN &eacute; implementada por sistemas, processos e obriga&ccedil;&otilde;es contratuais que garantem visibilidade real para todos os stakeholders.</p>
                          <div class="tr-com-items">
                              <div class="tr-com-item">
                                  <div class="tr-com-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3"/></svg></div>
                                  <div><strong>ERP em Tempo Real</strong><span>Acesso online a relat&oacute;rios de d&eacute;bito, cr&eacute;dito, despesas e receitas para todos os s&oacute;cios</span></div>
                              </div>
                              <div class="tr-com-item">
                                  <div class="tr-com-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952"/></svg></div>
                                  <div><strong>Conselho Consultivo Ativo</strong><span>7 especialistas independentes com poder de supervis&atilde;o e obriga&ccedil;&atilde;o contratual de atua&ccedil;&atilde;o</span></div>
                              </div>
                              <div class="tr-com-item">
                                  <div class="tr-com-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5"/></svg></div>
                                  <div><strong>Documentos de Conformidade</strong><span>Regulamento Interno, contratos e pol&iacute;ticas dispon&iacute;veis para s&oacute;cios e parceiros</span></div>
                              </div>
                              <div class="tr-com-item">
                                  <div class="tr-com-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75"/></svg></div>
                                  <div><strong>Prote&ccedil;&atilde;o de Dados (LGPD)</strong><span>Pol&iacute;tica de privacidade em conformidade com a Lei Geral de Prote&ccedil;&atilde;o de Dados</span></div>
                              </div>
                          </div>
                      </div>
                      <div class="tr-com-vis">
                          <div class="tr-com-box">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
                              <h3>Compliance desde 2013</h3>
                              <p>Governan&ccedil;a implementada desde a constitui&ccedil;&atilde;o da empresa, n&atilde;o como adapta&ccedil;&atilde;o posterior.</p>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="tr-docs">
              <div class="tr-wrap">
                  <div class="tr-sec-hd">
                      <h2>Documentos e <span class="grad">Normas</span></h2>
                      <p>Principais frameworks normativos que orientam o comportamento &eacute;tico e legal de toda a organiza&ccedil;&atilde;o.</p>
                  </div>
                  <div class="tr-docs-grid">
                      <div class="tr-doc-card">
                          <div class="tr-doc-ic" style="background:linear-gradient(135deg,#059669,#047857)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                          </div>
                          <div class="tr-doc-txt"><h3>C&oacute;digo de Conduta RISIN</h3><p>Normas de comportamento &eacute;tico, relacionamento interprofissional e resolu&ccedil;&atilde;o de conflitos para todos os colaboradores, parceiros e franqueados.</p></div>
                      </div>
                      <div class="tr-doc-card">
                          <div class="tr-doc-ic" style="background:linear-gradient(135deg,#0891B2,#0369A1)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18"/></svg>
                          </div>
                          <div class="tr-doc-txt"><h3>Regulamento Interno</h3><p>Normas operacionais que regem o funcionamento das cooperativas, contratos de conselho, compensa&ccedil;&otilde;es e processos de tomada de decis&atilde;o na holding.</p></div>
                      </div>
                      <div class="tr-doc-card">
                          <div class="tr-doc-ic" style="background:linear-gradient(135deg,#059669,#0891B2)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
                          </div>
                          <div class="tr-doc-txt"><h3>Pol&iacute;tica de Privacidade (LGPD)</h3><p>Diretrizes de coleta, armazenamento, uso e prote&ccedil;&atilde;o de dados pessoais em conformidade com a Lei Geral de Prote&ccedil;&atilde;o de Dados Brasileira.</p></div>
                      </div>
                      <div class="tr-doc-card">
                          <div class="tr-doc-ic" style="background:linear-gradient(135deg,#047857,#059669)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                          </div>
                          <div class="tr-doc-txt"><h3>Manual de Franqueados</h3><p>Normas operacionais, padr&otilde;es de qualidade e obriga&ccedil;&otilde;es contratuais dos franqueados regionais da rede RISIN em todo o territ&oacute;rio nacional.</p></div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="tr-cta">
              <div class="tr-wrap">
                  <h2>D&uacute;vidas sobre Compliance?</h2>
                  <p>Nossa equipe de governan&ccedil;a est&aacute; dispon&iacute;vel para esclarecimentos institucionais ou acesso a documentos de conformidade.</p>
                  <div class="tr-cta-btns">
                      <a href="/relacoes-institucionais" class="tr-btn-w">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18"/></svg>
                          Rela&ccedil;&otilde;es Institucionais
                      </a>
                      <a href="/governanca" class="tr-btn-o">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623"/></svg>
                          Estrutura de Governan&ccedil;a
                      </a>
                  </div>
              </div>
          </section>

      </main>
  - alias: paraLojistas
    name: "Para Lojistas"
    path: ParaLojistas.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
          /* ── Hero ── */
          .pl-hero { position: relative; background: linear-gradient(135deg,#F0FDF4,#F9FAFB,#EFF6FF); padding: var(--risin-section-py) 0; overflow: hidden; }
          .pl-hero .grid-bg { position: absolute; inset: 0; opacity: 0.2; background-image: linear-gradient(rgba(5,150,105,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(8,145,178,0.1) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .pl-hero .orb-g { position: absolute; top: -40px; right: 80px; width: 380px; height: 380px; background: rgba(5,150,105,0.07); border-radius: 50%; filter: blur(56px); pointer-events: none; }
          .pl-hc { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; text-align: center; }
          .pl-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.2); border-radius: 9999px; margin-bottom: 24px; }
          .pl-badge svg { width: 16px; height: 16px; color: #059669; }
          .pl-badge span { font-size: 14px; font-weight: 500; color: #059669; }
          .pl-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: var(--risin-text-dark); line-height: 1.15; margin-bottom: 20px; }
          .pl-hero h1 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .pl-hero p { font-size: 18px; color: var(--risin-text-muted); max-width: 680px; margin: 0 auto 40px; line-height: 1.7; }
          .pl-hero-kpis { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
          .pl-hkpi { padding: 16px 22px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-sm); text-align: center; min-width: 100px; }
          .pl-hkpi strong { display: block; font-size: 26px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 3px; }
          .pl-hkpi span { font-size: 11px; color: var(--risin-text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
          @@media (max-width: 640px) { .pl-hero h1 { font-size: 32px; } }

          /* ── Shared ── */
          .pl-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .pl-sec-hd { text-align: center; margin-bottom: 48px; }
          .pl-sec-hd h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .pl-sec-hd h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .pl-sec-hd p { color: var(--risin-text-muted); max-width: 640px; margin: 0 auto; line-height: 1.7; }

          /* ── Como Funciona ── */
          .pl-func { background: white; padding: var(--risin-section-py) 0; }
          .pl-func-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-bottom: 36px; }
          .pl-func-card { text-align: center; padding: 32px 24px; background: var(--risin-bg-lighter); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); transition: all var(--risin-transition); }
          .pl-func-card:hover { box-shadow: var(--risin-shadow-xl); transform: translateY(-4px); border-color: rgba(5,150,105,0.3); }
          .pl-func-num { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg,#059669,#0891B2); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: white; margin: 0 auto 16px; }
          .pl-func-card h3 { font-size: 17px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 10px; }
          .pl-func-card p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; margin: 0; }
          .pl-info { display: flex; gap: 14px; align-items: flex-start; padding: 20px 24px; background: linear-gradient(135deg,rgba(5,150,105,0.05),rgba(8,145,178,0.05)); border: 1px solid rgba(5,150,105,0.15); border-radius: var(--risin-radius-xl); }
          .pl-info svg { width: 24px; height: 24px; color: #059669; flex-shrink: 0; margin-top: 2px; }
          .pl-info p { margin: 0; font-size: 15px; color: var(--risin-text-dark); line-height: 1.6; }
          @@media (max-width: 768px) { .pl-func-grid { grid-template-columns: 1fr; } }

          /* ── Fundador ── */
          .pl-fund { background: var(--risin-bg-lighter); padding: var(--risin-section-py) 0; position: relative; overflow: hidden; }
          .pl-fund .top-acc { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .pl-fund-row { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
          .pl-fund-txt h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; }
          .pl-fund-txt h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .pl-fund-txt p { color: var(--risin-text-muted); line-height: 1.7; margin-bottom: 24px; }
          .pl-fund-stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
          .pl-fstat { padding: 18px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); text-align: center; }
          .pl-fstat strong { display: block; font-size: 24px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
          .pl-fstat span { font-size: 12px; color: var(--risin-text-muted); }
          .pl-fund-vis { display: flex; justify-content: center; }
          .pl-fund-box { background: linear-gradient(135deg,#059669,#0891B2); border-radius: var(--risin-radius-2xl); padding: 48px 36px; text-align: center; color: white; max-width: 300px; width: 100%; }
          .pl-fund-box svg { width: 64px; height: 64px; color: rgba(255,255,255,0.9); margin-bottom: 20px; }
          .pl-fund-box h3 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
          .pl-fund-box p { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.6; margin: 0; }
          @@media (max-width: 768px) { .pl-fund-row { grid-template-columns: 1fr; } .pl-fund-vis { display: none; } }

          /* ── Benefícios ── */
          .pl-ben { background: white; padding: var(--risin-section-py) 0; }
          .pl-ben-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; }
          .pl-ben-card { border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 28px; display: flex; gap: 18px; align-items: flex-start; transition: all var(--risin-transition); }
          .pl-ben-card:hover { box-shadow: var(--risin-shadow-lg); border-color: rgba(5,150,105,0.3); }
          .pl-ben-icon { width: 48px; height: 48px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
          .pl-ben-icon svg { width: 24px; height: 24px; color: white; }
          .pl-ben-txt h3 { font-size: 16px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 8px; }
          .pl-ben-txt p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; margin: 0; }
          @@media (max-width: 768px) { .pl-ben-grid { grid-template-columns: 1fr; } }

          /* ── CTA ── */
          .pl-cta { background: linear-gradient(135deg,#059669,#0891B2); padding: var(--risin-section-py) 0; text-align: center; }
          .pl-cta h2 { font-size: 36px; font-weight: 700; color: white; margin-bottom: 16px; }
          .pl-cta p { font-size: 18px; color: rgba(255,255,255,0.85); max-width: 600px; margin: 0 auto 36px; line-height: 1.7; }
          .pl-cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
          .pl-btn-w { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: white; color: #059669; font-weight: 700; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-xl); text-decoration: none; transition: all var(--risin-transition); }
          .pl-btn-w:hover { transform: translateY(-2px); }
          .pl-btn-o { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; border: 2px solid rgba(255,255,255,0.5); color: white; font-weight: 600; font-size: 16px; border-radius: var(--risin-radius-lg); text-decoration: none; transition: all var(--risin-transition); }
          .pl-btn-o:hover { border-color: white; background: rgba(255,255,255,0.1); }
          .pl-btn-w svg, .pl-btn-o svg { width: 18px; height: 18px; }
          @@media (max-width: 640px) { .pl-cta h2 { font-size: 26px; } .pl-cta-btns { flex-direction: column; align-items: center; } }
      </style>
      <main>

          <section class="pl-hero">
              <div class="grid-bg"></div>
              <div class="orb-g"></div>
              <div class="pl-hc">
                  <div class="pl-badge">
                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"/></svg>
                      <span>4.500 Vagas Fundadoras Dispon&iacute;veis</span>
                  </div>
                  <h1>Para <span class="grad">Lojistas</span></h1>
                  <p>Abra sua loja virtual no ecossistema RISIN e tenha acesso a um mercado integrado com governan&ccedil;a, infraestrutura pronta e status de parceiro fundador.</p>
                  <div class="pl-hero-kpis">
                      <div class="pl-hkpi"><strong>4.500</strong><span>Vagas Fundadoras</span></div>
                      <div class="pl-hkpi"><strong>3</strong><span>Setores Econ&ocirc;micos</span></div>
                      <div class="pl-hkpi"><strong>8</strong><span>Plataformas Integradas</span></div>
                      <div class="pl-hkpi"><strong>1</strong><span>Cadastro &Uacute;nico</span></div>
                  </div>
              </div>
          </section>

          <section class="pl-func">
              <div class="pl-wrap">
                  <div class="pl-sec-hd">
                      <h2>Como <span class="grad">Funciona</span></h2>
                      <p>O Clikashop &eacute; organizado em 3 setores econ&ocirc;micos (prim&aacute;rio, secund&aacute;rio e terci&aacute;rio). O pagamento &eacute; trimestral por cau&ccedil;&atilde;o, cobrindo aluguel, condom&iacute;nio e comiss&otilde;es.</p>
                  </div>
                  <div class="pl-func-grid">
                      <div class="pl-func-card">
                          <div class="pl-func-num">1</div>
                          <h3>Setor Prim&aacute;rio</h3>
                          <p>Agricultura, pecu&aacute;ria, extra&ccedil;&atilde;o e produ&ccedil;&atilde;o de mat&eacute;rias-primas. Base da cadeia produtiva dentro do ecossistema.</p>
                      </div>
                      <div class="pl-func-card">
                          <div class="pl-func-num">2</div>
                          <h3>Setor Secund&aacute;rio</h3>
                          <p>Ind&uacute;stria, manufatura, com&eacute;rcio atacadista e distribui&ccedil;&atilde;o. Transforma&ccedil;&atilde;o e comercializa&ccedil;&atilde;o de produtos.</p>
                      </div>
                      <div class="pl-func-card">
                          <div class="pl-func-num">3</div>
                          <h3>Setor Terci&aacute;rio</h3>
                          <p>Servi&ccedil;os, com&eacute;rcio varejista e profissionais liberais. Entrega final ao consumidor e presta&ccedil;&atilde;o de servi&ccedil;os.</p>
                      </div>
                  </div>
                  <div class="pl-info">
                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
                      <p><strong>Um &Uacute;nico Cadastro:</strong> D&aacute; acesso a todos os servi&ccedil;os do ecossistema — opera&ccedil;&atilde;o de loja no Clikashop, compras B2B, associa&ccedil;&atilde;o cooperativa (Cooper-Translog e Coop-Supri) e status de fornecedor no G-Empresas.</p>
                  </div>
              </div>
          </section>

          <section class="pl-fund">
              <div class="top-acc"></div>
              <div class="pl-wrap">
                  <div class="pl-fund-row">
                      <div class="pl-fund-txt">
                          <h2>Lojista Parceiro <span class="grad">Fundador</span></h2>
                          <p>As primeiras 4.500 vagas de Lojista Parceiro Fundador nas 2 regionais modelo oferecem condi&ccedil;&otilde;es especiais de entrada e status de fundador no ecossistema RISIN.</p>
                          <p>Cada loja emite sua pr&oacute;pria NFe, recebe pagamentos diretamente e opera com autonomia dentro do shopping digital estruturado.</p>
                          <div class="pl-fund-stats">
                              <div class="pl-fstat"><strong>4.500</strong><span>Vagas Fundadoras<br>Dispon&iacute;veis</span></div>
                              <div class="pl-fstat"><strong>2</strong><span>Regionais Modelo<br>(Sorocaba + RJ)</span></div>
                              <div class="pl-fstat"><strong>Trimestral</strong><span>Pagamento por<br>Cau&ccedil;&atilde;o</span></div>
                              <div class="pl-fstat"><strong>~10%</strong><span>Comiss&atilde;o<br>Abaixo do Mercado</span></div>
                          </div>
                      </div>
                      <div class="pl-fund-vis">
                          <div class="pl-fund-box">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.562.562 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                              <h3>Status Fundador</h3>
                              <p>Condi&ccedil;&otilde;es especiais de entrada e reconhecimento permanente no ecossistema RISIN.</p>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="pl-ben">
              <div class="pl-wrap">
                  <div class="pl-sec-hd">
                      <h2>Benef&iacute;cios para <span class="grad">Lojistas</span></h2>
                      <p>Acesso a uma infraestrutura tecnol&oacute;gica completa, governan&ccedil;a corporativa desde o primeiro dia e integra&ccedil;&atilde;o com toda a rede de fornecedores e servi&ccedil;os.</p>
                  </div>
                  <div class="pl-ben-grid">
                      <div class="pl-ben-card">
                          <div class="pl-ben-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3"/></svg>
                          </div>
                          <div class="pl-ben-txt">
                              <h3>Infraestrutura Tecnol&oacute;gica Completa</h3>
                              <p>Plataforma Clikashop com ERP integrado, emiss&atilde;o de NFe pr&oacute;pria, gateway de pagamento e dashboards em tempo real.</p>
                          </div>
                      </div>
                      <div class="pl-ben-card">
                          <div class="pl-ben-icon" style="background:linear-gradient(135deg,#0891B2,#0369A1)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
                          </div>
                          <div class="pl-ben-txt">
                              <h3>Governan&ccedil;a desde o Primeiro Dia</h3>
                              <p>Ambiente regulado, compliance corporativo, contratos claros e transpar&ecirc;ncia total em todas as opera&ccedil;&otilde;es do condom&iacute;nio digital.</p>
                          </div>
                      </div>
                      <div class="pl-ben-card">
                          <div class="pl-ben-icon" style="background:linear-gradient(135deg,#059669,#0891B2)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
                          </div>
                          <div class="pl-ben-txt">
                              <h3>Integra&ccedil;&atilde;o com Cooper-Translog</h3>
                              <p>Acesso &agrave; cooperativa de log&iacute;stica para redu&ccedil;&atilde;o de custos de frete, distribui&ccedil;&atilde;o nacional e rastreamento em tempo real.</p>
                          </div>
                      </div>
                      <div class="pl-ben-card">
                          <div class="pl-ben-icon" style="background:linear-gradient(135deg,#047857,#059669)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg>
                          </div>
                          <div class="pl-ben-txt">
                              <h3>Compras B2B via Coop-Supri</h3>
                              <p>Cooperativa de compras coletivas para redu&ccedil;&atilde;o de custos de insumos, mat&eacute;rias-primas e fornecimentos compartilhados.</p>
                          </div>
                      </div>
                      <div class="pl-ben-card">
                          <div class="pl-ben-icon" style="background:linear-gradient(135deg,#0891B2,#059669)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535"/></svg>
                          </div>
                          <div class="pl-ben-txt">
                              <h3>Publicidade Regional Integrada</h3>
                              <p>Sistema de publicidade com 216 apari&ccedil;&otilde;es/24h em todas as plataformas do ecossistema para visibilidade cont&iacute;nua.</p>
                          </div>
                      </div>
                      <div class="pl-ben-card">
                          <div class="pl-ben-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                          </div>
                          <div class="pl-ben-txt">
                              <h3>Perfil no G-Empresas</h3>
                              <p>Listagem autom&aacute;tica no guia empresarial regional com perfil completo, avalia&ccedil;&otilde;es e vis&iacute;bilidade para clientes B2B e B2C.</p>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="pl-cta">
              <div class="pl-wrap">
                  <h2>Garanta sua Vaga de Fundador</h2>
                  <p>Entre em contato para receber mais informa&ccedil;&otilde;es sobre o programa Lojista Parceiro Fundador e garantir sua vaga nas regionais modelo.</p>
                  <div class="pl-cta-btns">
                      <a href="/contato" class="pl-btn-w">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                          Falar com a Equipe
                      </a>
                      <a href="/ecossistema" class="pl-btn-o">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3"/></svg>
                          Conhecer o Ecossistema
                      </a>
                  </div>
              </div>
          </section>

      </main>
  - alias: franquias
    name: "Franquias"
    path: Franquias.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
          /* ── Hero ── */
          .fr-hero { position: relative; background: linear-gradient(135deg,#1F2937,#111827); padding: var(--risin-section-py) 0; overflow: hidden; }
          .fr-hero .grid-bg { position: absolute; inset: 0; opacity: 0.07; background-image: linear-gradient(rgba(5,150,105,0.5) 1px,transparent 1px),linear-gradient(90deg,rgba(5,150,105,0.5) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .fr-hero .g-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .fr-hero .orb-g { position: absolute; top: -60px; right: 100px; width: 400px; height: 400px; background: rgba(5,150,105,0.08); border-radius: 50%; filter: blur(80px); pointer-events: none; }
          .fr-hc { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; display: flex; gap: 64px; align-items: center; }
          .fr-hl { max-width: 620px; }
          .fr-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.06); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.3); border-radius: 9999px; margin-bottom: 24px; }
          .fr-badge svg { width: 16px; height: 16px; color: #34D399; }
          .fr-badge span { font-size: 14px; font-weight: 500; color: #34D399; }
          .fr-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: white; line-height: 1.15; margin-bottom: 20px; }
          .fr-hero h1 .grad { background: linear-gradient(90deg,#34D399,#67E8F9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .fr-hero p { font-size: 18px; color: rgba(255,255,255,0.7); line-height: 1.7; margin-bottom: 36px; }
          .fr-hero-kpis { display: flex; gap: 16px; flex-wrap: wrap; }
          .fr-hkpi { padding: 16px 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--risin-radius-lg); text-align: center; min-width: 100px; }
          .fr-hkpi strong { display: block; font-size: 24px; font-weight: 700; background: linear-gradient(90deg,#34D399,#67E8F9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
          .fr-hkpi span { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.06em; }
          .fr-hr { flex: 1; display: flex; justify-content: center; }
