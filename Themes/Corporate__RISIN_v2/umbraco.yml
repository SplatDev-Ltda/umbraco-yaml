          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker

  # ── Governance Role Item ───────────────────
  - alias: governanceRole
    name: Governance Role
    icon: icon-user
    allowAsRoot: false
    allowedChildTypes: []
    update: true
    tabs:
      - name: Content
        properties:
          - alias: roleAlias
            name: Role Alias
            dataType: governanceRole
            required: true
          - alias: roleTitle
            name: Role Title
            dataType: textString
            required: true
            description: "Ex: Presidência Executiva"
          - alias: roleDescription
            name: Description
            dataType: textArea
            required: true
          - alias: roleHolder
            name: Role Holder (optional)
            dataType: textString
