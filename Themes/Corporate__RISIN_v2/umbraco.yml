      # ── A RISIN ─────────────────────────────
      - alias: aRisin
        name: A RISIN
        documentType: aRisinPage
        isPublished: true
        sortOrder: 1
        properties:
          heroTitle: "A RISIN"
          heroSubtitle: "Holding de projetos digitais que estrutura um ecossistema empresarial integrado, com foco em mercado B2B, B2C e B2B2C."
          heroImage: "RISIN – Sobre Nós"
          heroIntro:
          foundingVisionTitle: "Como surgiu a RISIN?"
          foundingVisionText: |
            <p>Nasceu a partir das experiências do seu fundador e aproveitando seu <strong>sistema patenteado no INPI em 1995</strong>, originalmente desenvolvido pela IBM do Brasil para uma operação cooperativa de compras e logística em Campinas-SP.</p>
            <p>Após anos de pesquisa e validação — incluindo um blog em 2010 com mais de 2.000 empresas cadastradas — surgiu a visão de aplicar tecnologias em ecossistemas para que empresas e pessoas obtenham serviços transparentes, com menores custos e informações mais confiáveis.</p>
            <p>Em razão dessas pesquisas, a <strong>RISIN foi legalmente constituída em 2013 em Niterói – RJ</strong>. Em 2026, a empresa está em sua <strong>fase de implantação estruturada</strong>, com foco em validar o modelo operacional por meio de 2 Regionais Modelo antes da expansão nacional para <strong>478 regionais</strong>.</p>
          structuredProjectTitle: "Projeto em Implantação Estruturada"
          structuredProjectContent: |
            <p>Projeto concebido para nascer estruturado como grupo empresarial digital — não como um site isolado. O foco está em solidez, governança, modelo regional e contratos claros com empresas e parceiros.</p>
            <p>Posicionamento como plataforma tecnológica premium: seriedade, inovação e escalabilidade desde a concepção.</p>
          structuredProjectKeyTerms:
            - "Implantação estruturada"
            - "Governança progressiva"
            - "Arquitetura preparada para expansão"
            - "Receita recorrente projetada"
            - "Modelo validado em 2 Regionais antes da expansão para 478"
          timelineTitle: "Nossa História"
          timeline:
            - $type: timelineItemElement
              year: "1995"
              title: "Patente IBM/INPI"
              text: "Sistema de centralização de compras segmentadas e logística cooperativa patenteado no INPI — desenvolvido em parceria com IBM do Brasil."
            - $type: timelineItemElement
              year: "2010"
              title: "Blog com 2.000 Empresas"
              text: "Validação do modelo digital com blog de pesquisa e mais de 2.000 empresas cadastradas, comprovando a demanda pelo ecossistema."
            - $type: timelineItemElement
              year: "2013"
              title: "Constituição Legal da RISIN"
              text: "RISIN legalizada e constituída formalmente em Niterói – RJ, com CNPJ e estrutura societária definida."
            - $type: timelineItemElement
              year: "2024"
              title: "Estruturação do Ecossistema"
              text: "Definição final do modelo com 8 websites integrados, governança corporativa e modelo de franquias para 478 regionais."
            - $type: timelineItemElement
              year: "2026"
              title: "Lançamento das Regionais Modelo"
              text: "Abertura das 2 primeiras regionais modelo — Sorocaba (SP) e Zona Sul (RJ) — com 5.000 vagas de Lojistas Parceiros Fundadores."
          mvvTitle: "Missão, Visão e Valores"
          missionTitle: "Missão"
          missionText: "<p>Estruturar e operar uma plataforma digital integrada que conecta empresas e pessoas, em um ecossistema tecnológico único, com governança, transparência e escalabilidade desde a concepção.</p>"
          visionTitle: "Visão"
          visionText: "<p>Ser a principal holding digital de negócios empresariais do Brasil, com presença física e digital em todas as 478 regiões administradas por Franquias nas especialidades dos 08 websites, com expansão internacional planejada.</p>"
          valuesTitle: "Valores"
          valuesText: |
            <ul>
              <li>Governança</li>
              <li>Transparência</li>
              <li>Inovação</li>
              <li>Sustentabilidade</li>
              <li>Profissionalismo</li>
              <li>Compromisso com o longo prazo</li>
            </ul>
          corpStructureTitle: "Liderança Executiva"
          corpStructureDescription: "A estrutura executiva da RISIN compreende Presidência Executiva pelo Fundador e cinco diretorias especializadas, com Conselho Consultivo composto por 7 especialistas de diferentes áreas, com contratos fixos de 2 anos e compensação sobre receita líquida da Holding."
          pilars:
            - $type: pilarElement
              title: "Integração Total"
              text: "Os 08 websites trabalham dentro da Holding RISIN com acessos entre si, atendendo necessidades específicas do mercado enquanto compartilham governança, dados e modelo econômico."
            - $type: pilarElement
              title: "Cadastro Único Nacional"
              text: "Uma única inscrição dá acesso e permissão para consumir ou contratar em qualquer website da Rede do Portal RISIN — empresas e pessoas."
            - $type: pilarElement
              title: "Capilaridade Regional"
              text: "Modelo replicável para 478 regionais em todos os 27 estados do Brasil, com grupos populacionais de ~800 mil a 2,5 milhões por regional."
            - $type: pilarElement
              title: "Compliance desde o Dia Zero"
              text: "Políticas rigorosas de Governança, Contratação, Segurança da Informação, Financeira e Código de Conduta. Acesso em tempo real a relatórios via ERP."
            - $type: pilarElement
              title: "Modelo Escalável"
              text: "Estrutura validada nas 2 Regionais Modelo para depois replicar para 478 regionais, com suporte tecnológico centralizado e autonomia local."
          corpPositions:
            - $type: corpPositionElement
              title: "Presidência Executiva"
              text: "Fundador — liderança estratégica com visão de longo prazo e responsabilidade fiduciária."
            - $type: corpPositionElement
