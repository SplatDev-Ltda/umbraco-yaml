      </main>
  - alias: regionais
    name: "Regionais"
    path: Regionais.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
          /* ── Hero ── */
          .rg-hero { position: relative; background: linear-gradient(135deg,#F9FAFB,#F0FDF4,#EFF6FF); padding: var(--risin-section-py) 0; overflow: hidden; }
          .rg-hero .grid-bg { position: absolute; inset: 0; opacity: 0.2; background-image: linear-gradient(rgba(5,150,105,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(5,150,105,0.1) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .rg-hero .orb-g { position: absolute; top: -60px; right: 80px; width: 380px; height: 380px; background: rgba(5,150,105,0.07); border-radius: 50%; filter: blur(56px); pointer-events: none; }
          .rg-hc { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .rg-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.2); border-radius: 9999px; margin-bottom: 24px; }
          .rg-badge svg { width: 16px; height: 16px; color: #059669; }
          .rg-badge span { font-size: 14px; font-weight: 500; color: #059669; }
          .rg-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: var(--risin-text-dark); line-height: 1.15; margin-bottom: 20px; max-width: 700px; }
          .rg-hero h1 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .rg-hero p { font-size: 18px; color: var(--risin-text-muted); max-width: 680px; line-height: 1.7; margin-bottom: 36px; }
          .rg-hero-stats { display: flex; gap: 28px; flex-wrap: wrap; }
          .rg-hstat { padding: 16px 22px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-sm); text-align: center; }
          .rg-hstat strong { display: block; font-size: 26px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; margin-bottom: 3px; }
          .rg-hstat span { font-size: 11px; color: var(--risin-text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
          @@media (max-width: 640px) { .rg-hero h1 { font-size: 32px; } .rg-hero-stats { gap: 12px; } }

          /* ── Shared ── */
          .rg-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .rg-sec-hd { text-align: center; margin-bottom: 48px; }
          .rg-sec-hd h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .rg-sec-hd h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .rg-sec-hd p { color: var(--risin-text-muted); max-width: 640px; margin: 0 auto; line-height: 1.7; }

          /* ── Regionais Modelo ── */
          .rg-modelo { background: white; padding: var(--risin-section-py) 0; }
          .rg-modelo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 40px; }
          .rg-reg-card { border: 2px solid var(--risin-border); border-radius: var(--risin-radius-2xl); padding: 36px; transition: all var(--risin-transition); position: relative; overflow: hidden; }
          .rg-reg-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; }
          .rg-reg-card:nth-child(1)::before { background: linear-gradient(90deg,#059669,#047857); }
          .rg-reg-card:nth-child(2)::before { background: linear-gradient(90deg,#0891B2,#0369A1); }
          .rg-reg-card:hover { box-shadow: var(--risin-shadow-2xl); transform: translateY(-4px); border-color: rgba(5,150,105,0.3); }
          .rg-reg-header { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 24px; }
          .rg-reg-icon { width: 56px; height: 56px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
          .rg-reg-icon svg { width: 28px; height: 28px; color: white; }
          .rg-reg-title h3 { font-size: 20px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 2px; }
          .rg-reg-code { display: inline-block; font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 9999px; margin-bottom: 4px; }
          .rg-reg-state { font-size: 13px; color: var(--risin-text-muted); }
          .rg-reg-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
          .rg-rstat { background: var(--risin-bg-lighter); border-radius: var(--risin-radius-lg); padding: 12px; text-align: center; }
          .rg-rstat strong { display: block; font-size: 15px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 2px; }
          .rg-rstat span { font-size: 11px; color: var(--risin-text-muted); }
          .rg-reg-desc { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; margin: 0; }
          .rg-propósito { display: flex; gap: 12px; align-items: flex-start; padding: 20px 24px; background: linear-gradient(135deg,rgba(5,150,105,0.05),rgba(8,145,178,0.05)); border: 1px solid rgba(5,150,105,0.15); border-radius: var(--risin-radius-xl); }
          .rg-propósito svg { width: 24px; height: 24px; color: #059669; flex-shrink: 0; margin-top: 2px; }
          .rg-propósito p { margin: 0; font-size: 15px; color: var(--risin-text-dark); line-height: 1.6; }
          @@media (max-width: 768px) { .rg-modelo-grid { grid-template-columns: 1fr; } }

          /* ── Estrutura Operacional ── */
          .rg-ops { background: var(--risin-bg-lighter); padding: var(--risin-section-py) 0; position: relative; overflow: hidden; }
          .rg-ops .top-acc { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .rg-ops-row { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
          .rg-ops-txt h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; }
          .rg-ops-txt h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .rg-ops-txt p { color: var(--risin-text-muted); line-height: 1.7; margin-bottom: 24px; }
          .rg-ops-cards { display: flex; flex-direction: column; gap: 12px; }
          .rg-ops-item { display: flex; gap: 14px; align-items: center; padding: 16px 20px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); transition: all var(--risin-transition); }
          .rg-ops-item:hover { border-color: rgba(5,150,105,0.3); box-shadow: var(--risin-shadow); }
          .rg-ops-ic { width: 40px; height: 40px; border-radius: var(--risin-radius-lg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
          .rg-ops-ic svg { width: 20px; height: 20px; color: white; }
          .rg-ops-item strong { font-size: 14px; font-weight: 700; color: var(--risin-text-dark); display: block; margin-bottom: 1px; }
          .rg-ops-item span { font-size: 13px; color: var(--risin-text-muted); }
          .rg-ops-vis { display: flex; flex-direction: column; gap: 16px; }
          .rg-ops-box { background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 28px; }
          .rg-ops-box h3 { font-size: 16px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; }
          .rg-ops-kpis { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
          .rg-okpi { text-align: center; padding: 16px 12px; background: var(--risin-bg-lighter); border-radius: var(--risin-radius-lg); }
          .rg-okpi strong { display: block; font-size: 20px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 3px; }
          .rg-okpi span { font-size: 11px; color: var(--risin-text-muted); }
          @@media (max-width: 768px) { .rg-ops-row { grid-template-columns: 1fr; } }

          /* ── Expansão ── */
          .rg-exp { background: white; padding: var(--risin-section-py) 0; }
          .rg-exp-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-bottom: 32px; }
          .rg-exp-card { text-align: center; padding: 32px 24px; background: var(--risin-bg-lighter); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); transition: all var(--risin-transition); }
          .rg-exp-card:hover { border-color: rgba(5,150,105,0.3); box-shadow: var(--risin-shadow-lg); transform: translateY(-4px); }
          .rg-exp-ic { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg,#059669,#0891B2); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
          .rg-exp-ic svg { width: 26px; height: 26px; color: white; }
          .rg-exp-card strong { display: block; font-size: 28px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
          .rg-exp-card h4 { font-size: 15px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 8px; }
          .rg-exp-card p { font-size: 13px; color: var(--risin-text-muted); line-height: 1.6; margin: 0; }
          .rg-intl-row { display: flex; gap: 16px; align-items: flex-start; padding: 24px 28px; background: linear-gradient(135deg,rgba(5,150,105,0.04),rgba(8,145,178,0.04)); border: 1px solid rgba(5,150,105,0.15); border-radius: var(--risin-radius-xl); }
          .rg-intl-row svg { width: 28px; height: 28px; color: #0891B2; flex-shrink: 0; margin-top: 2px; }
          .rg-intl-row p { margin: 0; font-size: 15px; color: var(--risin-text-dark); line-height: 1.6; }
          .rg-intl-row strong { color: #059669; }
          @@media (max-width: 768px) { .rg-exp-grid { grid-template-columns: 1fr; } }

          /* ── CTA ── */
          .rg-cta { background: linear-gradient(135deg,#059669,#0891B2); padding: var(--risin-section-py) 0; text-align: center; }
          .rg-cta h2 { font-size: 36px; font-weight: 700; color: white; margin-bottom: 16px; }
