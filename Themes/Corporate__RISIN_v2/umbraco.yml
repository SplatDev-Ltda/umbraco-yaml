            <body>

            <h1>Contrato de Locação de Endereço Eletrônico</h1>
            <p class="subtitle">Plataforma Clikashop RISIN – Rede de Informações e Serviços na Internet Ltda.</p>
            <p style="text-align:center"><span class="badge">Programa Lojista Parceiro Fundador – {{PLANO}}</span></p>

            <h2>Qualificação das Partes</h2>
            <table class="pt">
              <tr>
                <td>LOCADORA</td>
                <td>Rede de Informações e Serviços na Internet Ltda. – RISIN, pessoa jurídica de direito
                privado, inscrita no CNPJ/MF sob o nº <strong>19.351.433/0001-10</strong>, com sede em
                Niterói – RJ, doravante denominada <strong>RISIN</strong>.</td>
              </tr>
              <tr>
                <td>LOCATÁRIA</td>
                <td><strong>{{RAZAO_SOCIAL}}</strong>, pessoa jurídica de direito privado,
                inscrita no CNPJ/MF sob o nº <strong>{{CNPJ}}</strong>,
                doravante denominada <strong>LOCATÁRIA</strong>.</td>
              </tr>
              <tr><td>Regional</td><td>{{REGIONAL}}</td></tr>
              <tr><td>Plano / Condição</td><td>{{PLANO}} – Lojista Parceiro Fundador</td></tr>
              <tr><td>Aluguel Mensal</td><td><strong>{{VALOR_MENSAL}}</strong></td></tr>
            </table>

            <h2>Cláusula 1ª – Objeto</h2>
            <div class="cl">
              <p>1.1. O presente contrato tem por objeto a locação de <strong>Endereço Eletrônico</strong> na
              plataforma Clikashop RISIN, consistindo na cessão de espaço virtual identificado na Regional
              <strong>{{REGIONAL}}</strong>, para exposição e comercialização de produtos e serviços
              da LOCATÁRIA.</p>
              <p>1.2. O Endereço Eletrônico constitui ambiente digital exclusivo dentro do ecossistema RISIN,
              com URL, identidade visual e métricas individualizadas.</p>
              <p>1.3. Este contrato enquadra-se no <strong>Programa Lojista Parceiro Fundador</strong>,
              restrito às primeiras <strong>5.000 (cinco mil) vagas</strong> disponibilizadas pela RISIN.
              As condições ora pactuadas são exclusivas deste programa e não se aplicam a contratações
              realizadas após o preenchimento integral das vagas fundadoras.</p>
            </div>

            <h2>Cláusula 2ª – Vigência</h2>
            <div class="cl">
              <p>2.1. Este contrato terá vigência de <strong>24 (vinte e quatro) meses</strong>, com início em
              <strong>{{DATA_INICIO}}</strong> e término em <strong>{{DATA_FIM}}</strong>.</p>
              <p>2.2. Findo o prazo sem manifestação de qualquer das partes com antecedência mínima de
              30 (trinta) dias, o contrato se prorrogará automaticamente por períodos iguais e sucessivos.</p>
            </div>

            <h2>Cláusula 3ª – Aluguel Mensal</h2>
            <div class="cl">
              <p>3.1. Pela locação do Endereço Eletrônico no âmbito do Programa Lojista Parceiro Fundador,
              a LOCATÁRIA pagará à RISIN o valor mensal de <strong>{{VALOR_MENSAL}}</strong>,
              vencível todo dia 10 (dez) de cada mês, a contar de {{DATA_INICIO}}.</p>
              <p>3.2. O pagamento será realizado por boleto bancário, PIX ou débito automático,
              conforme opção efetuada no cadastro.</p>
              <p>3.3. O inadimplemento superior a 15 (quinze) dias corridos implicará suspensão temporária
              do Endereço Eletrônico; superior a 30 (trinta) dias ensejará rescisão motivada deste
              contrato, sem prejuízo da execução da caução.</p>
              <p>3.4. O valor mensal será reajustado anualmente pelo IPCA/IBGE acumulado no período,
              preservando-se, durante a vigência inicial de 24 meses, as condições do Programa Fundador.</p>
            </div>

            <h2>Cláusula 4ª – Comissões sobre Vendas</h2>
            <div class="cl">
              <div class="adendo">
                <p>4.1. Sobre as vendas realizadas pela LOCATÁRIA por meio do Endereço Eletrônico na
                plataforma Clikashop RISIN, incidirão comissões nos percentuais e condições definidos
                no <strong>Adendo Comercial</strong>, firmado pelas partes como parte integrante deste
                contrato.</p>
                <p>4.2. O Adendo Comercial especificará: (i) percentuais de comissão por categoria de
                produto ou serviço; (ii) base de cálculo; (iii) periodicidade de apuração e prazo de
                repasse; (iv) eventuais isenções ou reduções aplicáveis.</p>
                <p>4.3. Na ausência de Adendo Comercial assinado, nenhuma comissão sobre vendas será
                devida, limitando-se a remuneração da RISIN ao aluguel mensal da Cláusula 3ª.</p>
              </div>
            </div>

            <h2>Cláusula 5ª – Taxa de Administração de Condomínio</h2>
            <div class="cl">
              <p>5.1. Além do aluguel mensal, a LOCATÁRIA contribuirá mensalmente com a
              <strong>Taxa de Administração de Condomínio</strong> do setor atribuído para o
              estabelecimento de sua Loja na Regional <strong>{{REGIONAL}}</strong>.</p>
              <p>5.2. A Taxa de Administração de Condomínio corresponde a
              <strong>15% (quinze por cento)</strong> sobre o valor total de administração do
              condomínio do setor, rateado proporcionalmente entre os lojistas ativos no
              respectivo setor da Regional.</p>
              <p>5.3. O valor da Taxa de Condomínio será apurado mensalmente pela RISIN e comunicado
              à LOCATÁRIA até o dia 5 (cinco) de cada mês, com vencimento no dia 15 (quinze).</p>
              <p>5.4. O não pagamento da Taxa de Condomínio por prazo superior a 30 (trinta) dias
              sujeitará a LOCATÁRIA às mesmas consequências do inadimplemento do aluguel, previstas
              na Cláusula 3.3.</p>
            </div>

            <h2>Cláusula 6ª – Caução</h2>
            <div class="cl">
              <p>6.1. A LOCATÁRIA depositará caução equivalente a <strong>3 (três) meses</strong> do
              valor mensal contratado (3 × {{VALOR_MENSAL}}) como garantia contratual, devida no
              ato da assinatura deste instrumento.</p>
              <p>6.2. A caução será restituída em até 30 (trinta) dias após o encerramento regular
              do contrato, corrigida pelo IPCA, deduzidos eventuais débitos de aluguel, comissões
              ou taxa de condomínio pendentes.</p>
              <p>6.3. É vedada a utilização da caução para pagamento das últimas mensalidades.</p>
            </div>

            <h2>Cláusula 7ª – Obrigações da RISIN</h2>
            <div class="cl">
              <ol>
                <li>Disponibilizar o Endereço Eletrônico com disponibilidade mínima de 99,5% ao mês,
                excluídos períodos de manutenção programada comunicados com 48h de antecedência;</li>
                <li>Fornecer suporte técnico em dias úteis, das 09h às 18h (horário de Brasília);</li>
                <li>Manter a segurança dos dados em conformidade com a Lei nº 13.709/2018 (LGPD);</li>
                <li>Emitir relatório mensal de métricas de acesso ao Endereço Eletrônico;</li>
                <li>Administrar o condomínio do setor e prestar contas mensais da Taxa de Administração.</li>
              </ol>
            </div>

            <h2>Cláusula 8ª – Obrigações da LOCATÁRIA</h2>
            <div class="cl">
              <ol>
                <li>Efetuar pontualmente o pagamento do aluguel mensal e da Taxa de Condomínio;</li>
                <li>Utilizar o Endereço Eletrônico exclusivamente para atividades descritas no cadastro,
                em conformidade com a legislação vigente;</li>
                <li>Não sublocar, ceder ou transferir o Endereço Eletrônico a terceiros sem prévia
                anuência escrita da RISIN;</li>
                <li>Manter atualizados seus dados cadastrais, incluindo contato e informações fiscais;</li>
                <li>Assegurar que o conteúdo publicado não infrinja direitos de propriedade intelectual
                ou de terceiros;</li>
                <li>Informar à RISIN toda venda realizada pelo Endereço Eletrônico sujeita a comissão,
                conforme definido no Adendo Comercial.</li>
              </ol>
            </div>

            <h2>Cláusula 9ª – Rescisão</h2>
            <div class="cl">
              <p>9.1. <strong>Por Inadimplemento:</strong> O descumprimento de qualquer obrigação pela
              LOCATÁRIA autoriza a RISIN a rescindir de imediato, sem prejuízo da cobrança dos valores
              devidos e da execução da caução.</p>
              <p>9.2. <strong>Voluntária pela LOCATÁRIA:</strong> Mediante aviso prévio de 30 (trinta)
              dias. Rescisão antes de 12 (doze) meses incidirá multa equivalente a 3 (três)
              mensalidades, sem prejuízo de comissões e taxas devidas até a data da rescisão.</p>
              <p>9.3. <strong>Voluntária pela RISIN:</strong> Mediante aviso prévio de 60 (sessenta)
              dias, com restituição da caução e dos valores pagos proporcionalmente ao período
              não usufruído.</p>
              <p>9.4. A rescisão implica o encerramento imediato do Endereço Eletrônico e a exclusão
              do cadastro da LOCATÁRIA na plataforma Clikashop RISIN.</p>
            </div>

            <h2>Cláusula 10ª – Proteção de Dados (LGPD)</h2>
            <div class="cl lgpd">
              <p><strong>Aviso de Privacidade:</strong> Os dados coletados neste contrato são tratados
              pela RISIN como <em>Controladora</em>, com fundamento no art. 7º, V da Lei nº
              13.709/2018 (LGPD), para: (i) gestão contratual e operacional; (ii) emissão de
              documentos fiscais; (iii) apuração e repasse de comissões; (iv) comunicações
              relacionadas ao serviço. O compartilhamento limita-se a prestadores de serviço
              (operadores) vinculados por obrigações equivalentes de confidencialidade.
              A LOCATÁRIA pode exercer direitos de acesso, correção, portabilidade e eliminação
              pelo e-mail <strong>privacidade@risin.com.br</strong>. Retenção: vigência contratual
              + 5 anos para fins fiscais e legais.</p>
            </div>

            <h2>Cláusula 11ª – Disposições Gerais</h2>
            <div class="cl">
              <p>11.1. Este contrato é celebrado em caráter irrevogável e irretratável, obrigando
              as partes e seus sucessores.</p>
              <p>11.2. Qualquer alteração somente será válida se formalizada por escrito e assinada
              pelas partes, incluindo eventuais Adendos Comerciais.</p>
              <p>11.3. A tolerância quanto ao descumprimento de qualquer disposição não constituirá
              novação ou renúncia ao direito de exigir seu cumprimento.</p>
              <p>11.4. Este contrato substitui todos os entendimentos anteriores sobre o mesmo objeto.</p>
              <p>11.5. O Adendo Comercial, quando assinado, integra este contrato para todos os
              fins legais.</p>
            </div>

            <h2>Cláusula 12ª – Foro</h2>
            <div class="cl">
              <p>12.1. Fica eleito o foro da Comarca de Niterói – RJ para dirimir litígios
              decorrentes deste contrato, com renúncia a qualquer outro, por mais privilegiado
              que seja.</p>
            </div>

            <p style="margin-top:40px">Niterói (RJ), {{DATA_INICIO}}.</p>

