      <style>
          /* ── Hero ── */
          .home-hero { position: relative; background: linear-gradient(135deg,#F3F4F6,#F9FAFB,#F3F4F6); padding: var(--risin-section-py) 0; overflow: hidden; }
          .home-hero .grid-bg { position: absolute; inset: 0; opacity: 0.3; background-image: linear-gradient(rgba(5,150,105,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(5,150,105,0.1) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .home-hero .orb { position: absolute; border-radius: 50%; filter: blur(48px); animation: pulse 2s ease-in-out infinite; pointer-events: none; }
          .home-hero .orb-green { top: 80px; right: 160px; width: 384px; height: 384px; background: rgba(5,150,105,0.1); }
          .home-hero .orb-cyan  { bottom: 80px; left: 160px; width: 384px; height: 384px; background: rgba(8,145,178,0.1); animation-delay: 1s; }
          .hh-container { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; display: flex; gap: 48px; align-items: center; }
          .hh-left  { width: 600px; flex-shrink: 0; }
          .hh-right { flex: 1; }
          .hh-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.2); border-radius: 9999px; margin-bottom: 24px; }
          .hh-badge svg { width: 16px; height: 16px; color: #059669; }
          .hh-badge span { font-size: 14px; font-weight: 500; color: #059669; }
          .home-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: var(--risin-text-dark); line-height: 1.15; margin-bottom: 24px; }
          .home-hero h1 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .hh-subtitle { font-size: 18px; color: var(--risin-text-muted); margin-bottom: 32px; line-height: 1.7; }
          .hh-actions { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
          .hh-btn-p { display: inline-flex; align-items: center; gap: 8px; height: 48px; padding: 0 28px; background: linear-gradient(90deg,#059669,#047857); color: white; font-weight: 600; font-size: 15px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-lg); transition: all var(--risin-transition); text-decoration: none; }
          .hh-btn-p:hover { box-shadow: var(--risin-shadow-2xl); transform: translateY(-1px); }
          .hh-btn-p svg,.hh-btn-s svg { width: 16px; height: 16px; }
          .hh-btn-s { display: inline-flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: var(--risin-text-subtle); transition: color var(--risin-transition); text-decoration: none; }
          .hh-btn-s:hover { color: #059669; }
          .hh-frame { position: relative; border-radius: var(--risin-radius-xl); overflow: hidden; height: 400px; }
          .hh-frame img { width: 100%; height: 100%; object-fit: cover; transition: transform 500ms ease; }
          .hh-frame:hover img { transform: scale(1.05); }
          .hh-frame .ov  { position: absolute; inset: 0; background: linear-gradient(135deg,rgba(5,150,105,0.2),rgba(8,145,178,0.2)); z-index: 1; }
          .hh-frame .bov { position: absolute; inset: 0; border: 2px solid rgba(5,150,105,0.3); border-radius: var(--risin-radius-xl); z-index: 2; pointer-events: none; }
          @@media (max-width: 1024px) { .hh-container { flex-direction: column; } .hh-left { width: 100%; } .home-hero h1 { font-size: 36px; } }
          @@media (max-width: 640px) { .home-hero h1 { font-size: 28px; } .hh-actions { flex-direction: column; align-items: flex-start; } .hh-frame { height: 220px; } }
      
          /* ── Visao Macro ── */
          .visao-macro { background: white; padding: var(--risin-section-py) 0; position: relative; overflow: hidden; }
          .visao-macro .bg-orb { position: absolute; top: 0; right: 0; width: 500px; height: 500px; background: linear-gradient(225deg,rgba(5,150,105,0.05),transparent); border-radius: 50%; filter: blur(48px); pointer-events: none; }
          .vm-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .vm-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; text-align: center; }
          .vm-sub { text-align: center; color: var(--risin-text-muted); margin-bottom: 48px; max-width: 768px; margin-left: auto; margin-right: auto; line-height: 1.7; }
          .vm-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 24px; }
          .vm-card { position: relative; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); padding: 24px; transition: all var(--risin-transition); overflow: hidden; }
          .vm-card:hover { border-color: rgba(5,150,105,0.5); box-shadow: var(--risin-shadow-xl); transform: translateY(-4px); }
          .vm-card .vm-bg { position: absolute; inset: 0; opacity: 0; transition: opacity var(--risin-transition); border-radius: var(--risin-radius-lg); }
          .vm-card:hover .vm-bg { opacity: 0.05; }
          .vm-inner { position: relative; }
          .vm-icon { width: 48px; height: 48px; border-radius: var(--risin-radius-lg); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; transition: transform var(--risin-transition); }
          .vm-card:hover .vm-icon { transform: scale(1.1); }
          .vm-icon svg { width: 24px; height: 24px; color: white; }
          .vm-card h3 { font-weight: 700; color: var(--risin-text-dark); margin-bottom: 8px; font-size: 16px; }
          .vm-card p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; margin-bottom: 12px; }
          .vm-line { height: 2px; width: 24px; border-radius: 1px; background: var(--risin-border); transition: width var(--risin-transition); }
          .vm-card:hover .vm-line { width: 48px; }
          @@media (max-width: 1024px) { .vm-grid { grid-template-columns: repeat(2,1fr); } }
          @@media (max-width: 640px)  { .vm-grid { grid-template-columns: 1fr; } }
      
          /* ── Ecossistema ── */
          .eco-sec { position: relative; background: linear-gradient(180deg,#F9FAFB,white); padding: var(--risin-section-py) 0; overflow: hidden; }
          .eco-sec .dot-bg { position: absolute; inset: 0; opacity: 0.2; background-image: radial-gradient(circle at 1px 1px,#059669 1px,transparent 0); background-size: 40px 40px; pointer-events: none; }
          .eco-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .eco-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; text-align: center; }
          .eco-wrap h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .eco-sub { text-align: center; color: var(--risin-text-muted); margin-bottom: 48px; max-width: 768px; margin-left: auto; margin-right: auto; line-height: 1.7; }
          .eco-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; }
          .eco-card { background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 24px; transition: all var(--risin-transition); }
          .eco-card:hover { border-color: rgba(5,150,105,0.5); box-shadow: var(--risin-shadow-2xl); }
          .eco-row { display: flex; align-items: flex-start; gap: 16px; }
          .eco-icon { width: 56px; height: 56px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform var(--risin-transition); }
          .eco-card:hover .eco-icon { transform: scale(1.1); }
          .eco-icon svg { width: 28px; height: 28px; }
          .eco-text h3 { font-size: 18px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 8px; }
          .eco-text p  { font-size: 14px; color: var(--risin-text-muted); margin-bottom: 12px; line-height: 1.6; }
          .eco-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 500; transition: gap var(--risin-transition); text-decoration: none; }
          .eco-link svg { width: 14px; height: 14px; }
          @@media (max-width: 768px) { .eco-grid { grid-template-columns: 1fr; } }
      
          /* ── Modelo Economico ── */
          .modelo-sec { position: relative; background: white; padding: var(--risin-section-py) 0; overflow: hidden; }
          .modelo-sec .top-acc { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .me-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .me-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 32px; }
          .me-wrap h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .me-row { display: flex; gap: 64px; align-items: flex-start; }
          .bullet-list { flex: 1; list-style: none; display: flex; flex-direction: column; gap: 16px; }
          .bullet-item { display: flex; gap: 16px; align-items: flex-start; }
          .b-marker { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
          .b-dot  { width: 10px; height: 10px; background: linear-gradient(135deg,#059669,#0891B2); border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
          .b-conn { width: 2px; height: 32px; background: linear-gradient(180deg,rgba(5,150,105,0.3),transparent); }
          .b-text { color: var(--risin-text-dark); line-height: 1.6; padding-top: 4px; }
          .impact-col { flex: 1; }
          .impact-card { position: relative; background: linear-gradient(135deg,#F9FAFB,white); border-left: 4px solid #059669; border-radius: 0 var(--risin-radius-xl) var(--risin-radius-xl) 0; padding: 32px; box-shadow: var(--risin-shadow-lg); }
          .impact-icon { position: absolute; top: -24px; right: -24px; width: 64px; height: 64px; background: linear-gradient(135deg,#059669,#0891B2); border-radius: var(--risin-radius-xl); transform: rotate(12deg); display: flex; align-items: center; justify-content: center; box-shadow: var(--risin-shadow-xl); }
          .impact-icon svg { width: 32px; height: 32px; color: white; transform: rotate(-12deg); }
          .impact-txt { font-size: 18px; color: var(--risin-text-dark); line-height: 1.7; }
          .hl-g::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: rgba(5,150,105,0.2); z-index: -1; }
          .hl-c::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: rgba(8,145,178,0.2); z-index: -1; }
          .hl-g,.hl-c { position: relative; display: inline; }
          @@media (max-width: 1024px) { .me-row { flex-direction: column; gap: 40px; } }
      
          /* ── Governanca ── */
          .gov-sec { position: relative; background: var(--risin-bg-lighter); padding: var(--risin-section-py) 0; overflow: hidden; }
          .gov-orbital { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
          .gov-ring { position: absolute; border: 1px solid rgba(5,150,105,0.1); border-radius: 50%; }
          .gov-r1 { width: 400px; height: 400px; } .gov-r2 { width: 600px; height: 600px; } .gov-r3 { width: 800px; height: 800px; }
          .gov-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .gov-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; text-align: center; }
          .gov-wrap h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .gov-sub { text-align: center; color: var(--risin-text-muted); margin-bottom: 48px; max-width: 768px; margin-left: auto; margin-right: auto; line-height: 1.7; }
          .gov-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 32px; margin-bottom: 48px; }
          .gov-item { text-align: center; padding: 32px 24px; background: white; border-radius: var(--risin-radius-xl); box-shadow: var(--risin-shadow); transition: all var(--risin-transition); }
          .gov-item:hover { box-shadow: var(--risin-shadow-xl); transform: translateY(-4px); }
          .gov-iw { position: relative; display: inline-flex; margin-bottom: 20px; }
          .gov-ic { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
          .gov-ic svg { width: 28px; height: 28px; color: white; }
          .gov-nb { position: absolute; bottom: -4px; right: -4px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; }
          .gov-item h3 { font-size: 18px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .gov-item p  { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; }
          .gov-cta { display: flex; justify-content: center; }
          .gov-btn { display: inline-flex; align-items: center; gap: 8px; height: 48px; padding: 0 28px; border: 2px solid #059669; color: #059669; font-weight: 600; font-size: 15px; border-radius: var(--risin-radius-lg); transition: all var(--risin-transition); text-decoration: none; }
          .gov-btn:hover { background: #059669; color: white; box-shadow: var(--risin-shadow-lg); }
          .gov-btn svg { width: 16px; height: 16px; }
          @@media (max-width: 768px) { .gov-grid { grid-template-columns: 1fr; } }
      
          /* ── Parceiros ── */
          .par-sec { background: white; padding: var(--risin-section-py) 0; }
          .par-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .par-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; text-align: center; }
          .par-wrap h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .par-sub { text-align: center; color: var(--risin-text-muted); margin-bottom: 48px; max-width: 768px; margin-left: auto; margin-right: auto; line-height: 1.7; }
          .par-row { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; margin-bottom: 48px; }
          .par-item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
          .par-pulse { position: relative; display: flex; align-items: center; justify-content: center; }
          .par-pdot { width: 8px; height: 8px; border-radius: 50%; position: absolute; animation: ping 1.5s ease-in-out infinite; opacity: 0.5; }
          .par-ibox { width: 80px; height: 80px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; border: 2px solid transparent; }
          .par-ibox svg { width: 32px; height: 32px; }
          .par-name { font-size: 14px; font-weight: 600; color: var(--risin-text-dark); }
          .par-cta { display: flex; justify-content: center; }
          .par-btn { position: relative; display: inline-flex; align-items: center; gap: 12px; height: 56px; padding: 0 36px; background: linear-gradient(90deg,#059669,#047857); color: white; font-weight: 700; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-xl); transition: all var(--risin-transition); text-decoration: none; overflow: hidden; }
          .par-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg,#0891B2,#059669); opacity: 0; transition: opacity var(--risin-transition); }
          .par-btn:hover::after { opacity: 1; }
          .par-btn span { position: relative; z-index: 1; display: flex; align-items: center; gap: 12px; }
          .par-btn svg { width: 18px; height: 18px; }
      
          /* ── Expansao ── */
          .exp-sec { position: relative; background: linear-gradient(135deg,#F9FAFB,white,#F9FAFB); padding: var(--risin-section-py) 0; overflow: hidden; }
          .exp-fl { position: absolute; left: 0; width: 100%; height: 1px; }
          .exp-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .exp-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 48px; text-align: center; }
          .exp-wrap h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .exp-row { display: flex; gap: 64px; align-items: center; }
          .exp-tl { flex: 1; display: flex; flex-direction: column; gap: 24px; }
          .exp-ti { position: relative; padding: 20px 20px 20px 24px; border-left: 3px solid rgba(5,150,105,0.3); border-radius: 0 var(--risin-radius-lg) var(--risin-radius-lg) 0; background: rgba(255,255,255,0.8); box-shadow: var(--risin-shadow); }
          .exp-td { width: 12px; height: 12px; border-radius: 50%; position: absolute; left: -7px; top: 24px; }
          .exp-ti p { color: var(--risin-text-subtle); line-height: 1.7; font-size: 15px; }
          .exp-map { flex: 1; }
          .exp-mf { position: relative; background: linear-gradient(135deg,#F9FAFB,white); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); overflow: hidden; padding: 24px; box-shadow: var(--risin-shadow-lg); }
          .exp-leg { display: flex; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--risin-border); }
          .exp-li { display: flex; align-items: center; gap: 8px; font-size: 13px; }
          .exp-ld { width: 10px; height: 10px; border-radius: 50%; }
          @@media (max-width: 1024px) { .exp-row { flex-direction: column; } }
      
          /* ── Chamada Final ── */
          .cf-sec { position: relative; background: var(--risin-bg-lighter); padding: calc(var(--risin-section-py)*1.5) 0; overflow: hidden; text-align: center; }
          .cf-sec .radial { position: absolute; inset: 0; background: radial-gradient(ellipse at center,rgba(5,150,105,0.08) 0%,transparent 60%); pointer-events: none; }
          .cf-rings { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
          .cf-r { position: absolute; border: 1px solid rgba(5,150,105,0.08); border-radius: 50%; }
          .cf-r1 { width: 400px; height: 400px; } .cf-r2 { width: 700px; height: 700px; } .cf-r3 { width: 1000px; height: 1000px; }
          .cf-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .cf-wrap h2 { font-size: clamp(32px,5vw,56px); font-weight: 900; color: var(--risin-text-dark); line-height: 1.1; }
          .cf-g1 { background: linear-gradient(90deg,#059669,#047857); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .cf-g2 { background: linear-gradient(90deg,#047857,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .cf-g3 { background: linear-gradient(90deg,#0891B2,#059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .cf-line { width: 80px; height: 3px; background: linear-gradient(90deg,#059669,#0891B2); border-radius: 2px; margin: 16px auto 0; }
          .cf-sub { font-size: 18px; color: var(--risin-text-muted); max-width: 640px; margin: 24px auto 40px; line-height: 1.7; }
          .cf-acts { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; }
          .cf-bp { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: linear-gradient(90deg,#059669,#047857); color: white; font-weight: 600; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-xl); transition: all var(--risin-transition); text-decoration: none; }
          .cf-bp:hover { box-shadow: var(--risin-shadow-2xl); transform: translateY(-1px); }
          .cf-bp svg,.cf-bs svg { width: 18px; height: 18px; }
          .cf-bs { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: white; border: 2px solid #0891B2; color: #0891B2; font-weight: 500; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-lg); transition: all var(--risin-transition); text-decoration: none; }
          .cf-bs:hover { background: #0891B2; color: white; box-shadow: var(--risin-shadow-2xl); }
          .cf-dots { display: flex; justify-content: center; gap: 16px; margin-top: 48px; }
          .cf-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
      </style>
      
      <main>
      
          <!-- Hero -->
          <section class="home-hero">
              <div class="grid-bg"></div>
              <div class="orb orb-green"></div>
              <div class="orb orb-cyan"></div>
              <div class="hh-container">
                  <div class="hh-left">
                      <div class="hh-badge">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
                          <span>Plataforma Digital em Implanta&#231;&#227;o</span>
                      </div>
                      <h1>RISIN &#8211; Plataforma Empresarial Digital em <span class="grad">Implanta&#231;&#227;o Estruturada</span></h1>
                      <p class="hh-subtitle">Integra&#231;&#227;o de 08 websites sob um ecossistema tecnol&#243;gico &#250;nico, com modelo regional estruturado e governan&#231;a progressiva para escalar empresas com seguran&#231;a.</p>
                      <div class="hh-actions">
                          <a class="hh-btn-p" href="@(heroLink1?.Url ?? "/a-risin")">
                              @(heroLink1?.Name ?? "Conhe&#231;a o Projeto")
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
                          </a>
                          <a class="hh-btn-s" href="@(heroLink2?.Url ?? "/parceiros")">
                              @(heroLink2?.Name ?? "Parcerias Estruturantes")
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
                          </a>
                      </div>
                  </div>
                  <div class="hh-right">
                      <div class="hh-frame">
                          <div class="ov"></div>
                          <div class="bov"></div>
                          <img src="@(heroImg != null ? heroImg.Url() : "https://images.unsplash.com/photo-1703635499934-33a8fd14dbf4?auto=format&fit=crop&w=1920&q=85")" alt="RISIN Plataforma Digital" loading="lazy" />
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Visao Macro -->
          <section class="visao-macro">
              <div class="bg-orb"></div>
              <div class="vm-wrap">
                  <h2>Vis&#227;o Macro do Projeto</h2>
                  <p class="vm-sub">Um projeto estruturado para transformar a forma como empresas escalam digitalmente no Brasil, com governan&#231;a, tecnologia e modelo econ&#244;mico integrados desde a concep&#231;&#227;o.</p>
                  <div class="vm-grid">
                      @{
                          int piIdx = 0;
                          if (macroPilars != null && macroPilars.Any())
                          {
                              foreach (var pilar in macroPilars)
                              {
                                  var pT = pilar.Content.Value<string>("title") ?? "";
                                  var pD = pilar.Content.Value<string>("text") ?? "";
                                  var pG = pilarGradients[piIdx % 4];
                                  <div class="vm-card">
                                      <div class="vm-bg" style="background: @pG"></div>
                                      <div class="vm-inner">
                                          <div class="vm-icon" style="background: @pG">@Html.Raw(pilarIcons[piIdx % 4])</div>
                                          <h3>@pT</h3>
                                          <p>@pD</p>
                                          <div class="vm-line" style="background: @pG"></div>
                                      </div>
                                  </div>
                                  piIdx++;
                              }
                          }
                          else
                          {
                              for (int i = 0; i < defaultPilars.Length; i++)
                              {
                                  <div class="vm-card">
                                      <div class="vm-bg" style="background: @pilarGradients[i]"></div>
                                      <div class="vm-inner">
                                          <div class="vm-icon" style="background: @pilarGradients[i]">@Html.Raw(pilarIcons[i])</div>
                                          <h3>@Html.Raw(defaultPilars[i].Title)</h3>
                                          <p>@Html.Raw(defaultPilars[i].Description)</p>
                                          <div class="vm-line" style="background: @pilarGradients[i]"></div>
                                      </div>
                                  </div>
                              }
                          }
                      }
                  </div>
              </div>
          </section>
      
          <!-- Ecossistema -->
          <section class="eco-sec">
              <div class="dot-bg"></div>
              <div class="eco-wrap">
                  <h2>Ecossistema RISIN &#8211; <span class="grad">Plataformas Integradas</span></h2>
                  <p class="eco-sub">Oito websites independentes funcionando sob uma &#250;nica infraestrutura tecnol&#243;gica, compartilhando governan&#231;a, dados e modelo econ&#244;mico para criar valor exponencial.</p>
                  <div class="eco-grid">
                      @foreach (var p in platforms)
                      {
                          <div class="eco-card">
                              <div class="eco-row">
                                  <div class="eco-icon" style="background: linear-gradient(135deg,@(p.Color)20,@(p.Color)10)">
                                      @Html.Raw(p.Icon.Replace("currentColor", p.Color))
                                  </div>
                                  <div class="eco-text">
                                      <h3>@Html.Raw(p.Name)</h3>
                                      <p>@Html.Raw(p.Desc)</p>
                                      <a class="eco-link" href="/ecossistema" style="color: @p.Color">
                                          Ver detalhes
                                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                                      </a>
                                  </div>
                              </div>
                          </div>
                      }
                  </div>
              </div>
          </section>
      
          <!-- Modelo Economico -->
          <section class="modelo-sec">
              <div class="top-acc"></div>
              <div class="me-wrap">
                  <h2>Modelo Econ&#244;mico <span class="grad">Estruturado</span></h2>
                  <div class="me-row">
                      <ul class="bullet-list">
                          @{ int bi = 0; var bList = econBullets.ToList(); }
                          @foreach (var bullet in bList)
                          {
                              <li class="bullet-item">
                                  <div class="b-marker">
                                      <div class="b-dot"></div>
                                      @if (bi < bList.Count - 1) { <div class="b-conn"></div> }
                                  </div>
                                  <span class="b-text">@Html.Raw(bullet)</span>
                              </li>
                              bi++;
                          }
                      </ul>
                      <div class="impact-col">
                          <div class="impact-card">
                              <div class="impact-icon">
                                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941"/></svg>
                              </div>
                              <p class="impact-txt">
                                  Modelo projetado para <strong><span class="hl-g">sustentabilidade</span></strong>, <strong><span class="hl-c">escalabilidade</span></strong> e <strong><span class="hl-g">previsibilidade financeira</span></strong>.
                              </p>
                          </div>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Governanca -->
          <section class="gov-sec">
              <div class="gov-orbital">
                  <div class="gov-ring gov-r1"></div>
                  <div class="gov-ring gov-r2"></div>
                  <div class="gov-ring gov-r3"></div>
              </div>
              <div class="gov-wrap">
                  <h2><span class="grad">Governan&#231;a</span> desde a Implanta&#231;&#227;o</h2>
                  <p class="gov-sub">Estrutura de governan&#231;a corporativa implementada desde o dia zero, garantindo transpar&#234;ncia, responsabilidade e crescimento sustent&#225;vel em todas as fases do projeto.</p>
                  <div class="gov-grid">
                      @for (int gi = 0; gi < govItems.Length; gi++)
                      {
                          <div class="gov-item">
                              <div class="gov-iw">
                                  <div class="gov-ic" style="background: linear-gradient(135deg,@govItems[gi].Color,@(govItems[gi].Color)dd)">
                                      @Html.Raw(govItems[gi].Icon)
                                  </div>
                                  <div class="gov-nb" style="background: @govItems[gi].Color">@(gi+1)</div>
                              </div>
                              <h3>@Html.Raw(govItems[gi].Title)</h3>
                              <p>@Html.Raw(govItems[gi].Desc)</p>
                          </div>
                      }
                  </div>
                  <div class="gov-cta">
                      <a class="gov-btn" href="/governanca">
                          Conhe&#231;a a Estrutura de Governan&#231;a
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                      </a>
                  </div>
              </div>
          </section>
      
          <!-- Parceiros -->
          <section class="par-sec">
              <div class="par-wrap">
                  <h2>Programa <span class="grad">Parceiros RISIN</span></h2>
                  <p class="par-sub">Buscamos parceiros estrat&#233;gicos nas &#225;reas-chave para construir um ecossistema robusto e integrado. Oportunidades estruturadas para empresas que compartilham nossa vis&#227;o.</p>
                  <div class="par-row">
                      @foreach (var p in partners)
                      {
                          <div class="par-item">
                              <div class="par-pulse">
                                  <div class="par-pdot" style="background: @p.Color; width: 80px; height: 80px;"></div>
                                  <div class="par-ibox" style="background: linear-gradient(135deg,@(p.Color)15,@(p.Color)05); border-color: @(p.Color)30">
                                      <svg fill="none" viewBox="0 0 24 24" stroke="@p.Color" stroke-width="2" style="width:32px;height:32px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
                                  </div>
                              </div>
                              <span class="par-name">@Html.Raw(p.Name)</span>
                          </div>
                      }
                  </div>
                  <div class="par-cta">
                      <a class="par-btn" href="@(partnersLink?.Url ?? "/parceiros")">
                          <span>
                              @(partnersLink?.Name ?? "Seja Parceiro Estruturante")
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                          </span>
                      </a>
                  </div>
              </div>
          </section>
      
          <!-- Expansao -->
          <section class="exp-sec">
              <div class="exp-fl" style="top:25%;background:linear-gradient(90deg,transparent,rgba(5,150,105,0.1),transparent)"></div>
              <div class="exp-fl" style="top:75%;background:linear-gradient(90deg,transparent,rgba(8,145,178,0.1),transparent)"></div>
              <div class="exp-wrap">
                  <h2>Arquitetura para Evolu&#231;&#227;o em <span class="grad">Holding Digital</span></h2>
                  <div class="exp-row">
                      <div class="exp-tl">
                          <div class="exp-ti" style="border-left-color:rgba(5,150,105,0.5)">
                              <div class="exp-td" style="background:#059669"></div>
                              <p><strong style="color:#059669">2 Regionais Modelo</strong> iniciais (S&#227;o Paulo e Rio de Janeiro) para valida&#231;&#227;o completa do modelo de governan&#231;a, tecnologia e opera&#231;&#227;o.</p>
                          </div>
                          <div class="exp-ti" style="border-left-color:rgba(8,145,178,0.3)">
                              <div class="exp-td" style="background:#0891B2"></div>
                              <p>Expans&#227;o estruturada para <strong style="color:#0891B2">478 regionais</strong> cobrindo todo o territ&#243;rio nacional, com replica&#231;&#227;o consistente de governan&#231;a e padr&#245;es operacionais.</p>
                          </div>
                          <div class="exp-ti" style="border-left-color:rgba(5,150,105,0.2)">
                              <div class="exp-td" style="background:#059669;opacity:0.6"></div>
                              <p>Horizonte de expans&#227;o internacional para pa&#237;ses lus&#243;fonos e mercados latino-americanos com <strong style="color:#059669">governan&#231;a adaptada</strong>.</p>
                          </div>
                      </div>
                      <div class="exp-map">
                          <div class="exp-mf">
                              @if (expansionMapImg != null)
                              {
                                  <img src="@expansionMapImg.Url()" alt="Mapa de Expans&#227;o RISIN" style="width:100%;border-radius:var(--risin-radius-lg)" />
                              }
                              else
                              {
                                  <div style="padding:40px;text-align:center">
                                      <div style="font-size:14px;font-weight:600;color:var(--risin-text-muted);margin-bottom:24px">Mapa de Expans&#227;o Nacional</div>
                                      <div style="display:flex;gap:32px;justify-content:center">
                                          <div style="text-align:center"><div style="font-size:32px;font-weight:900;color:#059669">478</div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--risin-text-muted)">Regionais Planejadas</div></div>
                                          <div style="text-align:center"><div style="font-size:32px;font-weight:900;color:#0891B2">27</div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--risin-text-muted)">Estados</div></div>
                                      </div>
                                  </div>
                              }
                              <div class="exp-leg">
                                  <div class="exp-li"><div class="exp-ld" style="background:#059669"></div><span style="color:var(--risin-text-dark);font-weight:500">Regionais Modelo</span></div>
                                  <div class="exp-li"><div class="exp-ld" style="background:#D1D5DB"></div><span style="color:var(--risin-text-muted)">Expans&#227;o Planejada</span></div>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Chamada Final -->
          <section class="cf-sec">
              <div class="radial"></div>
              <div class="cf-rings">
                  <div class="cf-r cf-r1"></div>
                  <div class="cf-r cf-r2"></div>
                  <div class="cf-r cf-r3"></div>
              </div>
              <div class="cf-wrap">
                  <h2>RISIN. <span class="cf-g1">Estrutura</span>. <span class="cf-g2">Governan&#231;a</span>. <span class="cf-g3">Escala</span>.</h2>
                  <div class="cf-line"></div>
                  <p class="cf-sub">Entre em contato para conhecer mais sobre o projeto ou fa&#231;a o download da nossa apresenta&#231;&#227;o institucional completa.</p>
                  <div class="cf-acts">
                      <a class="cf-bp" href="@(finalLink1?.Url ?? "/contato")">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
                          @(finalLink1?.Name ?? "Contato Institucional")
                      </a>
                      <a class="cf-bs" href="@(finalLink2?.Url ?? "/transparencia")">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                          @(finalLink2?.Name ?? "Download Apresenta&#231;&#227;o Institucional")
                      </a>
                  </div>
                  <div class="cf-dots">
                      <div class="cf-dot" style="background:#059669"></div>
                      <div class="cf-dot" style="background:#0891B2;animation-delay:0.3s"></div>
                      <div class="cf-dot" style="background:#059669;animation-delay:0.6s"></div>
                  </div>
              </div>
          </section>
      
      </main>

  - alias: aRisin
    name: "A RISIN"
    path: ARisin.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
          /* ── Hero ── */
          .ar-hero { position: relative; background: linear-gradient(135deg,#F3F4F6,#F9FAFB,#F0FDF4); padding: var(--risin-section-py) 0; overflow: hidden; }
          .ar-hero .grid-bg { position: absolute; inset: 0; opacity: 0.3; background-image: linear-gradient(rgba(5,150,105,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(5,150,105,0.1) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .ar-hero .orb-g { position: absolute; top: 40px; right: 120px; width: 320px; height: 320px; background: rgba(5,150,105,0.08); border-radius: 50%; filter: blur(48px); animation: pulse 2s ease-in-out infinite; pointer-events: none; }
          .ar-hero .orb-c { position: absolute; bottom: 40px; left: 120px; width: 280px; height: 280px; background: rgba(8,145,178,0.08); border-radius: 50%; filter: blur(48px); animation: pulse 2s ease-in-out infinite; animation-delay: 1s; pointer-events: none; }
          .ar-hc { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; display: flex; gap: 64px; align-items: center; }
          .ar-hl { max-width: 620px; }
          .ar-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.25); border-radius: 9999px; margin-bottom: 24px; }
          .ar-badge svg { width: 16px; height: 16px; color: #059669; }
          .ar-badge span { font-size: 14px; font-weight: 500; color: #059669; }
          .ar-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: var(--risin-text-dark); line-height: 1.15; margin-bottom: 20px; }
          .ar-hero h1 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .ar-hero p { font-size: 18px; color: var(--risin-text-muted); line-height: 1.7; margin-bottom: 32px; }
          .ar-stats { display: flex; gap: 32px; flex-wrap: wrap; }
          .ar-stat strong { display: block; font-size: 28px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .ar-stat span { font-size: 12px; color: var(--risin-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
          .ar-hr { flex: 1; display: flex; justify-content: center; align-items: center; }
          .ar-brand { width: 220px; height: 220px; background: linear-gradient(135deg,#059669,#0891B2); border-radius: 50% 30% 50% 30%; display: flex; align-items: center; justify-content: center; box-shadow: 0 32px 64px rgba(5,150,105,0.3); animation: pulse 3s ease-in-out infinite; }
          .ar-brand svg { width: 110px; height: 110px; color: white; }
          @@media (max-width: 1024px) { .ar-hc { flex-direction: column; } .ar-hr { display: none; } }
          @@media (max-width: 640px) { .ar-hero h1 { font-size: 32px; } .ar-stats { gap: 20px; } }

          /* ── Shared wrapper & headings ── */
          .ar-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .ar-sec-hd { text-align: center; margin-bottom: 56px; }
          .ar-sec-hd h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .ar-sec-hd h2 .grad,.ar-hero h1 .grad,.ar-cta-inner h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .ar-sec-hd p { color: var(--risin-text-muted); max-width: 640px; margin: 0 auto; line-height: 1.7; }

          /* ── Historia / Timeline ── */
          .ar-hist { background: white; padding: var(--risin-section-py) 0; }
          .ar-timeline { position: relative; display: flex; flex-direction: column; }
          .ar-timeline::before { content: ''; position: absolute; left: 48px; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg,#059669,#0891B2,rgba(5,150,105,0)); opacity: 0.3; }
          .ar-te { display: flex; gap: 32px; align-items: flex-start; padding-bottom: 40px; }
          .ar-te:last-child { padding-bottom: 0; }
          .ar-td { width: 96px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
          .ar-year { font-size: 13px; font-weight: 700; color: #059669; white-space: nowrap; }
          .ar-dot { width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg,#059669,#0891B2); box-shadow: 0 0 0 4px rgba(5,150,105,0.15); z-index: 1; }
          .ar-tb { flex: 1; background: var(--risin-bg-lighter); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); padding: 20px 24px; transition: all var(--risin-transition); }
          .ar-tb:hover { border-color: rgba(5,150,105,0.4); box-shadow: var(--risin-shadow-lg); }
          .ar-tb h3 { font-size: 16px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 6px; }
          .ar-tb p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; margin: 0; }
          @@media (max-width: 640px) { .ar-timeline::before { left: 32px; } .ar-td { width: 64px; } .ar-te { gap: 16px; } }

          /* ── MVV ── */
          .ar-mvv { background: var(--risin-bg-lighter); padding: var(--risin-section-py) 0; position: relative; overflow: hidden; }
          .ar-mvv .bg-acc { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .ar-mvv-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 32px; }
          .ar-mvv-card { background: white; border-radius: var(--risin-radius-xl); padding: 36px 28px; border: 1px solid var(--risin-border); box-shadow: var(--risin-shadow); transition: all var(--risin-transition); }
          .ar-mvv-card:hover { transform: translateY(-4px); box-shadow: var(--risin-shadow-xl); border-color: rgba(5,150,105,0.3); }
          .ar-mvv-icon { width: 56px; height: 56px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
          .ar-mvv-icon svg { width: 28px; height: 28px; color: white; }
          .ar-mvv-card h3 { font-size: 20px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .ar-mvv-card p { font-size: 15px; color: var(--risin-text-muted); line-height: 1.7; margin: 0; }
          @@media (max-width: 768px) { .ar-mvv-grid { grid-template-columns: 1fr; } }

          /* ── Estrutura Societaria ── */
          .ar-corp { background: white; padding: var(--risin-section-py) 0; }
          .ar-corp-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 16px; margin-bottom: 32px; }
          .ar-corp-card { text-align: center; padding: 20px 12px; background: var(--risin-bg-lighter); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); transition: all var(--risin-transition); }
          .ar-corp-card:hover { border-color: rgba(5,150,105,0.4); box-shadow: var(--risin-shadow-lg); }
          .ar-pct { display: block; font-size: 32px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 6px; }
          .ar-role { display: block; font-size: 12px; font-weight: 700; color: var(--risin-text-dark); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
          .ar-name-s { display: block; font-size: 12px; color: var(--risin-text-muted); }
          .ar-cap-row { display: flex; align-items: center; gap: 16px; background: linear-gradient(90deg,rgba(5,150,105,0.05),rgba(8,145,178,0.05)); border: 1px solid rgba(5,150,105,0.15); border-radius: var(--risin-radius-lg); padding: 20px 28px; }
          .ar-cap-row svg { width: 32px; height: 32px; color: #059669; flex-shrink: 0; }
          .ar-cap-row p { margin: 0; color: var(--risin-text-dark); font-size: 15px; line-height: 1.6; }
          .ar-cap-row strong { color: #059669; }
          @@media (max-width: 1024px) { .ar-corp-grid { grid-template-columns: repeat(3,1fr); } }
          @@media (max-width: 640px)  { .ar-corp-grid { grid-template-columns: repeat(2,1fr); } }

          /* ── CTA ── */
          .ar-cta { position: relative; background: linear-gradient(135deg,#059669,#0891B2); padding: var(--risin-section-py) 0; overflow: hidden; text-align: center; }
          .ar-cta .c-orb { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.05); }
          .ar-cta .c-o1 { width: 400px; height: 400px; top: -200px; left: -100px; }
          .ar-cta .c-o2 { width: 300px; height: 300px; bottom: -150px; right: -50px; }
          .ar-cta-inner { position: relative; z-index: 1; }
          .ar-cta-inner h2 { font-size: 36px; font-weight: 700; color: white; margin-bottom: 16px; }
          .ar-cta-inner p { font-size: 18px; color: rgba(255,255,255,0.85); max-width: 600px; margin: 0 auto 36px; line-height: 1.7; }
          .ar-cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
          .ar-btn-w { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: white; color: #059669; font-weight: 700; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-xl); transition: all var(--risin-transition); text-decoration: none; }
          .ar-btn-w:hover { transform: translateY(-2px); box-shadow: var(--risin-shadow-2xl); }
          .ar-btn-o { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: transparent; color: white; font-weight: 600; font-size: 16px; border-radius: var(--risin-radius-lg); border: 2px solid rgba(255,255,255,0.5); transition: all var(--risin-transition); text-decoration: none; }
          .ar-btn-o:hover { background: rgba(255,255,255,0.1); border-color: white; }
          .ar-btn-w svg, .ar-btn-o svg { width: 18px; height: 18px; }
          @@media (max-width: 640px) { .ar-cta-inner h2 { font-size: 26px; } .ar-cta-btns { flex-direction: column; align-items: center; } }
      </style>
      <main>

          <section class="ar-hero">
              <div class="grid-bg"></div>
              <div class="orb-g"></div>
              <div class="orb-c"></div>
              <div class="ar-hc">
                  <div class="ar-hl">
                      <div class="ar-badge">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
                          <span>Fundada em 2013 &bull; Niter&oacute;i, RJ</span>
                      </div>
                      <h1>A <span class="grad">RISIN</span> &mdash;<br>Holding Digital Estruturada</h1>
                      <p>Nascida de um sistema patenteado pelo INPI em 1995, a RISIN estrutura um ecossistema de 8 plataformas digitais integradas para transformar a opera&ccedil;&atilde;o empresarial regional no Brasil.</p>
                      <div class="ar-stats">
                          <div class="ar-stat"><strong>1995</strong><span>Patente INPI</span></div>
                          <div class="ar-stat"><strong>2013</strong><span>Constitui&ccedil;&atilde;o</span></div>
                          <div class="ar-stat"><strong>478</strong><span>Regionais</span></div>
                          <div class="ar-stat"><strong>8</strong><span>Plataformas</span></div>
                      </div>
                  </div>
                  <div class="ar-hr">
                      <div class="ar-brand">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
                      </div>
                  </div>
              </div>
          </section>

          <section class="ar-hist">
              <div class="ar-wrap">
                  <div class="ar-sec-hd">
                      <h2>Nossa <span class="grad">Hist&oacute;ria</span></h2>
                      <p>Tr&ecirc;s d&eacute;cadas de pesquisa, valida&ccedil;&atilde;o e estrutura&ccedil;&atilde;o culminaram no modelo operacional que a RISIN implementa hoje.</p>
                  </div>
                  <div class="ar-timeline">
                      <div class="ar-te">
                          <div class="ar-td"><span class="ar-year">1995</span><div class="ar-dot"></div></div>
                          <div class="ar-tb"><h3>Patente INPI &mdash; Sistema Originador</h3><p>Sistema patenteado pelo INPI, originalmente desenvolvido pela IBM do Brasil para uma opera&ccedil;&atilde;o cooperativa de log&iacute;stica em Campinas-SP. Base tecnol&oacute;gica e operacional da RISIN.</p></div>
                      </div>
                      <div class="ar-te">
                          <div class="ar-td"><span class="ar-year">2010</span><div class="ar-dot"></div></div>
                          <div class="ar-tb"><h3>Valida&ccedil;&atilde;o de Mercado</h3><p>Blog de valida&ccedil;&atilde;o com mais de 2.000 empresas cadastradas em um &uacute;nico ano, confirmando a demanda pelo modelo integrado de plataformas empresariais regionais.</p></div>
                      </div>
                      <div class="ar-te">
                          <div class="ar-td"><span class="ar-year">2013</span><div class="ar-dot"></div></div>
                          <div class="ar-tb"><h3>Constitui&ccedil;&atilde;o Legal em Niter&oacute;i</h3><p>RISIN &ndash; Rede de Informa&ccedil;&otilde;es e Servi&ccedil;os na Internet Ltda. formalmente constitu&iacute;da, com capital social de R$&nbsp;510.000 e estrutura de governan&ccedil;a desde o primeiro dia.</p></div>
                      </div>
                      <div class="ar-te">
                          <div class="ar-td"><span class="ar-year">Hoje</span><div class="ar-dot"></div></div>
                          <div class="ar-tb"><h3>Implanta&ccedil;&atilde;o Estruturada</h3><p>2 Regionais Modelo (Sorocaba REG070 e Zona Sul-RJ REG024) em fase de implanta&ccedil;&atilde;o. Ap&oacute;s valida&ccedil;&atilde;o operacional, expans&atilde;o para as 478 regionais nacionais.</p></div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="ar-mvv">
              <div class="bg-acc"></div>
              <div class="ar-wrap">
                  <div class="ar-sec-hd">
                      <h2>Miss&atilde;o, <span class="grad">Vis&atilde;o</span> e Valores</h2>
                      <p>Os princ&iacute;pios que orientam cada decis&atilde;o e estruturam o caminho da RISIN.</p>
                  </div>
                  <div class="ar-mvv-grid">
                      <div class="ar-mvv-card">
                          <div class="ar-mvv-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
                          </div>
                          <h3>Miss&atilde;o</h3>
                          <p>Estruturar e operar uma plataforma digital integrada que conecta empresas em um ecossistema tecnol&oacute;gico &uacute;nico, com governan&ccedil;a, transpar&ecirc;ncia e escalabilidade desde a concep&ccedil;&atilde;o.</p>
                      </div>
                      <div class="ar-mvv-card">
                          <div class="ar-mvv-icon" style="background:linear-gradient(135deg,#0891B2,#0369A1)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                          </div>
                          <h3>Vis&atilde;o</h3>
                          <p>Ser a principal holding digital de neg&oacute;cios empresariais do Brasil, com presen&ccedil;a em todas as 478 regi&otilde;es e expans&atilde;o internacional planejada para mercados lus&oacute;fonos e latino-americanos.</p>
                      </div>
                      <div class="ar-mvv-card">
                          <div class="ar-mvv-icon" style="background:linear-gradient(135deg,#059669,#0891B2)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.562.562 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                          </div>
                          <h3>Valores</h3>
                          <p>Governan&ccedil;a, Transpar&ecirc;ncia, Inova&ccedil;&atilde;o, Sustentabilidade, Profissionalismo e Compromisso com o longo prazo &mdash; inegoci&aacute;veis em todas as fases do projeto.</p>
                      </div>
                  </div>
              </div>
          </section>

          <section class="ar-corp">
              <div class="ar-wrap">
                  <div class="ar-sec-hd">
                      <h2>Estrutura <span class="grad">Societ&aacute;ria</span></h2>
                      <p>Capital social de R$&nbsp;510.000. 13% reservados para conselheiros e futuros parceiros estrat&eacute;gicos.</p>
                  </div>
                  <div class="ar-corp-grid">
                      <div class="ar-corp-card"><span class="ar-pct">64%</span><span class="ar-role">Presid&ecirc;ncia</span><span class="ar-name-s">Executiva Fundador</span></div>
                      <div class="ar-corp-card"><span class="ar-pct">15%</span><span class="ar-role">CTO</span><span class="ar-name-s">Diretor Geral de TI</span></div>
                      <div class="ar-corp-card"><span class="ar-pct">8%</span><span class="ar-role">CFO/CAO</span><span class="ar-name-s">Admin &amp; Financeiro</span></div>
                      <div class="ar-corp-card"><span class="ar-pct">8%</span><span class="ar-role">CMO</span><span class="ar-name-s">S&ecirc;nior SEO/Marketing</span></div>
                      <div class="ar-corp-card"><span class="ar-pct">5%</span><span class="ar-role">CSO</span><span class="ar-name-s">Comercial &amp; Franquias</span></div>
                  </div>
                  <div class="ar-cap-row">
                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
                      <p><strong>13% reservados</strong> para membros do Conselho Consultivo (7 especialistas, contratos de 2 anos) e futuros parceiros estrat&eacute;gicos que ingressarem na estrutura societ&aacute;ria conforme o crescimento do grupo.</p>
                  </div>
              </div>
          </section>

          <section class="ar-cta">
              <div class="c-orb c-o1"></div>
              <div class="c-orb c-o2"></div>
              <div class="ar-wrap ar-cta-inner">
                  <h2>RISIN. Estrutura. Governan&ccedil;a. Escala.</h2>
                  <p>Conhe&ccedil;a a estrutura de governan&ccedil;a completa ou entre em contato para uma conversa institucional.</p>
                  <div class="ar-cta-btns">
                      <a href="/governanca" class="ar-btn-w">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
                          Estrutura de Governan&ccedil;a
                      </a>
                      <a href="/contato" class="ar-btn-o">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                          Contato Institucional
                      </a>
                  </div>
              </div>
          </section>

      </main>
  - alias: ecossistema
    name: "Ecossistema"
    path: Ecossistema.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
          /* ── Hero ── */
          .ec-hero { position: relative; background: linear-gradient(180deg,#F9FAFB,#F3F4F6); padding: var(--risin-section-py) 0; overflow: hidden; }
          .ec-hero .dot-bg { position: absolute; inset: 0; opacity: 0.15; background-image: radial-gradient(circle at 1px 1px,#059669 1px,transparent 0); background-size: 40px 40px; pointer-events: none; }
          .ec-hc { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; text-align: center; }
          .ec-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.2); border-radius: 9999px; margin-bottom: 24px; }
          .ec-badge svg { width: 16px; height: 16px; color: #059669; }
          .ec-badge span { font-size: 14px; font-weight: 500; color: #059669; }
          .ec-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: var(--risin-text-dark); line-height: 1.15; margin-bottom: 20px; }
          .ec-hero h1 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .ec-hero p { font-size: 18px; color: var(--risin-text-muted); max-width: 680px; margin: 0 auto 40px; line-height: 1.7; }
          .ec-hero-stats { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }
          .ec-hstat strong { display: block; font-size: 32px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .ec-hstat span { font-size: 13px; color: var(--risin-text-muted); }
          @@media (max-width: 640px) { .ec-hero h1 { font-size: 32px; } }

          /* ── Shared ── */
          .ec-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .ec-sec-hd { text-align: center; margin-bottom: 48px; }
          .ec-sec-hd h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .ec-sec-hd h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .ec-sec-hd p { color: var(--risin-text-muted); max-width: 640px; margin: 0 auto; line-height: 1.7; }

          /* ── 8 Platforms grid ── */
          .ec-plat { background: white; padding: var(--risin-section-py) 0; }
          .ec-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; }
          .ec-card { background: var(--risin-bg-lighter); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 28px; display: flex; gap: 20px; align-items: flex-start; transition: all var(--risin-transition); position: relative; overflow: hidden; }
          .ec-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--risin-radius-xl) var(--risin-radius-xl) 0 0; transition: opacity var(--risin-transition); }
          .ec-card:hover { box-shadow: var(--risin-shadow-2xl); transform: translateY(-4px); border-color: transparent; }
          .ec-icon { width: 56px; height: 56px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform var(--risin-transition); }
          .ec-card:hover .ec-icon { transform: scale(1.1); }
          .ec-icon svg { width: 28px; height: 28px; color: white; }
          .ec-body h3 { font-size: 18px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 6px; }
          .ec-body p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; margin: 0 0 12px; }
          .ec-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 9999px; }
          @@media (max-width: 768px) { .ec-grid { grid-template-columns: 1fr; } }

          /* ── Cadastro Unico ── */
          .ec-cad { background: var(--risin-bg-lighter); padding: var(--risin-section-py) 0; position: relative; overflow: hidden; }
          .ec-cad .top-acc { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .ec-cad-row { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
          .ec-cad-txt h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; }
          .ec-cad-txt h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .ec-cad-txt p { color: var(--risin-text-muted); line-height: 1.7; margin-bottom: 28px; }
          .ec-benefits { display: flex; flex-direction: column; gap: 12px; }
          .ec-bene { display: flex; gap: 12px; align-items: flex-start; }
          .ec-bene-ic { width: 32px; height: 32px; border-radius: var(--risin-radius); background: linear-gradient(135deg,#059669,#0891B2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
          .ec-bene-ic svg { width: 16px; height: 16px; color: white; }
          .ec-bene-txt strong { display: block; font-size: 14px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 2px; }
          .ec-bene-txt span { font-size: 13px; color: var(--risin-text-muted); }
          .ec-cad-vis { display: flex; justify-content: center; }
          .ec-cad-box { background: white; border-radius: var(--risin-radius-2xl); padding: 40px; box-shadow: var(--risin-shadow-xl); border: 1px solid var(--risin-border); text-align: center; max-width: 360px; width: 100%; }
          .ec-cad-icon { width: 80px; height: 80px; background: linear-gradient(135deg,#059669,#0891B2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
          .ec-cad-icon svg { width: 40px; height: 40px; color: white; }
          .ec-cad-box h3 { font-size: 20px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 8px; }
          .ec-cad-box p { font-size: 14px; color: var(--risin-text-muted); margin-bottom: 20px; line-height: 1.6; }
          .ec-cad-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
          .ec-chip { padding: 4px 12px; background: var(--risin-bg-lighter); border: 1px solid var(--risin-border); border-radius: 9999px; font-size: 12px; font-weight: 500; color: var(--risin-text-dark); }
          @@media (max-width: 768px) { .ec-cad-row { grid-template-columns: 1fr; } .ec-cad-vis { display: none; } }

          /* ── CTA ── */
          .ec-cta { background: linear-gradient(135deg,#059669,#0891B2); padding: var(--risin-section-py) 0; text-align: center; }
          .ec-cta h2 { font-size: 36px; font-weight: 700; color: white; margin-bottom: 16px; }
          .ec-cta p { font-size: 18px; color: rgba(255,255,255,0.85); max-width: 600px; margin: 0 auto 36px; line-height: 1.7; }
          .ec-cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
          .ec-btn-w { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: white; color: #059669; font-weight: 700; font-size: 16px; border-radius: var(--risin-radius-lg); text-decoration: none; transition: all var(--risin-transition); box-shadow: var(--risin-shadow-xl); }
          .ec-btn-w:hover { transform: translateY(-2px); }
          .ec-btn-o { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; border: 2px solid rgba(255,255,255,0.5); color: white; font-weight: 600; font-size: 16px; border-radius: var(--risin-radius-lg); text-decoration: none; transition: all var(--risin-transition); }
          .ec-btn-o:hover { border-color: white; background: rgba(255,255,255,0.1); }
          .ec-btn-w svg, .ec-btn-o svg { width: 18px; height: 18px; }
          @@media (max-width: 640px) { .ec-cta h2 { font-size: 26px; } .ec-cta-btns { flex-direction: column; align-items: center; } }
      </style>
      <main>

          <section class="ec-hero">
              <div class="dot-bg"></div>
              <div class="ec-hc">
                  <div class="ec-badge">
                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
                      <span>8 Plataformas &bull; 1 Infraestrutura</span>
                  </div>
                  <h1>Ecossistema <span class="grad">RISIN</span></h1>
                  <p>Oito websites independentes funcionando sob uma &uacute;nica infraestrutura tecnol&oacute;gica, compartilhando governan&ccedil;a, dados e modelo econ&ocirc;mico para criar valor exponencial.</p>
                  <div class="ec-hero-stats">
                      <div class="ec-hstat"><strong>8</strong><span>Plataformas Integradas</span></div>
                      <div class="ec-hstat"><strong>1</strong><span>Cadastro &Uacute;nico</span></div>
                      <div class="ec-hstat"><strong>478</strong><span>Regionais Planejadas</span></div>
                      <div class="ec-hstat"><strong>5.000+</strong><span>Vagas por Regional</span></div>
                  </div>
              </div>
          </section>

          <section class="ec-plat">
              <div class="ec-wrap">
                  <div class="ec-sec-hd">
                      <h2>As 8 <span class="grad">Plataformas</span></h2>
                      <p>Cada plataforma atende a uma necessidade espec&iacute;fica do mercado empresarial, enquanto compartilha governan&ccedil;a e infraestrutura com as demais.</p>
                  </div>
                  <div class="ec-grid">
                      <div class="ec-card" style="--ec-c:#059669">
                          <div class="ec-card" style="display:contents">
                              <div class="ec-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg>
                              </div>
                              <div class="ec-body"><h3>Clikashop</h3><p>Shopping digital organizado em 3 setores econ&ocirc;micos (prim&aacute;rio, secund&aacute;rio e terci&aacute;rio). Pagamento trimestral por cau&ccedil;&atilde;o. Cada loja emite pr&oacute;pria NFe e recebe pagamentos diretamente.</p><span class="ec-tag" style="background:rgba(5,150,105,0.08);color:#059669">E-commerce Regional</span></div>
                          </div>
                      </div>
                      <div class="ec-card">
                          <div class="ec-icon" style="background:linear-gradient(135deg,#0891B2,#0369A1)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"/></svg>
                          </div>
                          <div class="ec-body"><h3>Cooper-Translog</h3><p>Cooperativa de transporte e log&iacute;stica integrada com as opera&ccedil;&otilde;es do shopping e toda a rede RISIN, baseada no sistema patenteado pelo INPI em 1995.</p><span class="ec-tag" style="background:rgba(8,145,178,0.08);color:#0891B2">Log&iacute;stica Cooperativa</span></div>
                      </div>
                      <div class="ec-card">
                          <div class="ec-icon" style="background:linear-gradient(135deg,#059669,#0891B2)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007z"/></svg>
                          </div>
                          <div class="ec-body"><h3>Coop-Supri</h3><p>Cooperativa de compras B2B que reduz custos produtivos e improdutivos atrav&eacute;s do CRD (Coeficiente de Rateio de Despesas) compartilhado entre os membros.</p><span class="ec-tag" style="background:rgba(5,150,105,0.08);color:#059669">Compras B2B</span></div>
                      </div>
                      <div class="ec-card">
                          <div class="ec-icon" style="background:linear-gradient(135deg,#0891B2,#059669)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 7.5h1.5m-1.5 3h1.5m-7.5 3h7.5m-7.5 3h7.5m3-9h3.375c.621 0 1.125.504 1.125 1.125V18a2.25 2.25 0 01-2.25 2.25M16.5 7.5V18a2.25 2.25 0 002.25 2.25M16.5 7.5V4.875c0-.621-.504-1.125-1.125-1.125H4.125C3.504 3.75 3 4.254 3 4.875V18a2.25 2.25 0 002.25 2.25h13.5M6 7.5h3v3H6v-3z"/></svg>
                          </div>
                          <div class="ec-body"><h3>G-Empresas</h3><p>Guia regional de empresas com atualiza&ccedil;&otilde;es peri&oacute;dicas em m&iacute;dia digital e impressa. Visibilidade para todas as empresas do ecossistema e do mercado regional.</p><span class="ec-tag" style="background:rgba(8,145,178,0.08);color:#0891B2">Guia Empresarial</span></div>
                      </div>
                      <div class="ec-card">
                          <div class="ec-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12"/></svg>
                          </div>
                          <div class="ec-body"><h3>Classificados-RISIN</h3><p>Classificados corporativos focados em bens usados, doa&ccedil;&otilde;es, empregos e oportunidades de neg&oacute;cio regional. Plataforma de conex&atilde;o empresarial local.</p><span class="ec-tag" style="background:rgba(5,150,105,0.08);color:#059669">Classificados</span></div>
                      </div>
                      <div class="ec-card">
                          <div class="ec-icon" style="background:linear-gradient(135deg,#0891B2,#0369A1)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014 8.855c-.118.38-.245.754-.38 1.125m.38-1.125a23.91 23.91 0 001.014-5.395m0-3.46c.495.413.811 1.035.811 1.73 0 .695-.316 1.317-.811 1.73m0-3.46a24.347 24.347 0 010 3.46"/></svg>
                          </div>
                          <div class="ec-body"><h3>Ag&ecirc;ncia-RISIN</h3><p>Ag&ecirc;ncia de marketing digital e eventos integrada ao ecossistema. Publicidade em 4 categorias (B&aacute;sico, Bronze, Prata, Ouro) com 216 apari&ccedil;&otilde;es a cada 24h.</p><span class="ec-tag" style="background:rgba(8,145,178,0.08);color:#0891B2">Marketing Digital</span></div>
                      </div>
                      <div class="ec-card">
                          <div class="ec-icon" style="background:linear-gradient(135deg,#059669,#0891B2)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 20.25h12m-7.5-3v3m3-3v3m-10.125-3h17.25c.621 0 1.125-.504 1.125-1.125V4.125c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v12c0 .621.504 1.125 1.125 1.125z"/></svg>
                          </div>
                          <div class="ec-body"><h3>TV-RISIN</h3><p>Televis&atilde;o online corporativa com conte&uacute;do para empresas e programa&ccedil;&atilde;o regional. Streaming de eventos, treinamentos e comunicados do ecossistema.</p><span class="ec-tag" style="background:rgba(5,150,105,0.08);color:#059669">Streaming Corporativo</span></div>
                      </div>
                      <div class="ec-card">
                          <div class="ec-icon" style="background:linear-gradient(135deg,#0891B2,#059669)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418"/></svg>
                          </div>
                          <div class="ec-body"><h3>Centertur</h3><p>Plataforma regional de turismo conectada ao portal principal. Eventos corporativos, hotelaria e networking B2B em cada regional do ecossistema.</p><span class="ec-tag" style="background:rgba(8,145,178,0.08);color:#0891B2">Turismo &amp; Eventos</span></div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="ec-cad">
              <div class="top-acc"></div>
              <div class="ec-wrap">
                  <div class="ec-cad-row">
                      <div class="ec-cad-txt">
                          <h2>Cadastro &Uacute;nico <span class="grad">RISIN</span></h2>
                          <p>Uma &uacute;nica inscri&ccedil;&atilde;o d&aacute; acesso a todos os servi&ccedil;os do ecossistema. N&atilde;o &eacute; necess&aacute;rio criar contas separadas em cada plataforma.</p>
                          <div class="ec-benefits">
                              <div class="ec-bene">
                                  <div class="ec-bene-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75"/></svg></div>
                                  <div class="ec-bene-txt"><strong>Opera&ccedil;&atilde;o de Loja</strong><span>Abra e gerencie sua loja virtual no Clikashop com todas as ferramentas integradas</span></div>
                              </div>
                              <div class="ec-bene">
                                  <div class="ec-bene-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5"/></svg></div>
                                  <div class="ec-bene-txt"><strong>Compras B2B</strong><span>Acesso &agrave; Coop-Supri para redu&ccedil;&atilde;o de custos em compras cooperativas</span></div>
                              </div>
                              <div class="ec-bene">
                                  <div class="ec-bene-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21"/></svg></div>
                                  <div class="ec-bene-txt"><strong>Associa&ccedil;&atilde;o Cooperativa</strong><span>Status de membro da cooperativa com direitos e benef&iacute;cios integrais</span></div>
                              </div>
                              <div class="ec-bene">
                                  <div class="ec-bene-ic"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                                  <div class="ec-bene-txt"><strong>Status de Fornecedor</strong><span>Credenciamento autom&aacute;tico como fornecedor verificado em todo o ecossistema</span></div>
                              </div>
                          </div>
                      </div>
                      <div class="ec-cad-vis">
                          <div class="ec-cad-box">
                              <div class="ec-cad-icon">
                                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z"/></svg>
                              </div>
                              <h3>1 Cadastro</h3>
                              <p>Acesso a todos os 8 websites e servi&ccedil;os do ecossistema RISIN na sua regional</p>
                              <div class="ec-cad-chips">
                                  <span class="ec-chip">Clikashop</span>
                                  <span class="ec-chip">Cooper-Translog</span>
                                  <span class="ec-chip">Coop-Supri</span>
                                  <span class="ec-chip">G-Empresas</span>
                                  <span class="ec-chip">Ag&ecirc;ncia</span>
                                  <span class="ec-chip">TV-RISIN</span>
                                  <span class="ec-chip">Centertur</span>
                                  <span class="ec-chip">Classificados</span>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="ec-cta">
              <div class="ec-wrap">
                  <h2>Fa&ccedil;a Parte do Ecossistema</h2>
                  <p>Seja lojista, parceiro ou investidor &mdash; o ecossistema RISIN tem um lugar para sua empresa.</p>
                  <div class="ec-cta-btns">
                      <a href="/para-lojistas" class="ec-btn-w">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"/></svg>
                          Para Lojistas
                      </a>
                      <a href="/parceiros" class="ec-btn-o">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
                          Seja Parceiro
                      </a>
                  </div>
              </div>
          </section>

      </main>
  - alias: modeloNegocio
    name: "Modelo de Negocio"
    path: ModeloNegocio.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
          /* ── Hero ── */
          .mn-hero { position: relative; background: linear-gradient(135deg,#F9FAFB,#F0FDF4,#F9FAFB); padding: var(--risin-section-py) 0; overflow: hidden; }
          .mn-hero .grid-bg { position: absolute; inset: 0; opacity: 0.25; background-image: linear-gradient(rgba(5,150,105,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(5,150,105,0.1) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .mn-hero .orb-g { position: absolute; top: -40px; right: 100px; width: 350px; height: 350px; background: rgba(5,150,105,0.07); border-radius: 50%; filter: blur(56px); pointer-events: none; }
          .mn-hero .orb-c { position: absolute; bottom: -60px; left: 80px; width: 280px; height: 280px; background: rgba(8,145,178,0.07); border-radius: 50%; filter: blur(56px); pointer-events: none; }
          .mn-hc { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; display: flex; gap: 64px; align-items: center; }
          .mn-hl { max-width: 620px; }
          .mn-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.2); border-radius: 9999px; margin-bottom: 24px; }
          .mn-badge svg { width: 16px; height: 16px; color: #059669; }
          .mn-badge span { font-size: 14px; font-weight: 500; color: #059669; }
          .mn-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: var(--risin-text-dark); line-height: 1.15; margin-bottom: 20px; }
          .mn-hero h1 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .mn-hero p { font-size: 18px; color: var(--risin-text-muted); line-height: 1.7; margin-bottom: 36px; }
          .mn-kpis { display: flex; gap: 28px; flex-wrap: wrap; }
          .mn-kpi { text-align: center; padding: 18px 24px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-sm); min-width: 100px; }
          .mn-kpi strong { display: block; font-size: 26px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; margin-bottom: 4px; }
          .mn-kpi span { font-size: 11px; color: var(--risin-text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
          .mn-hr { flex: 1; display: flex; justify-content: center; }
          .mn-chart { position: relative; width: 240px; height: 240px; }
          .mn-chart-ring { position: absolute; inset: 0; border-radius: 50%; border: 8px solid transparent; }
          .mn-ring1 { border-color: #059669; clip-path: inset(0 50% 0 0); }
          .mn-ring2 { border-color: #0891B2; clip-path: inset(0 0 50% 0); transform: rotate(-20deg); }
          .mn-ring3 { border-color: #047857; width: 160px; height: 160px; inset: 40px; border-width: 6px; }
          .mn-chart-ctr { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
          .mn-chart-ctr strong { font-size: 28px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .mn-chart-ctr span { font-size: 11px; color: var(--risin-text-muted); text-transform: uppercase; letter-spacing: 0.05em; text-align: center; max-width: 80px; }
          @@media (max-width: 1024px) { .mn-hc { flex-direction: column; gap: 36px; } .mn-hr { display: none; } }
          @@media (max-width: 640px) { .mn-hero h1 { font-size: 32px; } .mn-kpis { gap: 16px; } }

          /* ── Shared ── */
          .mn-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .mn-sec-hd { text-align: center; margin-bottom: 48px; }
          .mn-sec-hd h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .mn-sec-hd h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .mn-sec-hd p { color: var(--risin-text-muted); max-width: 640px; margin: 0 auto; line-height: 1.7; }

          /* ── Fontes de Receita ── */
          .mn-rev { background: white; padding: var(--risin-section-py) 0; }
          .mn-rev-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; }
          .mn-rev-card { border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 32px; transition: all var(--risin-transition); position: relative; overflow: hidden; }
          .mn-rev-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
          .mn-rev-card:nth-child(1)::before { background: linear-gradient(90deg,#059669,#047857); }
          .mn-rev-card:nth-child(2)::before { background: linear-gradient(90deg,#0891B2,#0369A1); }
          .mn-rev-card:nth-child(3)::before { background: linear-gradient(90deg,#059669,#0891B2); }
          .mn-rev-card:nth-child(4)::before { background: linear-gradient(90deg,#047857,#059669); }
          .mn-rev-card:hover { box-shadow: var(--risin-shadow-2xl); transform: translateY(-4px); }
          .mn-rev-icon { width: 52px; height: 52px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
          .mn-rev-icon svg { width: 26px; height: 26px; color: white; }
          .mn-rev-card h3 { font-size: 18px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 10px; }
          .mn-rev-card p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.7; margin: 0 0 16px; }
          .mn-rev-detail { display: flex; flex-direction: column; gap: 6px; }
          .mn-rev-li { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--risin-text-muted); line-height: 1.5; }
          .mn-rev-li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: linear-gradient(135deg,#059669,#0891B2); flex-shrink: 0; margin-top: 5px; }
          @@media (max-width: 768px) { .mn-rev-grid { grid-template-columns: 1fr; } }

          /* ── Vagas ── */
          .mn-vac { background: var(--risin-bg-lighter); padding: var(--risin-section-py) 0; position: relative; overflow: hidden; }
          .mn-vac .top-acc { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .mn-vac-row { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
          .mn-vac-txt h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; }
          .mn-vac-txt h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .mn-vac-txt p { color: var(--risin-text-muted); line-height: 1.7; margin-bottom: 24px; }
          .mn-vac-stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
          .mn-vstat { padding: 20px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); text-align: center; }
          .mn-vstat strong { display: block; font-size: 28px; font-weight: 700; background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
          .mn-vstat span { font-size: 12px; color: var(--risin-text-muted); }
          .mn-vac-vis { display: flex; flex-direction: column; gap: 16px; }
          .mn-phase { background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 24px; display: flex; gap: 20px; align-items: flex-start; transition: all var(--risin-transition); }
          .mn-phase:hover { border-color: rgba(5,150,105,0.3); box-shadow: var(--risin-shadow-lg); }
          .mn-phase-num { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg,#059669,#0891B2); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: white; flex-shrink: 0; }
          .mn-phase-txt h4 { font-size: 15px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 4px; }
          .mn-phase-txt p { font-size: 13px; color: var(--risin-text-muted); line-height: 1.5; margin: 0; }
          @@media (max-width: 768px) { .mn-vac-row { grid-template-columns: 1fr; gap: 36px; } }

          /* ── Endereço Eletrônico ── */
          .mn-addr { background: white; padding: var(--risin-section-py) 0; }
          .mn-addr-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
          .mn-addr-txt h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; }
          .mn-addr-txt h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .mn-addr-txt p { color: var(--risin-text-muted); line-height: 1.7; margin-bottom: 24px; }
          .mn-addr-segs { display: flex; flex-direction: column; gap: 10px; }
          .mn-seg { display: flex; gap: 12px; align-items: center; padding: 12px 16px; background: var(--risin-bg-lighter); border-radius: var(--risin-radius-lg); border: 1px solid var(--risin-border); }
          .mn-seg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
          .mn-seg strong { font-size: 13px; font-weight: 700; color: var(--risin-text-dark); min-width: 100px; }
          .mn-seg span { font-size: 13px; color: var(--risin-text-muted); }
          .mn-addr-box { background: linear-gradient(135deg,#1F2937,#111827); border-radius: var(--risin-radius-2xl); padding: 36px; }
          .mn-addr-box h3 { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; }
          .mn-formula { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
          .mn-fpart { display: flex; gap: 12px; align-items: center; }
          .mn-fp-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.06em; width: 80px; flex-shrink: 0; }
          .mn-fp-val { font-size: 15px; font-weight: 700; font-family: 'Courier New', monospace; padding: 6px 14px; border-radius: var(--risin-radius); }
          .mn-fp-sep { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.3); width: 16px; text-align: center; }
          .mn-example-hd { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
          .mn-example-code { background: rgba(5,150,105,0.15); border: 1px solid rgba(5,150,105,0.3); border-radius: var(--risin-radius-lg); padding: 16px 20px; font-family: 'Courier New', monospace; font-size: 18px; font-weight: 700; color: #34D399; letter-spacing: 0.05em; margin-bottom: 10px; }
          .mn-example-desc { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.6; }
          @@media (max-width: 768px) { .mn-addr-inner { grid-template-columns: 1fr; } }

          /* ── CTA ── */
          .mn-cta { position: relative; background: linear-gradient(135deg,#059669,#047857,#0891B2); padding: var(--risin-section-py) 0; overflow: hidden; text-align: center; }
          .mn-cta .c-o { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.04); }
          .mn-cta .c-o1 { width: 500px; height: 500px; top: -250px; left: -100px; }
          .mn-cta .c-o2 { width: 400px; height: 400px; bottom: -200px; right: -80px; }
          .mn-cta-inner { position: relative; z-index: 1; }
          .mn-cta h2 { font-size: 36px; font-weight: 700; color: white; margin-bottom: 16px; }
          .mn-cta p { font-size: 18px; color: rgba(255,255,255,0.85); max-width: 600px; margin: 0 auto 36px; line-height: 1.7; }
          .mn-cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
          .mn-btn-w { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: white; color: #059669; font-weight: 700; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-xl); text-decoration: none; transition: all var(--risin-transition); }
          .mn-btn-w:hover { transform: translateY(-2px); box-shadow: var(--risin-shadow-2xl); }
          .mn-btn-o { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; border: 2px solid rgba(255,255,255,0.5); color: white; font-weight: 600; font-size: 16px; border-radius: var(--risin-radius-lg); text-decoration: none; transition: all var(--risin-transition); }
          .mn-btn-o:hover { border-color: white; background: rgba(255,255,255,0.1); }
          .mn-btn-w svg, .mn-btn-o svg { width: 18px; height: 18px; }
          @@media (max-width: 640px) { .mn-cta h2 { font-size: 26px; } .mn-cta-btns { flex-direction: column; align-items: center; } }
      </style>
      <main>

          <section class="mn-hero">
              <div class="grid-bg"></div>
              <div class="orb-g"></div>
              <div class="orb-c"></div>
              <div class="mn-hc">
                  <div class="mn-hl">
                      <div class="mn-badge">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75"/></svg>
                          <span>Receita Recorrente &bull; Escalável &bull; Previs&iacute;vel</span>
                      </div>
                      <h1>Modelo de <span class="grad">Neg&oacute;cio</span></h1>
                      <p>Estrutura econ&ocirc;mica projetada para sustentabilidade, escalabilidade e previsibilidade financeira &mdash; com 4 fontes de receita distintas e mais de 5.000 vagas empresariais por regional.</p>
                      <div class="mn-kpis">
                          <div class="mn-kpi"><strong>4</strong><span>Fontes de Receita</span></div>
                          <div class="mn-kpi"><strong>5.000+</strong><span>Vagas/Regional</span></div>
                          <div class="mn-kpi"><strong>478</strong><span>Regionais</span></div>
                          <div class="mn-kpi"><strong>~10%</strong><span>Comiss&atilde;o<br>abaixo do mercado</span></div>
                      </div>
                  </div>
                  <div class="mn-hr">
                      <div class="mn-chart">
                          <div class="mn-chart-ring mn-ring1"></div>
                          <div class="mn-chart-ring mn-ring2"></div>
                          <div class="mn-chart-ring mn-ring3"></div>
                          <div class="mn-chart-ctr">
                              <strong>4x</strong>
                              <span>Streams de Receita</span>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="mn-rev">
              <div class="mn-wrap">
                  <div class="mn-sec-hd">
                      <h2>Fontes de <span class="grad">Receita</span></h2>
                      <p>Quatro pilares econ&ocirc;micos independentes que garantem sustentabilidade e crescimento mesmo com varia&ccedil;&otilde;es em qualquer segmento.</p>
                  </div>
                  <div class="mn-rev-grid">
                      <div class="mn-rev-card">
                          <div class="mn-rev-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"/></svg>
                          </div>
                          <h3>Receita Recorrente Empresarial</h3>
                          <p>A base financeira mais s&oacute;lida: alugu&eacute;is e taxas de condom&iacute;nio previs&iacute;veis das lojas virtuais no Clikashop, com pagamento trimestral antecipado via cau&ccedil;&atilde;o.</p>
                          <div class="mn-rev-detail">
                              <div class="mn-rev-li">Alugu&eacute;l mensal de lojas (Clikashop)</div>
                              <div class="mn-rev-li">Taxa de condom&iacute;nio compartilhado</div>
                              <div class="mn-rev-li">Comiss&otilde;es sobre vendas (~10% abaixo das taxas padr&atilde;o de mercado)</div>
                              <div class="mn-rev-li">Cau&ccedil;&atilde;o trimestral: aluguel + condom&iacute;nio + comiss&otilde;es antecipados</div>
                          </div>
                      </div>
                      <div class="mn-rev-card">
                          <div class="mn-rev-icon" style="background:linear-gradient(135deg,#0891B2,#0369A1)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535"/></svg>
                          </div>
                          <h3>Publicidade &amp; Patrocínio</h3>
                          <p>Sistema de publicidade regional integrada com presen&ccedil;a multiplataforma e rota&ccedil;&atilde;o autom&aacute;tica, gerando visibilidade mensur&aacute;vel para anunciantes.</p>
                          <div class="mn-rev-detail">
                              <div class="mn-rev-li">4 categorias: B&aacute;sico, Bronze, Prata e Ouro</div>
                              <div class="mn-rev-li">216 apari&ccedil;&otilde;es a cada 24h em intervalos de 7 segundos</div>
                              <div class="mn-rev-li">Banners exibidos em todas as plataformas do ecossistema</div>
                              <div class="mn-rev-li">Relat&oacute;rios de impress&otilde;es em tempo real via ERP</div>
                          </div>
                      </div>
                      <div class="mn-rev-card">
                          <div class="mn-rev-icon" style="background:linear-gradient(135deg,#059669,#0891B2)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3"/></svg>
                          </div>
                          <h3>Servi&ccedil;os Digitais</h3>
                          <p>Receita diversificada proveniente das plataformas especializadas do ecossistema, cada uma com seu pr&oacute;prio modelo de monetiza&ccedil;&atilde;o.</p>
                          <div class="mn-rev-detail">
                              <div class="mn-rev-li">Cooperativas (Cooper-Translog e Coop-Supri)</div>
                              <div class="mn-rev-li">Guia empresarial G-Empresas (assinaturas)</div>
                              <div class="mn-rev-li">Ag&ecirc;ncia-RISIN: marketing, eventos e servi&ccedil;os</div>
                              <div class="mn-rev-li">TV-RISIN: streaming e conte&uacute;do patrocinado</div>
                          </div>
                      </div>
                      <div class="mn-rev-card">
                          <div class="mn-rev-icon" style="background:linear-gradient(135deg,#047857,#059669)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
                          </div>
                          <h3>Franquias &amp; Royalties</h3>
                          <p>Modelo de expans&atilde;o nacional por franquias regionais, com taxa de entrada e royalties recorrentes sobre a receita bruta de cada regional franqueada.</p>
                          <div class="mn-rev-detail">
                              <div class="mn-rev-li">Taxa de franquia: R$&nbsp;100.000 por regional</div>
                              <div class="mn-rev-li">Royalties sobre receita bruta da regional</div>
                              <div class="mn-rev-li">Treinamento, suporte e uso da marca RISIN</div>
                              <div class="mn-rev-li">Potencial: 478 regionais nacionais</div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="mn-vac">
              <div class="top-acc"></div>
              <div class="mn-wrap">
                  <div class="mn-vac-row">
                      <div class="mn-vac-txt">
                          <h2>5.000 Vagas <span class="grad">Empresariais</span></h2>
                          <p>O modelo operacional prev&ecirc; capacidade para 5.000+ operadores ativos por regional em plena opera&ccedil;&atilde;o &mdash; com crescimento projetado para 8.000-10.000/ano nos ciclos seguintes.</p>
                          <p>A fase de implanta&ccedil;&atilde;o inicia com 4.500 vagas de <strong>Lojista Parceiro Fundador</strong> distribu&iacute;das nas 2 Regionais Modelo (Sorocaba REG070 e Zona Sul-RJ REG024).</p>
                          <div class="mn-vac-stats">
                              <div class="mn-vstat"><strong>4.500</strong><span>Vagas Fundadoras<br>(Fase 1)</span></div>
                              <div class="mn-vstat"><strong>5.000+</strong><span>Vagas Totais<br>(Plataforma Completa)</span></div>
                              <div class="mn-vstat"><strong>8-10k</strong><span>Meta Anual<br>por Regional</span></div>
                              <div class="mn-vstat"><strong>478</strong><span>Regionais<br>Planejadas</span></div>
                          </div>
                      </div>
                      <div class="mn-vac-vis">
                          <div class="mn-phase">
                              <div class="mn-phase-num">1</div>
                              <div class="mn-phase-txt">
                                  <h4>Regionais Modelo (Implanta&ccedil;&atilde;o)</h4>
                                  <p>REG070 Sorocaba-SP e REG024 Zona Sul-RJ: 4.500 vagas fundadoras, valida&ccedil;&atilde;o operacional completa do modelo antes da expans&atilde;o.</p>
                              </div>
                          </div>
                          <div class="mn-phase">
                              <div class="mn-phase-num">2</div>
                              <div class="mn-phase-txt">
                                  <h4>Plataforma Completa (Opera&ccedil;&atilde;o)</h4>
                                  <p>5.000+ lojas ativas por regional, todos os 8 servi&ccedil;os ativos, cooperativas em plena opera&ccedil;&atilde;o e publicidade regional integrada.</p>
                              </div>
                          </div>
                          <div class="mn-phase">
                              <div class="mn-phase-num">3</div>
                              <div class="mn-phase-txt">
                                  <h4>Expans&atilde;o Nacional (Franquias)</h4>
                                  <p>Modelo replicado para as 478 regionais via franquias. Meta de 8.000-10.000 operadores/ano por regional na maturidade.</p>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="mn-addr">
              <div class="mn-wrap">
                  <div class="mn-addr-inner">
                      <div class="mn-addr-txt">
                          <h2>Endere&ccedil;o Eletr&ocirc;nico <span class="grad">de Lojas</span></h2>
                          <p>Sistema propriet&aacute;rio de endere&ccedil;amento que identifica unicamente cada loja dentro do ecossistema, permitindo rastreabilidade completa e integra&ccedil;&atilde;o autom&aacute;tica entre plataformas.</p>
                          <p>O endere&ccedil;o &eacute; composto por 5 segmentos hier&aacute;rquicos que posicionam cada loja geograficamente, setorialmente e dentro do mix comercial da regional.</p>
                          <div class="mn-addr-segs">
                              <div class="mn-seg">
                                  <div class="mn-seg-dot" style="background:#059669"></div>
                                  <strong>REG[001-478]</strong>
                                  <span>Regional geogr&aacute;fica (478 poss&iacute;veis)</span>
                              </div>
                              <div class="mn-seg">
                                  <div class="mn-seg-dot" style="background:#0891B2"></div>
                                  <strong>Setor [1-3]</strong>
                                  <span>1=Prim&aacute;rio, 2=Secund&aacute;rio, 3=Terci&aacute;rio</span>
                              </div>
                              <div class="mn-seg">
                                  <div class="mn-seg-dot" style="background:#059669"></div>
                                  <strong>Atividade [01-10]</strong>
                                  <span>Tipo de atividade econ&ocirc;mica no setor</span>
                              </div>
                              <div class="mn-seg">
                                  <div class="mn-seg-dot" style="background:#0891B2"></div>
                                  <strong>Segmento [A-nn]</strong>
                                  <span>Segmento espec&iacute;fico dentro da atividade</span>
                              </div>
                              <div class="mn-seg">
                                  <div class="mn-seg-dot" style="background:#047857"></div>
                                  <strong>Loja [#XXXX]</strong>
                                  <span>Identificador &uacute;nico da loja na regional</span>
                              </div>
                          </div>
                      </div>
                      <div>
                          <div class="mn-addr-box">
                              <h3>Sistema de Endere&ccedil;amento</h3>
                              <div class="mn-formula">
                                  <div class="mn-fpart">
                                      <span class="mn-fp-label">Regional</span>
                                      <span class="mn-fp-val" style="background:rgba(5,150,105,0.15);color:#34D399">REG[001-478]</span>
                                      <span class="mn-fp-sep">.</span>
                                  </div>
                                  <div class="mn-fpart">
                                      <span class="mn-fp-label">Setor</span>
                                      <span class="mn-fp-val" style="background:rgba(8,145,178,0.15);color:#67E8F9">[1-3]</span>
                                      <span class="mn-fp-sep">.</span>
                                  </div>
                                  <div class="mn-fpart">
                                      <span class="mn-fp-label">Atividade</span>
                                      <span class="mn-fp-val" style="background:rgba(5,150,105,0.15);color:#34D399">[01-10]</span>
                                      <span class="mn-fp-sep">.</span>
                                  </div>
                                  <div class="mn-fpart">
                                      <span class="mn-fp-label">Segmento</span>
                                      <span class="mn-fp-val" style="background:rgba(8,145,178,0.15);color:#67E8F9">[A-nn]</span>
                                      <span class="mn-fp-sep">.</span>
                                  </div>
                                  <div class="mn-fpart">
                                      <span class="mn-fp-label">Loja</span>
                                      <span class="mn-fp-val" style="background:rgba(4,120,87,0.2);color:#6EE7B7">[#XXXX]</span>
                                  </div>
                              </div>
                              <div class="mn-example-hd">Exemplo Real</div>
                              <div class="mn-example-code">REG050.2.03.A02.XXXX</div>
                              <div class="mn-example-desc">
                                  REG050 = Regional 050 &bull; Setor 2 = Secund&aacute;rio &bull;
                                  03 = Atacadista &bull; A02 = Alimentos &bull; XXXX = N&uacute;mero da Loja
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="mn-cta">
              <div class="c-o c-o1"></div>
              <div class="c-o c-o2"></div>
              <div class="mn-wrap mn-cta-inner">
                  <h2>Um Modelo Constru&iacute;do para Escalar</h2>
                  <p>Receita recorrente, 5.000+ vagas por regional e 478 regionais planejadas &mdash; conhe&ccedil;a o programa para lojistas ou explore as oportunidades de franquia.</p>
                  <div class="mn-cta-btns">
                      <a href="/para-lojistas" class="mn-btn-w">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35"/></svg>
                          Para Lojistas
                      </a>
                      <a href="/franquias" class="mn-btn-o">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
                          Oportunidades de Franquia
                      </a>
                  </div>
              </div>
          </section>

      </main>
  - alias: governanca
    name: "Governanca"
    path: Governanca.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
          /* ── Hero ── */
          .gv-hero { position: relative; background: linear-gradient(135deg,#F0FDF4,#F9FAFB,#EFF6FF); padding: var(--risin-section-py) 0; overflow: hidden; }
          .gv-hero .grid-bg { position: absolute; inset: 0; opacity: 0.25; background-image: linear-gradient(rgba(5,150,105,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(5,150,105,0.1) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .gv-hero .orb-g { position: absolute; top: -60px; right: 80px; width: 400px; height: 400px; background: rgba(5,150,105,0.07); border-radius: 50%; filter: blur(64px); pointer-events: none; }
          .gv-hc { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .gv-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.2); border-radius: 9999px; margin-bottom: 24px; }
          .gv-badge svg { width: 16px; height: 16px; color: #059669; }
          .gv-badge span { font-size: 14px; font-weight: 500; color: #059669; }
          .gv-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: var(--risin-text-dark); line-height: 1.15; margin-bottom: 20px; max-width: 700px; }
          .gv-hero h1 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .gv-hero p { font-size: 18px; color: var(--risin-text-muted); max-width: 680px; line-height: 1.7; margin-bottom: 40px; }
          .gv-pillars { display: flex; gap: 24px; flex-wrap: wrap; }
          .gv-pill { display: flex; align-items: center; gap: 10px; padding: 10px 18px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-sm); }
          .gv-pill-dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg,#059669,#0891B2); }
          .gv-pill span { font-size: 13px; font-weight: 500; color: var(--risin-text-dark); }
          @@media (max-width: 640px) { .gv-hero h1 { font-size: 32px; } }

          /* ── Shared ── */
          .gv-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .gv-sec-hd { text-align: center; margin-bottom: 48px; }
          .gv-sec-hd h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .gv-sec-hd h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .gv-sec-hd p { color: var(--risin-text-muted); max-width: 640px; margin: 0 auto; line-height: 1.7; }

          /* ── Lideranca Executiva ── */
          .gv-lead { background: white; padding: var(--risin-section-py) 0; }
          .gv-exec-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-bottom: 24px; }
          .gv-exec-main { grid-column: span 3; }
