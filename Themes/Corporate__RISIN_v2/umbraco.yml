                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
                          </div>
                          <h3>Seguran&ccedil;a da Informa&ccedil;&atilde;o</h3>
                          <p>Prote&ccedil;&atilde;o de dados conforme LGPD, seguran&ccedil;a de cr&eacute;dito, conformidade regulat&oacute;ria e integridade de todas as transa&ccedil;&otilde;es do ecossistema.</p>
                      </div>
                      <div class="gv-pol-card">
                          <div class="gv-pol-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>
                          </div>
                          <h3>Pol&iacute;tica Financeira</h3>
                          <p>Modelo de receita recorrente estruturado, gest&atilde;o transparente de caixa, CRD (Coeficiente de Rateio de Despesas) e relat&oacute;rios peri&oacute;dicos para todos os s&oacute;cios.</p>
                      </div>
                      <div class="gv-pol-card">
                          <div class="gv-pol-icon" style="background:linear-gradient(135deg,#0891B2,#059669)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                          </div>
                          <h3>C&oacute;digo de Conduta</h3>
                          <p>Diretrizes &eacute;ticas para todos os stakeholders &mdash; colaboradores, parceiros e franqueados. Comprometimento com pr&aacute;ticas sustent&aacute;veis, respeito e responsabilidade corporativa.</p>
                      </div>
                      <div class="gv-pol-card">
                          <div class="gv-pol-icon" style="background:linear-gradient(135deg,#059669,#0891B2)">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z"/></svg>
                          </div>
                          <h3>Auditoria &amp; Transpar&ecirc;ncia</h3>
                          <p>Auditorias regulares independentes, acesso a documentos de conformidade para todos os s&oacute;cios e canal direto de comunica&ccedil;&atilde;o com o Conselho Consultivo.</p>
                      </div>
                  </div>
              </div>
          </section>

          <section class="gv-cta">
              <div class="g-line"></div>
              <div class="gv-wrap gv-cta-inner">
                  <h2>Governan&ccedil;a S&oacute;lida desde o <span class="grad">Primeiro Dia</span></h2>
                  <p>Conhe&ccedil;a a estrutura completa ou entre em contato para uma conversa sobre parceria ou investimento.</p>
                  <div class="gv-cta-btns">
                      <a href="/transparencia" class="gv-btn-g">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                          Transpar&ecirc;ncia e Compliance
                      </a>
                      <a href="/relacoes-institucionais" class="gv-btn-o">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
                          Rela&ccedil;&otilde;es Institucionais
                      </a>
                  </div>
              </div>
          </section>

      </main>
  - alias: parceiros
    name: "Parceiros"
    path: Parceiros.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
          /* ── Hero ── */
          .pc-hero { position: relative; background: linear-gradient(135deg,#F9FAFB,#EFF6FF,#F0FDF4); padding: var(--risin-section-py) 0; overflow: hidden; }
          .pc-hero .grid-bg { position: absolute; inset: 0; opacity: 0.2; background-image: linear-gradient(rgba(5,150,105,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(8,145,178,0.1) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .pc-hero .orb-c { position: absolute; top: -80px; right: 60px; width: 420px; height: 420px; background: rgba(8,145,178,0.07); border-radius: 50%; filter: blur(64px); pointer-events: none; }
          .pc-hc { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; text-align: center; }
          .pc-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(8,145,178,0.25); border-radius: 9999px; margin-bottom: 24px; }
          .pc-badge svg { width: 16px; height: 16px; color: #0891B2; }
          .pc-badge span { font-size: 14px; font-weight: 500; color: #0891B2; }
          .pc-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: var(--risin-text-dark); line-height: 1.15; margin-bottom: 20px; }
          .pc-hero h1 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .pc-hero p { font-size: 18px; color: var(--risin-text-muted); max-width: 680px; margin: 0 auto 40px; line-height: 1.7; }
          .pc-cats { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
          .pc-cat-chip { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-sm); transition: all var(--risin-transition); }
          .pc-cat-chip:hover { border-color: rgba(5,150,105,0.3); box-shadow: var(--risin-shadow); }
          .pc-cat-chip .cdot { width: 8px; height: 8px; border-radius: 50%; }
          .pc-cat-chip span { font-size: 13px; font-weight: 500; color: var(--risin-text-dark); }
          @@media (max-width: 640px) { .pc-hero h1 { font-size: 32px; } .pc-cats { gap: 8px; } }

          /* ── Shared ── */
          .pc-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .pc-sec-hd { text-align: center; margin-bottom: 48px; }
          .pc-sec-hd h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .pc-sec-hd h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .pc-sec-hd p { color: var(--risin-text-muted); max-width: 640px; margin: 0 auto; line-height: 1.7; }

          /* ── Categorias ── */
          .pc-cats-sec { background: white; padding: var(--risin-section-py) 0; }
          .pc-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-bottom: 32px; }
          .pc-card { background: var(--risin-bg-lighter); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 32px; transition: all var(--risin-transition); position: relative; overflow: hidden; }
          .pc-card::after { content: ''; position: absolute; inset: 0; opacity: 0; background: linear-gradient(135deg,rgba(5,150,105,0.03),rgba(8,145,178,0.03)); transition: opacity var(--risin-transition); border-radius: var(--risin-radius-xl); }
          .pc-card:hover { border-color: rgba(5,150,105,0.4); box-shadow: var(--risin-shadow-xl); transform: translateY(-4px); }
          .pc-card:hover::after { opacity: 1; }
          .pc-card-top { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
          .pc-num { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#059669,#0891B2); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: white; flex-shrink: 0; }
          .pc-card-icon { width: 52px; height: 52px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
          .pc-card-icon svg { width: 26px; height: 26px; color: white; }
          .pc-card h3 { font-size: 18px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 10px; }
          .pc-card p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.7; margin: 0 0 16px; }
          .pc-card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
          .pc-tag { padding: 3px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
          .pc-full { grid-column: span 3; }
          @@media (max-width: 1024px) { .pc-grid { grid-template-columns: repeat(2,1fr); } .pc-full { grid-column: span 2; } }
          @@media (max-width: 640px) { .pc-grid { grid-template-columns: 1fr; } .pc-full { grid-column: span 1; } }

          /* ── Benefícios ── */
          .pc-ben { background: var(--risin-bg-lighter); padding: var(--risin-section-py) 0; position: relative; overflow: hidden; }
          .pc-ben .top-acc { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .pc-ben-row { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
          .pc-ben-txt h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; }
          .pc-ben-txt h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .pc-ben-txt p { color: var(--risin-text-muted); line-height: 1.7; margin-bottom: 28px; }
          .pc-ben-list { display: flex; flex-direction: column; gap: 14px; }
          .pc-ben-item { display: flex; gap: 14px; align-items: flex-start; padding: 16px 20px; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); transition: all var(--risin-transition); }
          .pc-ben-item:hover { border-color: rgba(5,150,105,0.3); box-shadow: var(--risin-shadow); }
          .pc-ben-ic { width: 36px; height: 36px; border-radius: var(--risin-radius-lg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
          .pc-ben-ic svg { width: 18px; height: 18px; color: white; }
          .pc-ben-txt2 strong { display: block; font-size: 14px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 2px; }
          .pc-ben-txt2 span { font-size: 13px; color: var(--risin-text-muted); line-height: 1.5; }
          .pc-ben-vis { display: flex; justify-content: center; }
          .pc-ben-box { background: linear-gradient(135deg,#059669,#0891B2); border-radius: var(--risin-radius-2xl); padding: 48px 36px; text-align: center; color: white; max-width: 320px; width: 100%; }
          .pc-ben-box h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
          .pc-ben-box p { font-size: 15px; color: rgba(255,255,255,0.85); line-height: 1.6; margin-bottom: 28px; }
          .pc-ben-nums { display: flex; flex-direction: column; gap: 16px; }
          .pc-ben-num { background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border-radius: var(--risin-radius-lg); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
          .pc-ben-num strong { font-size: 22px; font-weight: 700; }
          .pc-ben-num span { font-size: 12px; color: rgba(255,255,255,0.8); text-align: right; max-width: 120px; }
          @@media (max-width: 768px) { .pc-ben-row { grid-template-columns: 1fr; } .pc-ben-vis { display: none; } }

          /* ── CTA ── */
          .pc-cta { background: linear-gradient(135deg,#1F2937,#111827); padding: var(--risin-section-py) 0; text-align: center; position: relative; overflow: hidden; }
          .pc-cta .g-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .pc-cta h2 { font-size: 36px; font-weight: 700; color: white; margin-bottom: 16px; }
          .pc-cta h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .pc-cta p { font-size: 18px; color: rgba(255,255,255,0.75); max-width: 600px; margin: 0 auto 36px; line-height: 1.7; }
          .pc-cta-inner { position: relative; z-index: 1; }
          .pc-cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
          .pc-btn-g { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: linear-gradient(90deg,#059669,#047857); color: white; font-weight: 700; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-xl); text-decoration: none; transition: all var(--risin-transition); }
          .pc-btn-g:hover { transform: translateY(-2px); box-shadow: var(--risin-shadow-2xl); }
          .pc-btn-o { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; border: 2px solid rgba(255,255,255,0.3); color: white; font-weight: 600; font-size: 16px; border-radius: var(--risin-radius-lg); text-decoration: none; transition: all var(--risin-transition); }
          .pc-btn-o:hover { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); }
          .pc-btn-g svg, .pc-btn-o svg { width: 18px; height: 18px; }
          @@media (max-width: 640px) { .pc-cta h2 { font-size: 26px; } .pc-cta-btns { flex-direction: column; align-items: center; } }
      </style>
      <main>

          <section class="pc-hero">
              <div class="grid-bg"></div>
              <div class="orb-c"></div>
              <div class="pc-hc">
                  <div class="pc-badge">
                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
                      <span>5 Categorias de Parcerias Estrat&eacute;gicas</span>
                  </div>
                  <h1>Programa <span class="grad">Parceiros RISIN</span></h1>
                  <p>Oportunidades estruturadas para empresas e profissionais que compartilham nossa vis&atilde;o de crescimento sustent&aacute;vel &mdash; com acesso ao ecossistema de 5.000+ lojas e 478 regionais planejadas.</p>
                  <div class="pc-cats">
                      <div class="pc-cat-chip"><div class="cdot" style="background:#059669"></div><span>Jur&iacute;dico</span></div>
                      <div class="pc-cat-chip"><div class="cdot" style="background:#0891B2"></div><span>Tecnologia</span></div>
                      <div class="pc-cat-chip"><div class="cdot" style="background:#059669"></div><span>Lojas Virtuais</span></div>
                      <div class="pc-cat-chip"><div class="cdot" style="background:#0891B2"></div><span>Marketing</span></div>
                      <div class="pc-cat-chip"><div class="cdot" style="background:#047857"></div><span>Corporativas</span></div>
                  </div>
              </div>
          </section>

          <section class="pc-cats-sec">
              <div class="pc-wrap">
                  <div class="pc-sec-hd">
                      <h2>5 Categorias de <span class="grad">Parceiros</span></h2>
                      <p>Cada categoria &eacute; projetada para um perfil espec&iacute;fico de empresa ou profissional, com modelo de compensa&ccedil;&atilde;o e responsabilidades claramente definidos em contrato.</p>
                  </div>
                  <div class="pc-grid">
                      <div class="pc-card">
                          <div class="pc-card-top">
                              <div class="pc-num">1</div>
                              <div class="pc-card-icon" style="background:linear-gradient(135deg,#059669,#047857)">
                                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v17.25m0 0c-1.472 0-2.882.265-4.185.75M12 20.25c1.472 0 2.882.265 4.185.75M18.75 4.97A48.416 48.416 0 0012 4.5c-2.291 0-4.545.16-6.75.47m13.5 0c1.01.143 2.01.317 3 .52m-3-.52l2.62 10.726c.122.499-.106 1.028-.589 1.202a5.988 5.988 0 01-2.031.352 5.988 5.988 0 01-2.031-.352c-.483-.174-.711-.703-.59-1.202L18.75 4.971zm-16.5.52c.99-.203 1.99-.377 3-.52m0 0l2.62 10.726c.122.499-.106 1.028-.589 1.202a5.989 5.989 0 01-2.031.352 5.989 5.989 0 01-2.031-.352c-.483-.174-.711-.703-.59-1.202L5.25 4.971z"/></svg>
                              </div>
                          </div>
                          <h3>Jur&iacute;dico</h3>
                          <p>Escrit&oacute;rios de advocacia e consultores jur&iacute;dicos especializados em direito empresarial, contratos, propriedade intelectual e compliance regulat&oacute;rio para o ecossistema RISIN.</p>
                          <div class="pc-card-tags">
                              <span class="pc-tag" style="background:rgba(5,150,105,0.08);color:#059669">Direito Empresarial</span>
                              <span class="pc-tag" style="background:rgba(5,150,105,0.08);color:#059669">Contratos</span>
                              <span class="pc-tag" style="background:rgba(5,150,105,0.08);color:#059669">Compliance</span>
                          </div>
                      </div>
                      <div class="pc-card">
                          <div class="pc-card-top">
                              <div class="pc-num">2</div>
                              <div class="pc-card-icon" style="background:linear-gradient(135deg,#0891B2,#0369A1)">
                                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3"/></svg>
                              </div>
                          </div>
                          <h3>Tecnologia &amp; Integra&ccedil;&atilde;o</h3>
                          <p>Integradores de sistemas, empresas de software e parceiros de tecnologia que desenvolvem solu&ccedil;&otilde;es complementares ou integra&ccedil;&otilde;es com as plataformas do ecossistema.</p>
                          <div class="pc-card-tags">
                              <span class="pc-tag" style="background:rgba(8,145,178,0.08);color:#0891B2">Integra&ccedil;&atilde;o de APIs</span>
                              <span class="pc-tag" style="background:rgba(8,145,178,0.08);color:#0891B2">Infraestrutura</span>
                              <span class="pc-tag" style="background:rgba(8,145,178,0.08);color:#0891B2">ERP / CRM</span>
                          </div>
                      </div>
                      <div class="pc-card">
                          <div class="pc-card-top">
                              <div class="pc-num">3</div>
                              <div class="pc-card-icon" style="background:linear-gradient(135deg,#059669,#0891B2)">
                                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 003.75.614"/></svg>
                              </div>
                          </div>
                          <h3>Desenvolvimento de Lojas Virtuais</h3>
                          <p>Desenvolvedores, ag&ecirc;ncias e plataformas especializadas na constru&ccedil;&atilde;o, personaliza&ccedil;&atilde;o e migra&ccedil;&atilde;o de lojas virtuais para o ambiente Clikashop.</p>
                          <div class="pc-card-tags">
                              <span class="pc-tag" style="background:rgba(5,150,105,0.08);color:#059669">E-commerce</span>
                              <span class="pc-tag" style="background:rgba(5,150,105,0.08);color:#059669">Design</span>
                              <span class="pc-tag" style="background:rgba(5,150,105,0.08);color:#059669">Migra&ccedil;&atilde;o</span>
                          </div>
                      </div>
                      <div class="pc-card">
                          <div class="pc-card-top">
                              <div class="pc-num">4</div>
                              <div class="pc-card-icon" style="background:linear-gradient(135deg,#0891B2,#059669)">
                                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535"/></svg>
                              </div>
                          </div>
                          <h3>Marketing &amp; Publicidade</h3>
                          <p>Ag&ecirc;ncias de marketing digital, assessorias de imprensa e profissionais de performance que ampliam a visibilidade das marcas dentro e fora do ecossistema RISIN.</p>
                          <div class="pc-card-tags">
                              <span class="pc-tag" style="background:rgba(8,145,178,0.08);color:#0891B2">SEO / SEM</span>
                              <span class="pc-tag" style="background:rgba(8,145,178,0.08);color:#0891B2">M&iacute;dia Regional</span>
                              <span class="pc-tag" style="background:rgba(8,145,178,0.08);color:#0891B2">Performance</span>
                          </div>
                      </div>
                      <div class="pc-card pc-full">
                          <div class="pc-card-top">
                              <div class="pc-num">5</div>
                              <div class="pc-card-icon" style="background:linear-gradient(135deg,#047857,#059669)">
                                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
                              </div>
                          </div>
                          <h3>Parcerias Corporativas</h3>
                          <p>Grandes empresas e parceiros B2B que se integram ao ecossistema como fornecedores preferenciais, patrocinadores estrat&eacute;gicos ou aliados na expans&atilde;o regional. Condi&ccedil;&otilde;es exclusivas, visibilidade premium e oportunidade de ser parceiro fundador em um grupo digital estabelecido.</p>
                          <div class="pc-card-tags">
                              <span class="pc-tag" style="background:rgba(4,120,87,0.08);color:#047857">B2B Estrat&eacute;gico</span>
                              <span class="pc-tag" style="background:rgba(4,120,87,0.08);color:#047857">Fornecedor Preferencial</span>
                              <span class="pc-tag" style="background:rgba(4,120,87,0.08);color:#047857">Patrocinador</span>
                              <span class="pc-tag" style="background:rgba(4,120,87,0.08);color:#047857">Parceiro Fundador</span>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="pc-ben">
              <div class="top-acc"></div>
              <div class="pc-wrap">
                  <div class="pc-ben-row">
                      <div class="pc-ben-txt">
                          <h2>Benef&iacute;cios para <span class="grad">Parceiros</span></h2>
                          <p>Ser parceiro RISIN significa ter acesso privilegiado a um ecossistema em crescimento, com clareza contratual e oportunidades de longo prazo em todas as 478 regionais planejadas.</p>
                          <div class="pc-ben-list">
                              <div class="pc-ben-item">
                                  <div class="pc-ben-ic" style="background:linear-gradient(135deg,#059669,#047857)">
                                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.562.562 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                                  </div>
                                  <div class="pc-ben-txt2">
                                      <strong>Status de Parceiro Fundador</strong>
                                      <span>Reconhecimento e vantagens exclusivas por ingressar nas fases iniciais do ecossistema</span>
                                  </div>
                              </div>
                              <div class="pc-ben-item">
                                  <div class="pc-ben-ic" style="background:linear-gradient(135deg,#0891B2,#0369A1)">
                                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75"/></svg>
                                  </div>
                                  <div class="pc-ben-txt2">
                                      <strong>Compartilhamento de Receita com Clareza</strong>
                                      <span>Modelo de remunera&ccedil;&atilde;o estruturado e transparente, definido em contrato desde o primeiro dia</span>
                                  </div>
                              </div>
                              <div class="pc-ben-item">
                                  <div class="pc-ben-ic" style="background:linear-gradient(135deg,#059669,#0891B2)">
                                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
                                  </div>
                                  <div class="pc-ben-txt2">
                                      <strong>Acesso a 5.000+ Lojas por Regional</strong>
                                      <span>Alcance direto a todos os operadores do ecossistema em cada regional operacional</span>
                                  </div>
                              </div>
                              <div class="pc-ben-item">
                                  <div class="pc-ben-ic" style="background:linear-gradient(135deg,#047857,#059669)">
                                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                  </div>
                                  <div class="pc-ben-txt2">
                                      <strong>Crescimento de Longo Prazo</strong>
                                      <span>Oportunidade de expans&atilde;o nacional &agrave; medida que a RISIN escala para as 478 regionais</span>
                                  </div>
                              </div>
                          </div>
                      </div>
                      <div class="pc-ben-vis">
                          <div class="pc-ben-box">
                              <h3>Alcance do Ecossistema</h3>
                              <p>N&uacute;meros que demonstram o potencial de cada parceria</p>
                              <div class="pc-ben-nums">
                                  <div class="pc-ben-num"><strong>478</strong><span>Regionais Nacionais</span></div>
                                  <div class="pc-ben-num"><strong>5.000+</strong><span>Vagas por Regional</span></div>
                                  <div class="pc-ben-num"><strong>8</strong><span>Plataformas Integradas</span></div>
                                  <div class="pc-ben-num"><strong>R$510k</strong><span>Capital Social Inicial</span></div>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>

          <section class="pc-cta">
              <div class="g-line"></div>
              <div class="pc-wrap pc-cta-inner">
                  <h2>Seja um Parceiro <span class="grad">Fundador RISIN</span></h2>
                  <p>Entre em contato para conhecer as condi&ccedil;&otilde;es contratuais, modelo de remunera&ccedil;&atilde;o e oportunidades dispon&iacute;veis para a sua categoria de parceria.</p>
                  <div class="pc-cta-btns">
                      <a href="/relacoes-institucionais" class="pc-btn-g">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                          Rela&ccedil;&otilde;es Institucionais
                      </a>
                      <a href="/contato" class="pc-btn-o">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
