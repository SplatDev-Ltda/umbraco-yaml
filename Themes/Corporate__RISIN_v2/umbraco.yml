            description: Mark as featured – used for Clikashop spotlight card
          - alias: sortOrder
            name: Sort Order
            dataType: sortOrderField
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
          - alias: metaDescription
            name: Meta Description
