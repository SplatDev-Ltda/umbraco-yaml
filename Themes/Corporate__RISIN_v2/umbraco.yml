# RISIN Corporate – Umbraco Schema
# Generated: 2026-03-30
# Plugin: SplatDev.Umbraco.Plugins.Yaml2Schema

# ─────────────────────────────────────────────
# LANGUAGES
# ─────────────────────────────────────────────
languages:
  - isoCode: pt-BR
    cultureName: "Portuguese (Brazil)"
    isDefault: true
    isMandatory: true
    update: true
  - isoCode: en-US
    cultureName: "English (United States)"
    isDefault: false
    isMandatory: false
    update: true
  - isoCode: es
    cultureName: "Spanish"
    isDefault: false
    isMandatory: false
    update: true

# ─────────────────────────────────────────────
# DATA TYPES
# ─────────────────────────────────────────────
dataTypes:

  # Text
  - alias: textString
    name: Text String
    editorUiAlias: Umbraco.TextBox
    config:
      maxLength: 512

  - alias: textStringShort
    name: Text String (Short)
    editorUiAlias: Umbraco.TextBox
    config:
      maxLength: 160

  - alias: textArea
    name: Text Area
    editorUiAlias: Umbraco.TextArea
    config:
      maxChars: 2000


  # Media
  - alias: imagePicker
    name: Image Picker
    editorUiAlias: Umbraco.MediaPicker3
    config:
      multiple: false
      onlyImages: true

  # Toggle / Boolean
  - alias: toggle
    name: Toggle
    editorUiAlias: Umbraco.TrueFalse

  # Dropdowns
  - alias: ecosystemCategory
    name: Ecosystem Category
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - Commerce
        - Logistics
        - Purchasing
        - Directory
        - Classifieds
        - Marketing
        - Media
        - Tourism

  - alias: partnerSegment
    name: Partner Segment
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - Juridico
        - Tecnologia
        - DesenvolvimentoLojas
        - MarketingPublicidade
        - ParceriasCorporativas

  - alias: governanceRole
    name: Governance Role
    update: true
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - Presidencia
        - DiretoriaGeral
        - DiretoriaFinanceira
        - DiretoriaMarketing
        - DiretoriaComercial
        - ConselhoConsultivo
        - Compliance

  - alias: institutionalAudience
    name: Institutional Audience
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - GrandesEmpresas
        - EscritoriosAdvocacia
        - InvestidoresEstrategicos
        - ConselhoConsultivo

  - alias: urlPicker
    name: URL Picker
    editorUiAlias: Umbraco.MultiUrlPicker
    update: true
    config:
      maxNumberOfItems: 1

  - alias: integerField
    name: Integer
    editorUiAlias: Umbraco.Integer

  - alias: sortOrderField
    name: Sort Order
    editorUiAlias: Umbraco.Integer

  - alias: pilarBlockList
    name: Pilar Block List
    editorUiAlias: Umbraco.BlockList
    valueType: NTEXT
    update: true
    config:
      blocks:
        - contentElementTypeAlias: pilarElement

  - alias: multipleTextString
    name: Multiple Text String
    editorUiAlias: Umbraco.MultipleTextstring

  - alias: dateTimePicker
    name: Date Time Picker
    editorUiAlias: Umbraco.DateTime

  - alias: timelineBlockList
    name: Timeline Block List
    editorUiAlias: Umbraco.BlockList
    valueType: NTEXT
    config:
      blocks:
        - contentElementTypeAlias: timelineItemElement

  - alias: corpPositionBlockList
    name: Corporate Position Block List
    editorUiAlias: Umbraco.BlockList
    valueType: NTEXT
    config:
      blocks:
        - contentElementTypeAlias: corpPositionElement

  - alias: clikashopBlockList
    name: Clikashop Block List
    editorUiAlias: Umbraco.BlockList
    valueType: NTEXT
    config:
      blocks:
        - contentElementTypeAlias: clikashopItemElement

  - alias: docButtonBlockList
    name: Document Button Block List
    editorUiAlias: Umbraco.BlockList
    valueType: NTEXT
    config:
      blocks:
        - contentElementTypeAlias: docButtonElement


  - alias: locacaoSetor
    name: Setor de Locação
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - industria
        - comercio
        - servicos

  - alias: locacaoPlano
    name: Plano de Locação
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - basico
        - profissional
        - premium


# ─────────────────────────────────────────────
# DOCUMENT TYPES
# ─────────────────────────────────────────────
documentTypes:

  # ── Element Types ─────────────────────────
  - alias: timelineItemElement
    name: Timeline Item
    icon: icon-time
    isElement: true
    tabs:
      - name: Content
        properties:
          - alias: year
            name: Year
            dataType: textString
          - alias: title
            name: Title
            dataType: textString
          - alias: text
            name: Text
            dataType: textArea

  - alias: corpPositionElement
    name: Corporate Position
    icon: icon-user
    isElement: true
    tabs:
      - name: Content
        properties:
          - alias: title
            name: Title
            dataType: textString
          - alias: text
            name: Text
            dataType: textArea

  - alias: clikashopItemElement
    name: Clikashop Item
    icon: icon-item
    isElement: true
    tabs:
      - name: Content
        properties:
          - alias: title
            name: Title
            dataType: textString
          - alias: content
            name: Content
            dataType: "Richtext Editor"
          - alias: image
            name: Image
            dataType: imagePicker

  - alias: docButtonElement
    name: Document Button
    icon: icon-document
    isElement: true
    tabs:
      - name: Content
        properties:
          - alias: label
            name: Label
            dataType: textString
          - alias: url
            name: URL
            dataType: textString

  - alias: pilarElement
    name: Pilar
    icon: icon-item
    isElement: true
    tabs:
      - name: Content
        properties:
          - alias: title
            name: Title
            dataType: textString
          - alias: text
            name: Text
            dataType: textArea

  # ── Site Root ─────────────────────────────
  - alias: siteRoot
    name: Site Root
    icon: icon-home
    allowAsRoot: true
    allowedChildTypes:
      - standardPage
      - aRisinPage
      - ecossistemaPage
      - modeloNegocioPage
      - governancaPage
      - parceirosPage
      - regionaisPage
      - relacoesInstitucionaisPage
      - transparenciaPage
      - paraLojistasPage
      - franquiasPage
      - contatoPage
      - participarPage
      - risinContratoTemplate
      - risinRegional
    update: true
    allowedTemplates:
      - home
    defaultTemplate: home
    tabs:
      - name: Site Settings
        properties:
          - alias: siteName
            name: Site Name
            dataType: textString
            required: true
            description: "Ex: RISIN – Plataforma Empresarial Digital"
          - alias: siteTagline
            name: Tagline
            dataType: textString
            description: Short tagline shown in the browser tab
          - alias: siteEmail
            name: Contact Email
            dataType: textString
            description: "Ex: contato@risin.com.br"
          - alias: siteLocation
            name: Location
            dataType: textString
            description: "Ex: Niterói, RJ - Brasil"
          - alias: sitePhone
            name: Phone
            dataType: textString
            description: "Ex: +55 21 99999-0000"
          - alias: siteWhatsApp
            name: WhatsApp
            dataType: textString
            description: "Ex: +5521999990000 (digits only for wa.me link)"
          - alias: siteLogo
            name: Logo
            dataType: imagePicker
          - alias: copyrightText
            name: Copyright Text
            dataType: textString
            description: "Ex: © 2026 RISIN – Rede de Informações e Serviços na Internet Ltda."
      - name: Social & SEO
        properties:
          - alias: linkedInUrl
            name: LinkedIn URL
            dataType: urlPicker
          - alias: instagramUrl
            name: Instagram URL
            dataType: urlPicker
          - alias: youtubeUrl
            name: YouTube URL
            dataType: urlPicker
          - alias: defaultMetaDescription
            name: Default Meta Description
            dataType: textStringShort
          - alias: defaultOgImage
            name: Default OG Image
            dataType: imagePicker
      - name: Navigation
        properties:
          - alias: ctaButtonUrl
            name: Header CTA Button URL
            dataType: urlPicker
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker
          - alias: faviconIco
            name: Favicon (.ico)
            dataType: imagePicker
          - alias: faviconSvg
            name: Favicon (SVG)
            dataType: imagePicker
          - alias: faviconPng96
            name: Favicon 96×96 (PNG)
            dataType: imagePicker
          - alias: faviconAppleTouch
            name: Apple Touch Icon
            dataType: imagePicker
          - alias: appleMobileWebAppTitle
            name: Apple Mobile Web App Title
            dataType: textStringShort

   # ── Base Page (shared fields) ──────────────
  - alias: basePage
    name: Base Page
    icon: icon-document
    allowAsRoot: false
    allowedChildTypes: []
    update: true
    tabs:
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
            description: Overrides the page title in search results
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker
          - alias: hideFromNavigation
            name: Hide from Navigation
            dataType: toggle

  # ── Home Page ──────────────────────────────
  - alias: homePage
    name: Home Page
    icon: icon-home
    allowAsRoot: false
    allowedChildTypes: []
    update: true
    allowedTemplates:
      - home
    defaultTemplate: home
    tabs:
      - name: Hero
        properties:
          - alias: heroTitle
            name: Hero Title
            dataType: textString
            required: true
            description: "Ex: RISIN – Plataforma Empresarial Digital em Implantação Estruturada"
          - alias: heroSubtitle
            name: Hero Subtitle
            dataType: textArea
            description: Supporting paragraph under hero title
          - alias: heroImage
            name: Hero Image
            dataType: imagePicker
          - alias: heroPrimaryCtaUrl
            name: Primary CTA URL
            dataType: urlPicker
          - alias: heroSecondaryCtaUrl
            name: Secondary CTA URL
            dataType: urlPicker
      - name: Macro Vision
        properties:
          - alias: macroTitle
            name: Section Title
            dataType: textString
            description: "Ex: Visão Macro do Projeto"
          - alias: macroDescription
            name: Description
            dataType: textArea
          - alias: macroPilars
            name: Pilars
            dataType: pilarBlockList
            description: "Block list of pilars (title + text). Ex: 2 Regionais Modelo"
      - name: Ecosystem Block
        properties:
          - alias: ecosystemBlockTitle
            name: Section Title
            dataType: textString
            description: "Ex: Ecossistema RISIN – Plataformas Integradas"
          - alias: ecosystemBlockSubtitle
            name: Subtitle
            dataType: textArea
      - name: Economic Model Block
        properties:
          - alias: economicModelTitle
            name: Section Title
            dataType: textString
            description: "Ex: Modelo Econômico Estruturado"
          - alias: economicModelBullets
            name: Revenue Bullets
            dataType: multipleTextString
            description: Bullet list of revenue sources
          - alias: economicModelHighlight
            name: Highlight Statement
            dataType: textString
            description: "Ex: Modelo projetado para sustentabilidade, escalabilidade..."
      - name: Governance Block
        properties:
          - alias: govBlockTitle
            name: Section Title
            dataType: textString
            description: "Ex: Governança desde a Implantação"
          - alias: govBlockDescription
            name: Description
            dataType: textArea
          - alias: govBlockLinkUrl
            name: Link URL
            dataType: urlPicker
      - name: Partners Block
        properties:
          - alias: partnersBlockTitle
            name: Section Title
            dataType: textString
            description: "Ex: Programa Parceiros RISIN"
          - alias: partnersBlockIntro
            name: Intro Text
            dataType: textArea
          - alias: partnersBlockCtaUrl
            name: CTA URL
            dataType: urlPicker
      - name: Expansion Block
        properties:
          - alias: expansionBlockTitle
            name: Section Title
            dataType: textString
            description: "Ex: Arquitetura para Evolução em Holding Digital"
          - alias: expansionBlockContent
            name: Content
            dataType: "Richtext Editor"
          - alias: expansionMapImage
            name: Brazil Map Image
            dataType: imagePicker
      - name: Final CTA
        properties:
          - alias: finalCtaTitle
            name: Final CTA Title
            dataType: textString
            description: "Ex: RISIN. Estrutura. Governança. Escala."
          - alias: finalCtaText
            name: Supporting Text
            dataType: textArea
          - alias: finalCtaButton1Label
            name: Button 1 Label
            dataType: textString
            description: "Ex: Contato Institucional"
          - alias: finalCtaButton1Url
            name: Button 1 URL
            dataType: urlPicker
          - alias: finalCtaButton2Label
            name: Button 2 Label
            dataType: textString
            description: "Ex: Download Apresentação (PDF)"
          - alias: finalCtaButton2Url
            name: Button 2 URL
            dataType: urlPicker
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker

  # ── A RISIN Page ───────────────────────────
  - alias: aRisinPage
