                          <h4>Expans&atilde;o Internacional</h4>
                          <p>Mercados lus&oacute;fonos e latino-americanos planejados. Cada unidade-pa&iacute;s opera como Franqueador (n&atilde;o franqueado) por website.</p>
                      </div>
                  </div>
                  <div class="rg-intl-row">
                      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
                      <p><strong>Modelo de Franquia:</strong> Cada regional franqueada paga R$&nbsp;100.000 de taxa de entrada e royalties sobre a receita bruta. A RISIN Holding fornece infraestrutura, marca, sistemas, treinamento e suporte operacional completo para garantir os padr&otilde;es de qualidade do ecossistema.</p>
