      .ct-info-icon svg{width:22px;height:22px;color:var(--risin-green)}
      .ct-info-body h4{font-size:.9375rem;font-weight:700;color:var(--risin-text-dark);margin-bottom:.375rem}
      .ct-info-body p,.ct-info-body a{font-size:.875rem;color:var(--risin-text-muted);line-height:1.7;display:block}
      .ct-info-body a{color:var(--risin-cyan);text-decoration:none;transition:color var(--risin-transition)}
      .ct-info-body a:hover{color:var(--risin-green);text-decoration:underline}
      .ct-social-row{display:flex;gap:.75rem;margin-top:.25rem}
      .ct-social-btn{width:40px;height:40px;border:1.5px solid var(--risin-border);border-radius:var(--risin-radius);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--risin-transition);background:none;padding:0}
      .ct-social-btn:hover{border-color:var(--risin-green);background:rgba(5,150,105,.1)}
