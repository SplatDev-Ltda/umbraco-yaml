      - name: Platform Pillars
        properties:
          - alias: pilars
            name: Pilars
            dataType: pilarBlockList
            description: "Block list of pilars (title + text). Ex: Integração Total"
      - name: Timeline
        properties:
          - alias: timelineTitle
            name: Section Title
            dataType: textString
            description: "Ex: Nossa História"
          - alias: timeline
            name: Timeline
            dataType: timelineBlockList
            description: "Timeline items with year, title and text"
      - name: Mission Vision Values
        properties:
          - alias: mvvTitle
            name: Section Title
            dataType: textString
            description: "Ex: Missão, Visão e Valores"
          - alias: missionTitle
            name: Missão – Title
            dataType: textString
          - alias: missionText
            name: Missão – Text
            dataType: "Richtext Editor"
          - alias: visionTitle
            name: Visão – Title
            dataType: textString
          - alias: visionText
            name: Visão – Text
            dataType: "Richtext Editor"
          - alias: valuesTitle
            name: Valores – Title
            dataType: textString
          - alias: valuesText
            name: Valores – Text (bullets)
            dataType: "Richtext Editor"
      - name: Corporate Structure
        properties:
          - alias: corpStructureTitle
            name: Corporate Structure Title
            dataType: textString
          - alias: corpStructureDescription
            name: Corporate Structure Description
            dataType: textArea
          - alias: corpPositions
            name: Positions
            dataType: corpPositionBlockList
            description: "Board positions (title + text for each role)"
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker

  # ── Ecosystem Website Item ─────────────────
  - alias: ecosystemWebsite
    name: Ecosystem Website
    icon: icon-globe
    allowAsRoot: false
    allowedChildTypes: []
    update: true
    tabs:
      - name: Content
        properties:
          - alias: websiteAlias
            name: Website Alias
            dataType: textString
            required: true
            description: "Ex: clikashop"
          - alias: websiteName
            name: Website Name
            dataType: textString
            required: true
            description: "Ex: Clikashop"
          - alias: websiteCategory
            name: Category
            dataType: ecosystemCategory
            required: true
          - alias: websiteDescription
            name: Short Description
            dataType: textArea
            required: true
          - alias: websiteFullDescription
            name: Full Description
            dataType: "Richtext Editor"
          - alias: websiteUrl
            name: External URL
            dataType: urlPicker
          - alias: websiteLogo
            name: Logo
            dataType: imagePicker
          - alias: websiteImage
            name: Cover Image
            dataType: imagePicker
          - alias: isFeatured
            name: Featured (Spotlight)
