              text: "7 especialistas de diferentes áreas, contratos fixos de 2 anos conforme Regulamento Interno, com compensação em percentual da receita líquida da Holding."
          metaTitle: "A RISIN – Quem Somos | Holding de Projetos Digitais"
          metaDescription: "Conheça a história, missão, valores e estrutura corporativa da RISIN – holding empresarial digital constituída em 2013 em Niterói-RJ."

