            <!DOCTYPE html>
            <html lang="pt-BR">
            <head>
            <meta charset="UTF-8">
            <title>Contrato de Locação de Endereço Eletrônico – RISIN Lojista Parceiro Fundador</title>
            <style>
              body{font-family:Arial,sans-serif;font-size:12pt;line-height:1.6;color:#1a1a1a;margin:0;padding:40px}
