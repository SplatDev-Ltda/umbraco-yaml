          - alias: sortOrder
            name: Sort Order
            dataType: sortOrderField

  # ── Governança Page ────────────────────────
  - alias: governancaPage
    name: Governança Page
    icon: icon-shield
    allowAsRoot: false
    allowedChildTypes:
      - governanceRole
