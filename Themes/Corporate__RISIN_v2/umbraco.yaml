                      <p>Entre em contato para manifestar interesse e receber informa&#231;&#245;es priorit&#225;rias sobre disponibilidade na sua regi&#227;o.</p>
                  </div>
              </div>
          </section>
      </main>

  - alias: contato
    name: "Contato"
    path: Contato.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{
          Layout = "master.cshtml";
          var root = Model.Root();
          var siteEmail = root.Value<string>("siteEmail") ?? "contato@risin.com.br";
          var siteLocation = root.Value<string>("siteLocation") ?? "Niter&#243;i, RJ";
      }
      <style>
          .contato-sec { padding: var(--risin-section-py) 0; background: white; }
          .contato-grid { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
          .contato-info h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; }
          .contato-info h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .contato-info p { color: var(--risin-text-muted); line-height: 1.7; margin-bottom: 32px; }
          .ci-item { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
          .ci-icon { width: 48px; height: 48px; background: linear-gradient(135deg,rgba(5,150,105,0.1),rgba(8,145,178,0.1)); border-radius: var(--risin-radius-lg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
          .ci-icon svg { width: 20px; height: 20px; color: #059669; }
          .ci-text { color: var(--risin-text-dark); font-size: 15px; }
          .ci-text a { color: var(--risin-text-dark); transition: color var(--risin-transition); }
          .ci-text a:hover { color: #059669; }
          .contato-form { background: var(--risin-bg-lighter); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 40px; }
          .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
          .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
          .form-group label { font-size: 14px; font-weight: 500; color: var(--risin-text-dark); }
          .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid var(--risin-border); border-radius: var(--risin-radius); font-family: var(--risin-font); font-size: 15px; color: var(--risin-text-dark); background: white; transition: border-color var(--risin-transition); outline: none; box-sizing: border-box; }
          .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,0.1); }
          .form-group textarea { resize: vertical; min-height: 120px; }
          .form-submit { width: 100%; height: 48px; background: linear-gradient(90deg,#059669,#047857); color: white; font-weight: 600; font-size: 15px; border: none; border-radius: var(--risin-radius-lg); cursor: pointer; transition: all var(--risin-transition); box-shadow: var(--risin-shadow-lg); }
          .form-submit:hover { box-shadow: var(--risin-shadow-2xl); transform: translateY(-1px); }
          @@media (max-width: 1024px) { .contato-grid { grid-template-columns: 1fr; } }
          @@media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
      </style>
      <main>
          <section class="page-hero">
              <div class="grid-bg"></div>
              <div class="orb-1"></div>
              <div class="orb-2"></div>
              <div class="ph-container">
                  <h1>Entre em <span class="gradient">Contato</span></h1>
                  <p class="ph-subtitle">Estamos dispon&#237;veis para parceiros, investidores, conselheiros e empresas que desejam fazer parte do ecossistema RISIN.</p>
              </div>
          </section>
      
          <section class="contato-sec">
              <div class="contato-grid">
                  <div class="contato-info">
                      <h2>Fale com a <span class="grad">RISIN</span></h2>
                      <p>Entre em contato para conhecer mais sobre o projeto, oportunidades de parceria ou para fazer parte do ecossistema.</p>
                      <div class="ci-item">
                          <div class="ci-icon">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                          </div>
                          <div class="ci-text"><a href="mailto:@siteEmail">@siteEmail</a></div>
                      </div>
                      <div class="ci-item">
                          <div class="ci-icon">
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                          </div>
                          <div class="ci-text">@siteLocation</div>
                      </div>
                  </div>
                  <div class="contato-form">
                      <form method="post" action="/contato/enviar">
                          <div class="form-row">
                              <div class="form-group">
                                  <label for="nome">Nome</label>
                                  <input id="nome" name="nome" type="text" placeholder="Seu nome" required />
                              </div>
                              <div class="form-group">
                                  <label for="empresa">Empresa</label>
                                  <input id="empresa" name="empresa" type="text" placeholder="Sua empresa" />
                              </div>
                          </div>
                          <div class="form-group">
                              <label for="email">E-mail</label>
                              <input id="email" name="email" type="email" placeholder="seu@email.com" required />
                          </div>
                          <div class="form-group">
                              <label for="assunto">Assunto</label>
                              <select id="assunto" name="assunto">
                                  <option value="">Selecione o assunto</option>
                                  <option value="parceria">Parceria Estrat&#233;gica</option>
                                  <option value="investimento">Investimento</option>
                                  <option value="franquia">Franquia Regional</option>
                                  <option value="lojista">Lojista Parceiro</option>
                                  <option value="outro">Outro</option>
                              </select>
                          </div>
                          <div class="form-group">
                              <label for="mensagem">Mensagem</label>
                              <textarea id="mensagem" name="mensagem" placeholder="Descreva seu interesse..."></textarea>
                          </div>
                          <button type="submit" class="form-submit">Enviar Mensagem</button>
                      </form>
                  </div>
              </div>
          </section>
      </main>


