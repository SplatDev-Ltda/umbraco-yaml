content:
  - alias: risinRoot
    name: RISIN Corporate
    documentType: siteRoot
    isPublished: true
    sortOrder: 0
    properties:
      siteName: "RISIN – Plataforma Empresarial Digital"
      siteTagline: "Rede de Informações e Serviços na Internet Ltda."
      siteEmail: "contato@risin.com.br"
      siteLocation: "Niterói, RJ - Brasil"
      copyrightText: "© 2026 RISIN – Rede de Informações e Serviços na Internet Ltda. Todos os direitos reservados."
      ctaButtonUrl:
        url: "/parceiros"
        title: "Parcerias Estratégicas"
      heroTitle: "RISIN – Plataforma Empresarial Digital em Implantação Estruturada"
      siteLogo: "RISIN – Logo"
      faviconIco: "RISIN – Favicon ICO"
      faviconSvg: "RISIN – Favicon SVG"
      faviconPng96: "RISIN – Favicon 96x96"
      faviconAppleTouch: "RISIN – Apple Touch Icon"
      appleMobileWebAppTitle: "RISIN"
    children:

      # ── Home ────────────────────────────────
      - alias: home
        name: Home
        documentType: homePage
        update: true
        isPublished: true
        sortOrder: 0
        properties:
          heroTitle: "RISIN – Plataforma Empresarial Digital em Implantação Estruturada"
          heroSubtitle: "Integração de 08 websites sob um ecossistema tecnológico único, com modelo regional estruturado e governança progressiva para escalar empresas com segurança."
          heroImage: "RISIN – Home Hero"
          heroPrimaryCtaUrl:
            url: "/a-risin"
            title: "Conheça o Projeto"
          heroSecondaryCtaUrl:
            url: "/parceiros"
            title: "Parcerias Estruturantes"
          macroTitle: "Visão Macro do Projeto"
          macroDescription: "Projeto concebido para nascer estruturado, evoluir para grupo empresarial digital, com foco em escala, governança e modelo regional."
          macroPilars:
            - $type: pilarElement
              title: "2 Regionais Modelo"
              text: "Primeiras unidades para validar operação, processos e franquias."
            - $type: pilarElement
              title: "5.000 Vagas Empresariais"
              text: "Lojas projetadas nos 3 setores da economia, com título de Parceiro Fundador."
            - $type: pilarElement
              title: "Plataforma Integrada"
              text: "08 websites conectados em uma arquitetura tecnológica única."
            - $type: pilarElement
              title: "Governança em Implantação"
              text: "Presidência, diretorias e conselho consultivo desenhados desde a base."
          ecosystemBlockTitle: "Ecossistema RISIN – Plataformas Integradas"
          ecosystemBlockSubtitle: "08 websites operando em plataforma única, com métricas centralizadas e inteligência comercial."
          economicModelTitle: "Modelo Econômico Estruturado"
          economicModelBullets:
            - "Receita recorrente empresarial (aluguéis, condomínios, comissões)."
            - "Publicidade regional e nacional (planos de patrocínio)."
            - "Serviços digitais integrados (cooperativas, guias, mídia, TV, agência)."
            - "Eventos corporativos setoriais e regionais."
          economicModelHighlight: "Modelo projetado para sustentabilidade, escalabilidade e previsibilidade financeira."
          govBlockTitle: "Governança desde a Implantação"
          govBlockDescription: "RISIN nasce com presidência executiva, diretorias, conselho consultivo em formação e políticas de compliance."
          govBlockLinkUrl:
            url: "/governanca"
            title: "Conheça a Estrutura de Governança →"
          partnersBlockTitle: "Programa Parceiros RISIN"
          partnersBlockIntro: "Convite a escritórios jurídicos, integradores de tecnologia, desenvolvedores de lojas virtuais, marketing/publicidade e parcerias corporativas para serem parceiros estruturantes do ecossistema."
          partnersBlockCtaUrl:
            url: "/parceiros"
            title: "Seja Parceiro Estruturante"
          expansionBlockTitle: "Arquitetura para Evolução em Holding Digital"
          expansionBlockContent: |
            <ul>
              <li>Consolidação das 2 regionais modelo.</li>
              <li>Expansão progressiva para 478 regionais BR.</li>
              <li>Possibilidade de expansão internacional.</li>
              <li>Plataforma única e governança progressiva como base.</li>
            </ul>
          finalCtaTitle: "RISIN. Estrutura. Governança. Escala."
          finalCtaText: "Se a sua empresa busca um projeto estruturado, com modelo econômico claro e governança desde a base, fale com a RISIN."
          finalCtaButton1Label: "Contato Institucional"
          finalCtaButton1Url: "/contato"
          finalCtaButton2Label: "Download Apresentação (PDF)"
          finalCtaButton2Url: "/transparencia"
          metaTitle: "RISIN – Plataforma Empresarial Digital em Implantação Estruturada"
          metaDescription: "Ecossistema de 08 websites com modelo regional estruturado, governança progressiva e 5.000 vagas empresariais."

      # ── A RISIN ─────────────────────────────
      - alias: aRisin
        name: A RISIN
        documentType: aRisinPage
        isPublished: true
        sortOrder: 1
        properties:
          heroTitle: "A RISIN"
          heroSubtitle: "Holding de projetos digitais que estrutura um ecossistema empresarial integrado, com foco em mercado B2B, B2C e B2B2C."
          heroImage: "RISIN – Sobre Nós"
          heroIntro:
          foundingVisionTitle: "A Visão Fundadora"
          foundingVisionText: |
            <p>A <strong>RISIN – Plataforma Empresarial Digital</strong> nasceu da visão de criar um ecossistema integrado que conectasse empresas, profissionais e consumidores em uma única plataforma robusta e governada.</p>
            <p>Identificamos que o mercado brasileiro carecia de uma solução que unificasse serviços empresariais digitais com <strong>governança regional estruturada</strong>, permitindo que pequenas e médias empresas acessassem ferramentas de nível corporativo.</p>
            <p>Com 08 portais estratégicos operando de forma integrada, a RISIN oferece desde marketplace B2B/B2C até streaming corporativo, passando por logística, suprimentos, classificados e marketing digital – tudo sob uma única identidade e governança.</p>
            <p>O modelo de <strong>Sócios Fundadores</strong> permite que empresas e profissionais participem ativamente da construção desta plataforma, garantindo benefícios exclusivos e participação no crescimento do ecossistema.</p>
          structuredProjectTitle: "Projeto em Implantação Estruturada"
          structuredProjectContent: |
            <p>Projeto concebido para nascer estruturado como grupo empresarial digital — não como um "site isolado". O foco está em solidez, governança, modelo regional e contratos claros com empresas e parceiros.</p>
            <p>Posicionamento como plataforma tecnológica premium moderna: seriedade + inovação.</p>
          structuredProjectKeyTerms:
            - "Implantação estruturada"
            - "Governança progressiva"
            - "Arquitetura preparada para expansão"
            - "Receita recorrente projetada"
          timelineTitle: "Nossa História"
          timeline:
            - $type: timelineItemElement
              year: "2004"
              title: "Fundação e Origem"
              text: "Criação dos primeiros projetos e domínios que compõem a Rede do Portal RISIN."
            - $type: timelineItemElement
              year: "2020"
              title: "Reestruturação Digital"
              text: "Modernização da plataforma tecnológica e início do modelo de franquias digitais."
            - $type: timelineItemElement
              year: "2024"
              title: "Implantação Estruturada"
              text: "Lançamento do modelo de negócio com 8 portais integrados e governança corporativa."
            - $type: timelineItemElement
              year: "2025"
              title: "Expansão Regional"
              text: "Abertura das primeiras 2 regionais modelo e início da comercialização de vagas empresariais."
            - $type: timelineItemElement
              year: "2026"
              title: "Escala Nacional"
              text: "Meta de 100 regionais ativas e 5.000 vagas empresariais comercializadas."
          mvvTitle: "Missão, Visão e Valores"
          missionTitle: "Missão"
          missionText: "<p>Prestação de serviços, tecnologia, transparência, desenvolvimento econômico e social por meio de um ecossistema empresarial digital integrado.</p>"
          visionTitle: "Visão"
          visionText: "<p>Ser uma holding digital estruturada, referência em transparência e escala regional/nacional, conectando empresas e comunidades em todo o Brasil.</p>"
          valuesTitle: "Valores"
          valuesText: |
            <ul>
              <li>Ética</li>
              <li>Transparência</li>
              <li>Compromisso de longo prazo</li>
              <li>Inovação responsável</li>
              <li>Foco em resultados</li>
            </ul>
          corpStructureTitle: "5 Diretorias Especializadas"
          corpStructureDescription: "A RISIN opera com uma estrutura executiva completa, cada diretoria responsável por uma área estratégica da plataforma."
          pilars:
            - $type: pilarElement
              title: "Integração Total"
              text: "Todos os portais comunicam entre si, criando uma experiência unificada para empresas e consumidores."
            - $type: pilarElement
              title: "Governança Estruturada"
              text: "Presidência, diretoria executiva e conselho consultivo com papéis e responsabilidades bem definidos."
            - $type: pilarElement
              title: "Capilaridade Regional"
              text: "Modelo replicável para 478 regionais em todos os 27 estados do Brasil."
            - $type: pilarElement
              title: "Compliance e LGPD"
              text: "Conformidade regulatória plena e proteção de dados em toda a plataforma, desde a implantação."
            - $type: pilarElement
              title: "Modelo Escalável"
              text: "Estrutura replicável para 478 regionais, com suporte tecnológico centralizado e autonomia local."
          corpPositions:
            - $type: corpPositionElement
              title: "Presidência"
              text: "Responsável pela visão estratégica, representação institucional e decisões de alto impacto."
            - $type: corpPositionElement
              title: "Diretoria de TI"
              text: "Responsável pela arquitetura tecnológica, integração dos portais e segurança da informação."
            - $type: corpPositionElement
              title: "Diretoria Financeira"
              text: "Gestão financeira, captação de recursos e conformidade contábil e fiscal."
            - $type: corpPositionElement
              title: "Diretoria de Marketing"
              text: "Estratégia de marca, comunicação digital e geração de demanda para a rede."
            - $type: corpPositionElement
              title: "Diretoria Comercial"
              text: "Comercialização de vagas empresariais, gestão de parcerias e expansão regional."
            - $type: corpPositionElement
              title: "Conselho Consultivo"
              text: "Orientação estratégica independente, governança e supervisão das diretorias executivas."
          metaTitle: "A RISIN – Quem Somos | Holding de Projetos Digitais"
          metaDescription: "Conheça a história, missão, valores e estrutura corporativa da RISIN – holding empresarial digital com raízes nos anos 90."

      # ── Ecossistema ──────────────────────────
      - alias: ecossistema
        name: Ecossistema
        documentType: ecossistemaPage
        isPublished: true
        sortOrder: 2
        properties:
          heroTitle: "Plataforma Integrada"
          heroSubtitle: "Integração dos 8 websites sob uma mesma plataforma tecnológica. Métricas centralizadas, inteligência comercial, dados compartilhados com segurança."
          heroImage: "RISIN – Ecossistema Digital"
          websitesSectionTitle:
          regionalModelTitle: "Modelo Regional e Shopping Empresarial Digital"
