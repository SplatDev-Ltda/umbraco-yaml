  - alias: relacoesInstitucionais
    name: "Relações Institucionais"
    path: RelacoesInstitucionais.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @using Umbraco.Cms.Core.Models.PublishedContent
      @{
          Layout = "master.cshtml";
          var blocks = Model.Children?.Where(x => x.ContentType.Alias == "institutionalBlock")
                            .OrderBy(x => x.Value<int>("sortOrder"))
                            ?? Enumerable.Empty<IPublishedContent>();
      
          bool IsInvestor(IPublishedContent b) =>
              (b.Value<string>("audienceType") ?? "") == "InvestidoresEstrategicos";
      
          bool IsFeatured(IPublishedContent b) =>
              b.Value<bool>("isFeatured");
      }
      <main class="pt-[80px]">
      
          <!-- Hero -->
          <section class="py-24 bg-surface-container-low overflow-hidden relative">
              <div class="max-w-[1440px] mx-auto px-12 grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
                  <div class="space-y-6">
                      <span class="inline-flex items-center gap-2 px-4 py-1.5 bg-secondary/10 text-secondary rounded-full text-xs font-bold uppercase tracking-widest">
                          <span class="material-symbols-outlined text-sm">corporate_fare</span>
                          Relações Institucionais
                      </span>
                      <h1 class="text-5xl lg:text-6xl font-extrabold tracking-tight text-on-surface leading-[1.1]">
                          @(Model.Value<string>("heroTitle") ?? "Relações Institucionais")
                      </h1>
                      <p class="text-xl text-on-surface-variant leading-relaxed">
                          @(Model.Value<string>("heroSubtitle") ?? "A RISIN mantém relações estratégicas com grandes empresas, investidores e escritórios de advocacia, construindo pontes que fortalecem todo o ecossistema.")
                      </p>
                  </div>
                  <!-- Glassmorphic image card -->
                  <div class="relative">
                      <div class="bg-white/70 backdrop-blur-xl rounded-2xl overflow-hidden shadow-2xl p-2">
                          @{ var relHeroImg = Model.Value<Umbraco.Cms.Core.Models.MediaWithCrops>("heroImage"); }
                          <img alt="Relações Institucionais" class="rounded-xl w-full h-[340px] object-cover grayscale hover:grayscale-0 transition-all duration-700" src="@(relHeroImg != null ? relHeroImg.Url() : "/media/relations-hero.jpg")" />
                      </div>
                      <div class="absolute -bottom-4 -right-4 bg-surface-container-lowest rounded-xl p-4 shadow-xl">
                          <div class="flex items-center gap-2">
                              <span class="material-symbols-outlined text-primary">corporate_fare</span>
                              <div>
                                  <div class="font-bold text-sm">3 Públicos Estratégicos</div>
                                  <div class="text-xs text-on-surface-variant">Grandes Empresas, Investidores, Advocacia</div>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Bento grid audience blocks -->
          <section class="py-24 bg-surface-container-lowest">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="text-center mb-16">
                      <span class="text-primary font-bold tracking-widest uppercase text-xs">Nossos Interlocutores</span>
                      <h2 class="text-4xl font-bold tracking-tight mt-2">@(Model.Value<string>("audienceSectionTitle") ?? "3 Públicos Estratégicos")</h2>
                      <p class="text-on-surface-variant mt-4 max-w-xl mx-auto">Desenvolvemos propostas de valor específicas para cada público, garantindo que o relacionamento gere resultados tangíveis para ambas as partes.</p>
                  </div>
                  @if (blocks.Any())
                  {
                      <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                          @foreach (var block in blocks)
                          {
                              var isInvestor = IsInvestor(block);
                              var featured = IsFeatured(block);
                              var colSpan = featured ? "md:col-span-8" : "md:col-span-4";
                              var audienceType = block.Value<string>("audienceType") ?? "";
                              var hasImage = featured && block.HasValue("blockImage");
                              var imageOnRight = audienceType == "GrandesEmpresas";
      
                              if (isInvestor)
                              {
                                  <div class="@colSpan bg-primary rounded-2xl p-8 text-white">
                                      <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center mb-6">
                                          <span class="material-symbols-outlined text-white text-2xl">savings</span>
                                      </div>
                                      <h3 class="text-2xl font-bold mb-2">@(block.Value<string>("blockTitle") ?? block.Name)</h3>
                                      <div class="text-sm text-white/80 leading-relaxed">
                                          @if (block.HasValue("blockContent"))
                                          {
                                              var contentItems = block.Value<IEnumerable<string>>("blockContent");
                                              if (contentItems != null && contentItems.Any())
                                              {
                                              <div class="space-y-2">
                                                  @foreach (var contentItem in contentItems)
                                                  {
                                                  <div class="flex items-center gap-2 text-sm text-white/80"><div class="w-1.5 h-1.5 bg-white/60 rounded-full flex-shrink-0"></div>@contentItem</div>
                                                  }
                                              </div>
                                              }
                                          }
                                      </div>
                                      @if (block.HasValue("blockCtaLabel") && block.HasValue("blockCtaUrl"))
                                      {
                                          var blockCtaLink = block.Value<IEnumerable<Umbraco.Cms.Core.Models.Link>>("blockCtaUrl")?.FirstOrDefault();
                                          @if (blockCtaLink != null)
                                          {
                                          <a href="@blockCtaLink.Url" class="inline-flex items-center gap-2 mt-6 bg-white text-primary px-6 py-3 rounded-xl font-bold text-sm hover:bg-surface-container-lowest transition-colors">
                                              @(block.Value<string>("blockCtaLabel"))
                                          </a>
                                          }
                                      }
                                  </div>
                              }
                              else if (featured && hasImage)
                              {
                                  <div class="@colSpan bg-surface-container-low rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all group border-t-4 border-primary">
                                      <div class="grid grid-cols-1 md:grid-cols-2 h-full">
                                          @if (!imageOnRight)
                                          {
                                              <div class="hidden md:block relative">
                                                  <img alt="@(block.Value<string>("blockTitle") ?? block.Name)" class="absolute inset-0 w-full h-full object-cover opacity-50 group-hover:opacity-70 transition-opacity" src="@(block.Value<string>("blockImage"))" />
                                              </div>
                                          }
                                          <div class="p-8">
                                              <span class="material-symbols-outlined text-primary text-4xl mb-4">verified_user</span>
                                              <h3 class="text-2xl font-bold mb-3">@(block.Value<string>("blockTitle") ?? block.Name)</h3>
                                              <div class="text-sm text-on-surface-variant leading-relaxed">
                                                  @if (block.HasValue("blockContent"))
                                                  {
                                                      var contentItems = block.Value<IEnumerable<string>>("blockContent");
                                                      if (contentItems != null && contentItems.Any())
                                                      {
                                                      <div class="space-y-2">
                                                          @foreach (var contentItem in contentItems)
                                                          {
                                                          <div class="flex items-center gap-2"><div class="w-1.5 h-1.5 bg-primary rounded-full flex-shrink-0"></div>@contentItem</div>
                                                          }
                                                      </div>
                                                      }
                                                  }
                                              </div>
                                          </div>
                                          @if (imageOnRight)
                                          {
                                              <div class="hidden md:block relative">
                                                  <img alt="@(block.Value<string>("blockTitle") ?? block.Name)" class="absolute inset-0 w-full h-full object-cover opacity-50 group-hover:opacity-70 transition-opacity" src="@(block.Value<string>("blockImage"))" />
                                              </div>
                                          }
                                      </div>
                                  </div>
                              }
                              else
                              {
                                  var borderColor = audienceType == "EscritoriosAdvocacia" ? "border-secondary" : "border-primary";
                                  var iconColor = audienceType == "EscritoriosAdvocacia" ? "text-secondary" : "text-primary";
                                  var iconBg = audienceType == "EscritoriosAdvocacia" ? "bg-secondary/10" : "bg-primary/10";
                                  var icon = audienceType == "EscritoriosAdvocacia" ? "gavel" : "corporate_fare";
                                  <div class="@colSpan bg-surface-container-low rounded-2xl p-8 shadow-sm hover:shadow-xl transition-all border-t-4 @borderColor">
                                      <div class="w-14 h-14 @iconBg rounded-xl flex items-center justify-center mb-6">
                                          <span class="material-symbols-outlined @iconColor text-2xl">@icon</span>
                                      </div>
                                      <h3 class="text-2xl font-bold mb-2">@(block.Value<string>("blockTitle") ?? block.Name)</h3>
                                      <div class="text-sm text-on-surface-variant leading-relaxed">
                                          @if (block.HasValue("blockContent"))
                                          {
                                              var contentItems = block.Value<IEnumerable<string>>("blockContent");
                                              if (contentItems != null && contentItems.Any())
                                              {
                                              <div class="space-y-2">
                                                  @foreach (var contentItem in contentItems)
                                                  {
                                                  <div class="flex items-center gap-2"><div class="w-1.5 h-1.5 bg-primary rounded-full flex-shrink-0"></div>@contentItem</div>
                                                  }
                                              </div>
                                              }
                                          }
                                      </div>
                                  </div>
                              }
                          }
                      </div>
                  }
                  else
                  {
                      <!-- Fallback static grid -->
                      <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                          <!-- Grandes Empresas (8 cols) -->
                          <div class="md:col-span-8 bg-surface-container-low rounded-2xl p-8 shadow-sm hover:shadow-xl transition-all border-t-4 border-primary">
                              <div class="w-14 h-14 bg-primary/10 rounded-xl flex items-center justify-center mb-6">
                                  <span class="material-symbols-outlined text-primary text-2xl">corporate_fare</span>
                              </div>
                              <h3 class="text-2xl font-bold mb-2">Grandes Empresas</h3>
                              <p class="text-sm text-on-surface-variant leading-relaxed mb-6">Para corporações de médio e grande porte que buscam digitalizar suas operações, acessar novos mercados regionais e integrar fornecedores e clientes em uma plataforma unificada.</p>
                              <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">storefront</span>Canal de distribuição digital em 478 regionais</div>
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">inventory_2</span>Gestão de fornecedores via Coop-Supri</div>
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">campaign</span>Presença de marca no ecossistema RISIN</div>
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">handshake</span>Programa de patrocínio Diamond/Platinum</div>
                              </div>
                          </div>
                          <!-- Investidores (4 cols) green -->
                          <div class="md:col-span-4 bg-primary rounded-2xl p-8 text-white">
                              <div class="w-14 h-14 bg-white/20 rounded-xl flex items-center justify-center mb-6">
                                  <span class="material-symbols-outlined text-white text-2xl">savings</span>
                              </div>
                              <h3 class="text-2xl font-bold mb-2">Investidores</h3>
                              <p class="text-sm text-white/80 leading-relaxed mb-6">Para investidores-anjo, fundos de venture capital e family offices interessados em plataformas digitais com potencial de escala nacional.</p>
                              <div class="space-y-3">
                                  <div class="flex items-start gap-2 text-sm text-white/80"><span class="material-symbols-outlined text-white/60 text-sm mt-0.5">trending_up</span>Modelo de receita recorrente e diversificada</div>
                                  <div class="flex items-start gap-2 text-sm text-white/80"><span class="material-symbols-outlined text-white/60 text-sm mt-0.5">map</span>TAM de 478 regionais em 27 estados</div>
                                  <div class="flex items-start gap-2 text-sm text-white/80"><span class="material-symbols-outlined text-white/60 text-sm mt-0.5">hub</span>Efeitos de rede com 8 portais integrados</div>
                              </div>
                          </div>
                          <!-- Escritórios (4 cols) -->
                          <div class="md:col-span-4 bg-surface-container-low rounded-2xl p-8 shadow-sm hover:shadow-xl transition-all border-t-4 border-secondary">
                              <div class="w-14 h-14 bg-secondary/10 rounded-xl flex items-center justify-center mb-6">
                                  <span class="material-symbols-outlined text-secondary text-2xl">gavel</span>
                              </div>
                              <h3 class="text-2xl font-bold mb-2">Escritórios de Advocacia</h3>
                              <p class="text-sm text-on-surface-variant leading-relaxed mb-6">Para escritórios de advocacia empresarial e consultorias de compliance que desejam atuar como parceiros jurídicos do ecossistema.</p>
                              <div class="space-y-3">
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-secondary text-sm mt-0.5">description</span>Assessoria contratual para membros</div>
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-secondary text-sm mt-0.5">security</span>Consultoria em LGPD e proteção de dados</div>
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-secondary text-sm mt-0.5">work</span>Participação no Conselho Consultivo</div>
                              </div>
                          </div>
                          <!-- Conselho Consultivo (8 cols) with image -->
                          <div class="md:col-span-8 bg-surface-container-low rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all group border-t-4 border-primary">
                              <div class="grid grid-cols-1 md:grid-cols-2 h-full">
                                  <div class="p-8">
                                      <span class="material-symbols-outlined text-primary text-4xl mb-4">verified_user</span>
                                      <h3 class="text-2xl font-bold mb-3">Conselho Consultivo</h3>
                                      <p class="text-sm text-on-surface-variant leading-relaxed mb-6">Especialistas independentes em Jurídico, Finanças e Tecnologia que assessoram as decisões estratégicas e garantem compliance em todo o ecossistema.</p>
                                      <div class="grid grid-cols-2 gap-3">
                                          <div class="bg-white rounded-lg p-3">
                                              <div class="font-bold text-sm mb-0.5">Jurídico</div>
                                              <div class="text-xs text-on-surface-variant">Direito empresarial e LGPD</div>
                                          </div>
                                          <div class="bg-white rounded-lg p-3">
                                              <div class="font-bold text-sm mb-0.5">Finanças</div>
                                              <div class="text-xs text-on-surface-variant">Controladoria e investimentos</div>
                                          </div>
                                          <div class="bg-white rounded-lg p-3">
                                              <div class="font-bold text-sm mb-0.5">Tecnologia</div>
                                              <div class="text-xs text-on-surface-variant">Arquitetura e inovação</div>
                                          </div>
                                          <div class="bg-white rounded-lg p-3">
                                              <div class="font-bold text-sm mb-0.5">Estratégia</div>
                                              <div class="text-xs text-on-surface-variant">Planejamento e crescimento</div>
                                          </div>
                                      </div>
                                  </div>
                                  <div class="hidden md:block relative">
                                      @{ var councilImg = Model.Value<Umbraco.Cms.Core.Models.MediaWithCrops>("councilImage"); }
                                      <img alt="Conselho Consultivo" class="absolute inset-0 w-full h-full object-cover opacity-50 group-hover:opacity-70 transition-opacity" src="@(councilImg != null ? councilImg.Url() : "/media/relations-council.jpg")" />
                                  </div>
                              </div>
                          </div>
                      </div>
                  }
              </div>
          </section>
      
          <!-- CTA section -->
          <section class="py-24 bg-surface-container-low">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="text-center max-w-2xl mx-auto">
                      <span class="material-symbols-outlined text-primary text-5xl mb-6">connect_without_contact</span>
                      <h2 class="text-4xl font-bold mb-4">
                          @(Model.Value<string>("ctaTitle") ?? "Estabeleça uma conexão estratégica")
                      </h2>
                      <p class="text-on-surface-variant leading-relaxed mb-10">
                          @(Model.Value<string>("ctaText") ?? "Entre em contato com nossa equipe de relações institucionais para explorar as possibilidades de parceria e integração ao ecossistema RISIN. Juntos, podemos construir algo extraordinário.")
                      </p>
                      <div class="flex flex-col sm:flex-row gap-4 justify-center">
                          <a href="mailto:@(Model.Value<string>("institutionalEmail") ?? "institucional@risin.com.br")" class="inline-flex items-center justify-center gap-2 bg-primary text-white px-10 py-4 rounded-xl font-bold hover:scale-105 transition-transform">
                              <span class="material-symbols-outlined">send</span>
                              Iniciar Conversa
                          </a>
                          <a href="/parceiros" class="inline-flex items-center justify-center gap-2 border-2 border-primary text-primary px-10 py-4 rounded-xl font-bold hover:bg-primary/5 transition-colors">
                              <span class="material-symbols-outlined">handshake</span>
                              Ver Programa de Parceiros
                          </a>
                      </div>
                      <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
                          <div class="bg-surface-container-lowest rounded-xl p-6 text-center shadow-sm">
                              <span class="material-symbols-outlined text-primary text-3xl mb-3">mail</span>
                              <div class="font-bold mb-1">E-mail</div>
                              <div class="text-sm text-on-surface-variant">@(Model.Value<string>("institutionalEmail") ?? "institucional@risin.com.br")</div>
                          </div>
                          <div class="bg-surface-container-lowest rounded-xl p-6 text-center shadow-sm">
                              <span class="material-symbols-outlined text-primary text-3xl mb-3">call</span>
                              <div class="font-bold mb-1">Telefone</div>
                              <div class="text-sm text-on-surface-variant">Central de Atendimento Institucional</div>
                          </div>
                          <div class="bg-surface-container-lowest rounded-xl p-6 text-center shadow-sm">
                              <span class="material-symbols-outlined text-primary text-3xl mb-3">calendar_month</span>
                              <div class="font-bold mb-1">Reunião</div>
                              <div class="text-sm text-on-surface-variant">Agende uma apresentação institucional</div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>
      
      </main>


  - alias: transparencia
    name: "Transparência"
    path: Transparencia.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @using Umbraco.Cms.Core.Models.PublishedContent
      @{
          Layout = "master.cshtml";
          var policyItems = Model.Children?.Where(x => x.ContentType.Alias == "policyItem") ?? Enumerable.Empty<IPublishedContent>();
      }
      <main class="pt-[80px]">
      
          <!-- Hero -->
          <section class="py-24 bg-surface-container-low overflow-hidden relative">
              <div class="max-w-[1440px] mx-auto px-12 grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
                  <div class="space-y-6">
                      <span class="inline-flex items-center gap-2 px-4 py-1.5 bg-primary/10 text-primary rounded-full text-xs font-bold uppercase tracking-widest">
                          <span class="material-symbols-outlined text-sm">balance</span>
                          Transparência
                      </span>
                      <h1 class="text-5xl lg:text-6xl font-extrabold tracking-tight text-on-surface leading-[1.1]">
                          @(Model.Value<string>("heroTitle") ?? "Transparência e Políticas")
                      </h1>
                      <p class="text-xl text-on-surface-variant leading-relaxed">
                          @(Model.Value<string>("heroSubtitle") ?? "Acesse todas as políticas, termos de uso e documentos institucionais da RISIN. Nosso compromisso com a transparência é total.")
                      </p>
                  </div>
                  <div class="relative">
                      <div class="absolute -inset-4 bg-primary/5 rounded-3xl blur-2xl"></div>
                      <div class="bg-surface-container-lowest rounded-2xl p-8 shadow-2xl relative z-10">
                          <div class="space-y-4">
                              <div class="flex items-center gap-3 p-4 bg-surface-container-low rounded-xl">
                                  <span class="material-symbols-outlined text-primary">description</span>
                                  <div>
                                      <div class="font-bold text-sm">Política de Privacidade</div>
                                      <div class="text-xs text-on-surface-variant">Proteção e uso dos seus dados</div>
                                  </div>
                                  <span class="material-symbols-outlined text-outline text-sm ml-auto">chevron_right</span>
                              </div>
                              <div class="flex items-center gap-3 p-4 bg-surface-container-low rounded-xl">
                                  <span class="material-symbols-outlined text-primary">gavel</span>
                                  <div>
                                      <div class="font-bold text-sm">Termos de Uso</div>
                                      <div class="text-xs text-on-surface-variant">Condições gerais da plataforma</div>
                                  </div>
                                  <span class="material-symbols-outlined text-outline text-sm ml-auto">chevron_right</span>
                              </div>
                              <div class="flex items-center gap-3 p-4 bg-surface-container-low rounded-xl">
                                  <span class="material-symbols-outlined text-primary">security</span>
                                  <div>
                                      <div class="font-bold text-sm">LGPD – Conformidade</div>
                                      <div class="text-xs text-on-surface-variant">Lei Geral de Proteção de Dados</div>
                                  </div>
                                  <span class="material-symbols-outlined text-outline text-sm ml-auto">chevron_right</span>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Policy items -->
          <section class="py-24 bg-surface-container-lowest">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="text-center mb-16">
                      <span class="text-primary font-bold tracking-widest uppercase text-xs">Documentos</span>
                      <h2 class="text-4xl font-bold tracking-tight mt-2">Políticas e Termos</h2>
                  </div>
                  @if (policyItems.Any())
                  {
                      <div class="space-y-6 max-w-4xl mx-auto">
                          @foreach (var item in policyItems)
                          {
                              <div class="bg-surface-container-low rounded-2xl overflow-hidden shadow-sm">
                                  <button class="w-full flex items-center justify-between p-8 text-left hover:bg-surface-container transition-colors" onclick="this.nextElementSibling.classList.toggle('hidden')">
                                      <div class="flex items-center gap-4">
                                          <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                                              <span class="material-symbols-outlined text-primary">@(item.Value<string>("policyIcon") ?? "description")</span>
                                          </div>
                                          <div>
                                              <h3 class="font-bold text-lg">@item.Name</h3>
                                              @if (item.HasValue("policyCategory"))
                                              {
                                                  <span class="text-xs text-primary font-semibold uppercase tracking-widest">@(item.Value<string>("policyCategory"))</span>
                                              }
                                          </div>
                                      </div>
                                      <span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
                                  </button>
                                  <div class="hidden px-8 pb-8 text-on-surface-variant leading-relaxed">
                                      @Html.Raw(item.Value("policyContent"))
                                  </div>
                              </div>
                          }
                      </div>
                  }
                  else
                  {
                      <!-- Fallback static policies -->
                      <div class="space-y-6 max-w-4xl mx-auto">
                          <div class="bg-surface-container-low rounded-2xl p-8 shadow-sm">
                              <div class="flex items-center gap-4 mb-6">
                                  <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                                      <span class="material-symbols-outlined text-primary">security</span>
                                  </div>
                                  <div>
                                      <h3 class="font-bold text-lg">Política de Privacidade</h3>
                                      <span class="text-xs text-primary font-semibold uppercase tracking-widest">LGPD – Dados Pessoais</span>
                                  </div>
                              </div>
                              <div class="text-on-surface-variant leading-relaxed space-y-3">
                                  <p>A RISIN está comprometida com a proteção dos seus dados pessoais em conformidade com a Lei Geral de Proteção de Dados (LGPD – Lei nº 13.709/2018).</p>
                                  <p>Coletamos apenas os dados necessários para a prestação dos nossos serviços, com base legal adequada e mediante consentimento quando exigido.</p>
                              </div>
                          </div>
                          <div class="bg-surface-container-low rounded-2xl p-8 shadow-sm">
                              <div class="flex items-center gap-4 mb-6">
                                  <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                                      <span class="material-symbols-outlined text-primary">gavel</span>
                                  </div>
                                  <div>
                                      <h3 class="font-bold text-lg">Termos de Uso</h3>
                                      <span class="text-xs text-primary font-semibold uppercase tracking-widest">Condições Gerais</span>
                                  </div>
                              </div>
                              <div class="text-on-surface-variant leading-relaxed space-y-3">
                                  <p>Ao utilizar a plataforma RISIN, você concorda com os presentes Termos de Uso e nossas Políticas. Recomendamos a leitura completa antes de utilizar nossos serviços.</p>
                                  <p>A RISIN reserva-se o direito de atualizar estes termos, notificando os usuários com antecedência mínima de 30 dias.</p>
                              </div>
                          </div>
                          <div class="bg-surface-container-low rounded-2xl p-8 shadow-sm">
                              <div class="flex items-center gap-4 mb-6">
                                  <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                                      <span class="material-symbols-outlined text-primary">cookie</span>
                                  </div>
                                  <div>
                                      <h3 class="font-bold text-lg">Política de Cookies</h3>
                                      <span class="text-xs text-primary font-semibold uppercase tracking-widest">Rastreamento e Preferências</span>
                                  </div>
                              </div>
                              <div class="text-on-surface-variant leading-relaxed space-y-3">
                                  <p>Utilizamos cookies para melhorar sua experiência, analisar o tráfego do site e personalizar conteúdo. Você pode gerenciar suas preferências a qualquer momento.</p>
                              </div>
                          </div>
                      </div>
                  }
              </div>
          </section>
      
          <!-- Contact for data rights -->
          <section class="py-16 bg-surface-container-low border-t border-outline-variant/20">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="bg-white rounded-2xl p-10 shadow-sm max-w-3xl mx-auto text-center">
                      <span class="material-symbols-outlined text-primary text-4xl mb-4">contact_support</span>
                      <h3 class="text-2xl font-bold mb-3">Exerça seus Direitos de Dados</h3>
                      <p class="text-on-surface-variant leading-relaxed mb-6">
                          Em conformidade com a LGPD, você tem o direito de acessar, corrigir, portar e excluir seus dados pessoais. Entre em contato com nosso DPO.
                      </p>
                      <a href="mailto:@(Model.Root().Value<string>("siteEmail") ?? "dpo@risin.com.br")" class="inline-flex items-center gap-2 bg-primary text-white px-8 py-3 rounded-xl font-bold hover:scale-105 transition-transform">
                          <span class="material-symbols-outlined">mail</span>
                          Contato DPO
                      </a>
                  </div>
              </div>
          </section>
      
      </main>


  - alias: paraLojistas
    name: "Para Lojistas"
    path: ParaLojistas.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{
          Layout = "master.cshtml";
      }
      <main class="pt-[80px]">
      
          <!-- Hero -->
          <section class="py-24 bg-surface-container-low overflow-hidden relative">
              <div class="max-w-[1440px] mx-auto px-12 grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
                  <div class="space-y-6">
                      <span class="inline-flex items-center gap-2 px-4 py-1.5 bg-primary/10 text-primary rounded-full text-xs font-bold uppercase tracking-widest">
                          <span class="material-symbols-outlined text-sm">storefront</span>
                          Para Lojistas
                      </span>
                      <h1 class="text-5xl lg:text-6xl font-extrabold tracking-tight text-on-surface leading-[1.1]">
                          @(Model.Value<string>("heroTitle") ?? "Expanda seu Negócio com a RISIN")
                      </h1>
                      <p class="text-xl text-on-surface-variant leading-relaxed">
                          @(Model.Value<string>("heroSubtitle") ?? "Conecte sua loja ao maior ecossistema empresarial digital do Brasil. Acesse novos clientes, otimize sua logística e cresça com suporte completo.")
                      </p>
                      <div class="flex flex-wrap gap-4 pt-2">
                          <a href="#como-funciona" class="inline-flex items-center gap-2 bg-primary text-white px-8 py-3 rounded-xl font-bold text-sm hover:scale-105 transition-transform">
                              <span class="material-symbols-outlined">rocket_launch</span>
                              Quero Ser Lojista
                          </a>
                          <a href="/contato" class="inline-flex items-center gap-2 border-2 border-primary text-primary px-8 py-3 rounded-xl font-bold text-sm hover:bg-primary/5 transition-colors">
                              Falar com Consultor
                          </a>
                      </div>
                  </div>
                  <div class="relative">
                      <div class="absolute -inset-4 bg-primary/5 rounded-3xl blur-2xl"></div>
                      <img alt="Para Lojistas" class="rounded-2xl shadow-2xl relative z-10 w-full h-[380px] object-cover" src="/images/para-lojistas-hero.jpg" />
                  </div>
              </div>
          </section>
      
          <!-- Benefits -->
          <section class="py-24 bg-surface-container-lowest">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="text-center mb-16">
                      <span class="text-primary font-bold tracking-widest uppercase text-xs">Vantagens</span>
                      <h2 class="text-4xl font-bold tracking-tight mt-2">O que Você Ganha</h2>
                      <p class="text-on-surface-variant mt-4 max-w-xl mx-auto">Ao ingressar na plataforma RISIN, sua loja tem acesso a uma série de benefícios exclusivos para crescer no ambiente digital.</p>
                  </div>
                  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                      <div class="bg-surface-container-low p-8 rounded-xl shadow-sm hover:-translate-y-1 transition-transform">
                          <span class="material-symbols-outlined text-primary text-4xl mb-4">shopping_cart</span>
                          <h3 class="text-xl font-bold mb-3">Marketplace Clikashop</h3>
                          <p class="text-on-surface-variant text-sm leading-relaxed">Venda para clientes B2C e B2B em todo o Brasil com plataforma de marketplace completa, gestão de pedidos e pagamentos integrados.</p>
                      </div>
                      <div class="bg-surface-container-low p-8 rounded-xl shadow-sm hover:-translate-y-1 transition-transform">
                          <span class="material-symbols-outlined text-primary text-4xl mb-4">local_shipping</span>
                          <h3 class="text-xl font-bold mb-3">Logística Cooper-Translog</h3>
                          <p class="text-on-surface-variant text-sm leading-relaxed">Acesso à rede cooperativa de transportadores com tarifas reduzidas pelo poder de compra coletivo do ecossistema RISIN.</p>
                      </div>
                      <div class="bg-surface-container-low p-8 rounded-xl shadow-sm hover:-translate-y-1 transition-transform">
                          <span class="material-symbols-outlined text-primary text-4xl mb-4">campaign</span>
                          <h3 class="text-xl font-bold mb-3">Marketing Digital</h3>
                          <p class="text-on-surface-variant text-sm leading-relaxed">Visibilidade em toda a plataforma com suporte da Agência-RISIN para campanhas, branding e gestão de presença digital.</p>
                      </div>
                      <div class="bg-surface-container-low p-8 rounded-xl shadow-sm hover:-translate-y-1 transition-transform">
                          <span class="material-symbols-outlined text-primary text-4xl mb-4">inventory_2</span>
                          <h3 class="text-xl font-bold mb-3">Suprimentos Coletivos</h3>
                          <p class="text-on-surface-variant text-sm leading-relaxed">Compre com preços de atacado através do Coop-Supri, unindo sua demanda à de outros lojistas para maior poder de negociação.</p>
                      </div>
                      <div class="bg-surface-container-low p-8 rounded-xl shadow-sm hover:-translate-y-1 transition-transform">
                          <span class="material-symbols-outlined text-primary text-4xl mb-4">business_center</span>
                          <h3 class="text-xl font-bold mb-3">Gestão com G-Empresas</h3>
                          <p class="text-on-surface-variant text-sm leading-relaxed">CRM, pipeline de vendas, controle financeiro e inteligência de mercado para gerenciar seu negócio com eficiência.</p>
                      </div>
                      <div class="bg-primary p-8 rounded-xl text-white hover:-translate-y-1 transition-transform">
                          <span class="material-symbols-outlined text-white/80 text-4xl mb-4">groups</span>
                          <h3 class="text-xl font-bold mb-3">Rede de Cooperação</h3>
                          <p class="text-white/80 text-sm leading-relaxed">Faça parte de uma rede de lojistas que cooperam, compartilham informações e se fortalecem mutuamente no mercado digital.</p>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- How it works -->
          <section id="como-funciona" class="py-24 bg-surface-container-low">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="text-center mb-16">
                      <span class="text-primary font-bold tracking-widest uppercase text-xs">Processo</span>
                      <h2 class="text-4xl font-bold tracking-tight mt-2">Como Ingressar na Plataforma</h2>
                  </div>
                  <div class="grid grid-cols-1 md:grid-cols-4 gap-8 relative">
                      <div class="hidden md:block absolute top-8 left-0 right-0 h-0.5 bg-gradient-to-r from-primary to-secondary"></div>
                      <div class="relative text-center">
                          <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center text-white font-black text-xl mx-auto mb-4 relative z-10">1</div>
                          <h3 class="font-bold mb-2">Cadastro</h3>
                          <p class="text-sm text-on-surface-variant">Preencha o formulário de interesse e envie a documentação da sua empresa.</p>
                      </div>
                      <div class="relative text-center">
                          <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center text-white font-black text-xl mx-auto mb-4 relative z-10">2</div>
                          <h3 class="font-bold mb-2">Análise</h3>
                          <p class="text-sm text-on-surface-variant">Nossa equipe analisa o perfil da sua empresa e valida os requisitos de ingresso.</p>
                      </div>
                      <div class="relative text-center">
                          <div class="w-16 h-16 bg-secondary rounded-full flex items-center justify-center text-white font-black text-xl mx-auto mb-4 relative z-10">3</div>
                          <h3 class="font-bold mb-2">Onboarding</h3>
                          <p class="text-sm text-on-surface-variant">Treinamento completo e configuração da sua loja em todos os portais do ecossistema.</p>
                      </div>
                      <div class="relative text-center">
                          <div class="w-16 h-16 bg-secondary rounded-full flex items-center justify-center text-white font-black text-xl mx-auto mb-4 relative z-10">4</div>
                          <h3 class="font-bold mb-2">Operação</h3>
                          <p class="text-sm text-on-surface-variant">Sua loja está ativa! Comece a vender e aproveitar todos os benefícios da rede.</p>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- CTA -->
          <section class="py-24 bg-slate-900 relative overflow-hidden">
              <div class="absolute inset-0 bg-mesh opacity-20"></div>
              <div class="max-w-[1440px] mx-auto px-12 text-center relative z-10">
                  <h2 class="text-4xl font-extrabold text-white mb-4">
                      @(Model.Value<string>("ctaTitle") ?? "Pronto para Crescer com a RISIN?")
                  </h2>
                  <p class="text-white/70 max-w-xl mx-auto mb-10 text-lg">
                      @(Model.Value<string>("ctaText") ?? "Junte-se a milhares de lojistas que já fazem parte do maior ecossistema empresarial digital do Brasil.")
                  </p>
                  <a href="/contato" class="inline-flex items-center gap-2 bg-primary text-white px-12 py-5 rounded-xl font-bold text-lg hover:scale-105 transition-all">
                      <span class="material-symbols-outlined">storefront</span>
                      Quero Ser Lojista RISIN
                  </a>
              </div>
          </section>
      
      </main>


  - alias: franquias
