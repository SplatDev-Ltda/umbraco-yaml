      </div>
      <div class="reg-card-features">
      <div class="reg-feat"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Todos os 8 portais integrados</div>
      <div class="reg-feat"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>TV-RISIN com estúdio local</div>
      <div class="reg-feat"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Centertur com roteiros RJ</div>
      <div class="reg-feat"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Ag&#234;ncia RISIN local ativa</div>
      </div></div>
      </div></div></section>
      
      <section class="reg-deploy"><div class="reg-dep-inner">
      <div class="reg-sec-hd"><span class="reg-tag">Modelo</span><h2 class="reg-h2" style="margin:.5rem 0 0">Pacote de Implanta&#231;&#227;o</h2><p>Tudo que uma regional precisa para operar com sucesso desde o primeiro dia.</p></div>
      <div class="reg-bento">
      <div class="reg-bento-card wide"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>
