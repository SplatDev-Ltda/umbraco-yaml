  - alias: parceiros
    name: "Parceiros"
    path: parceiros.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
      .prc-tag{color:var(--risin-green);font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-size:.75rem;display:block;margin-bottom:.5rem}
      .prc-h2{font-size:clamp(1.75rem,3vw,2.5rem);font-weight:800;color:#0f172a;letter-spacing:-.02em;margin:0 0 1.5rem}
      .prc-types{padding:var(--risin-section-py) var(--risin-padding);background:#fff}
      .prc-types-inner{max-width:var(--risin-max-width);margin:0 auto}
      .prc-sec-hd{text-align:center;margin-bottom:3.5rem}
      .prc-sec-hd p{color:#64748b;max-width:540px;margin:.75rem auto 0;line-height:1.6}
      .prc-bento{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:1.5rem}
      .prc-card{background:#f8fafc;border-radius:1.25rem;padding:2rem;transition:box-shadow .2s}
      .prc-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.1)}
      .prc-card.wide{grid-column:span 2}
      .prc-card.green{background:var(--risin-green)}
      .prc-card svg{width:36px;height:36px;stroke:var(--risin-green);fill:none;margin-bottom:1rem}
      .prc-card.green svg{stroke:#fff}
      .prc-card h3{font-weight:800;font-size:1.15rem;color:#0f172a;margin-bottom:.75rem}
      .prc-card.green h3{color:#fff}
      .prc-card p{font-size:.875rem;color:#64748b;line-height:1.6}
      .prc-card.green p{color:rgba(255,255,255,.85)}
      .prc-tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem}
      .prc-badge{padding:.25rem .625rem;background:rgba(5,150,105,.1);color:var(--risin-green);font-size:.7rem;font-weight:700;border-radius:9999px}
      .prc-card.green .prc-badge{background:rgba(255,255,255,.2);color:#fff}
      .prc-benefits{display:flex;flex-direction:column;gap:.4rem;margin-top:1rem}
      .prc-benefit{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:#475569}
      .prc-card.green .prc-benefit{color:rgba(255,255,255,.85)}
      .prc-benefit::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--risin-green);flex-shrink:0}
      .prc-card.green .prc-benefit::before{background:#fff}
      .prc-img-row{display:flex;gap:1rem;margin-top:1.5rem;flex-wrap:wrap}
      .prc-img-chip{padding:.375rem .875rem;background:rgba(255,255,255,.2);border-radius:.5rem;font-size:.75rem;color:#fff;font-weight:600}
      .prc-cta{padding:var(--risin-section-py) var(--risin-padding);background:#f8fafc}
      .prc-cta-inner{max-width:640px;margin:0 auto;text-align:center}
      .prc-cta-card{background:#fff;border-radius:1.5rem;padding:3rem;box-shadow:0 4px 24px rgba(0,0,0,.08)}
      .prc-cta-card svg{width:48px;height:48px;stroke:var(--risin-green);fill:none;margin-bottom:1.5rem}
      .prc-cta-card h2{font-size:clamp(1.5rem,2.5vw,2rem);font-weight:800;color:#0f172a;margin-bottom:1rem}
      .prc-cta-card p{color:#64748b;line-height:1.65;margin-bottom:2rem}
      .prc-cta-card a{display:inline-flex;align-items:center;gap:.625rem;padding:.875rem 2rem;background:var(--risin-green);color:#fff;font-weight:700;border-radius:.75rem;text-decoration:none;transition:background .2s}
      .prc-cta-card a:hover{background:var(--risin-green-dark)}
      .prc-cta-card a svg{width:18px;height:18px;stroke:currentColor;fill:none;margin:0}
      @@media(max-width:1024px){.prc-bento{grid-template-columns:1fr}.prc-card.wide{grid-column:span 1}}
      </style>
      <main>
      <section class="page-hero"><div class="grid-bg"></div><div class="orb-1"></div><div class="orb-2"></div>
      <div class="ph-container"><h1><span class="gradient">Parceiros</span> Estrat&#233;gicos</h1>
      <p class="ph-subtitle">Junte-se ao ecossistema RISIN como parceiro tecnol&#243;gico, comercial ou institucional e expanda seu alcance junto a milhares de empresas.</p></div></section>
      
      <section class="prc-types"><div class="prc-types-inner">
      <div class="prc-sec-hd"><span class="prc-tag">Categorias</span><h2 class="prc-h2" style="margin:.5rem 0 0">5 Categorias de Parceiros</h2><p>Cada categoria de parceria oferece benef&#237;cios específicos e acesso diferenciado &#224; base de membros da plataforma.</p></div>
      <div class="prc-bento">
      
      <div class="prc-card wide"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3"/></svg>
      <h3>Parceiros de Tecnologia</h3>
      <p>Empresas de software, SaaS, infraestrutura e solu&#231;&#245;es tecnol&#243;gicas que se integram &#224; plataforma RISIN para oferecer valor adicional aos membros.</p>
      <div class="prc-tags">
      <span class="prc-badge">SaaS</span><span class="prc-badge">APIs</span><span class="prc-badge">Infraestrutura</span><span class="prc-badge">IA e Automa&#231;&#227;o</span><span class="prc-badge">Seguran&#231;a Digital</span>
      </div>
      <div class="prc-benefits">
      <span class="prc-benefit">Integra&#231;&#227;o nativa via API RISIN</span>
      <span class="prc-benefit">Listing preferencial no marketplace tecnol&#243;gico</span>
      <span class="prc-benefit">Co-marketing para base de membros</span>
      </div></div>
      
      <div class="prc-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg>
      <h3>Lojas Virtuais</h3>
      <p>Lojistas e e-commerces que querem vender para a base de membros RISIN com condi&#231;&#245;es comerciais diferenciadas.</p>
      <div class="prc-benefits">
      <span class="prc-benefit">Vitrine no Clikashop</span>
      <span class="prc-benefit">Log&#237;stica integrada</span>
      <span class="prc-benefit">Pagamento facilitado</span>
      </div></div>
      
      <div class="prc-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.402m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014 8.855c-.118.38-.245.754-.38 1.125m.38-1.125a23.91 23.91 0 001.014-5.395m0-3.46c.495.413.811 1.035.811 1.73 0 .695-.316 1.317-.811 1.73m0-3.46a24.347 24.347 0 010 3.46"/></svg>
      <h3>Ag&#234;ncias de Marketing</h3>
      <p>Ag&#234;ncias de performance, conte&#250;do e branding que prestam servi&#231;os para membros da plataforma.</p>
      <div class="prc-benefits">
      <span class="prc-benefit">Indica&#231;&#245;es certificadas</span>
      <span class="prc-benefit">Perfil verificado</span>
      <span class="prc-benefit">Acesso a leads</span>
      </div></div>
      
      <div class="prc-card green"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
      <h3>Corporativo &amp; Financeiro</h3>
      <p>Institui&#231;&#245;es financeiras, consultorias e empresas de solu&#231;&#245;es corporativas para o segmento B2B.</p>
      <div class="prc-tags">
      <span class="prc-badge">Fintechs</span><span class="prc-badge">Consultorias</span><span class="prc-badge">Seguros</span>
      </div>
      <div class="prc-benefits">
      <span class="prc-benefit">Canal exclusivo B2B</span>
      <span class="prc-benefit">Integra&#231;&#227;o com G-Empresas</span>
      </div></div>
      
      <div class="prc-card wide"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18"/></svg>
      <h3>Parceiros Institucionais</h3>
      <p>Associa&#231;&#245;es comerciais, sindicatos, entidades de classe e &#243;rg&#227;os p&#250;blicos que queiram integrar seus associados ao ecossistema RISIN, ampliando servi&#231;os e gerando valor para toda a cadeia.</p>
      <div class="prc-img-row">
      <span class="prc-img-chip" style="background:rgba(5,150,105,.12);color:var(--risin-green)">Associa&#231;&#245;es</span>
      <span class="prc-img-chip" style="background:rgba(5,150,105,.12);color:var(--risin-green)">Sindicatos</span>
      <span class="prc-img-chip" style="background:rgba(5,150,105,.12);color:var(--risin-green)">Entidades de Classe</span>
      <span class="prc-img-chip" style="background:rgba(5,150,105,.12);color:var(--risin-green)">&#211;rg&#227;os P&#250;blicos</span>
      <span class="prc-img-chip" style="background:rgba(5,150,105,.12);color:var(--risin-green)">Universidades</span>
      </div></div>
      </div></div></section>
      
      <section class="prc-cta"><div class="prc-cta-inner">
      <div class="prc-cta-card">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.631 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 00-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.448 14.9 14.9 0 01.06-.312m-2.24 2.39a4.493 4.493 0 00-1.757 4.306 4.493 4.493 0 004.306-1.758M16.5 9a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg>
      <h2>Seja um Parceiro RISIN</h2>
      <p>Expanda seu neg&#243;cio junto a uma plataforma em crescimento com milhares de empresas ativas em todo o Brasil. Preencha nosso formul&#225;rio de interesse e entraremos em contato.</p>
      <a href="mailto:parceiros@risin.com.br"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>parceiros&#64;risin.com.br</a>
      </div></div></section>
