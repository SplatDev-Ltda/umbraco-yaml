  - alias: parceiros
    name: "Parceiros"
    path: Parceiros.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @using Umbraco.Cms.Core.Models.PublishedContent
      @{
          Layout = "master.cshtml";
          var partnerItems = Model.Children?.Where(x => x.ContentType.Alias == "partnerItem")
                                 .OrderBy(x => x.Value<int>("sortOrder"))
                                 ?? Enumerable.Empty<IPublishedContent>();
      
          string PartnerIcon(string segment) => segment switch {
              "Tecnologia" => "computer",
              "Juridico" => "gavel",
              "MarketingPublicidade" => "brush",
              "Institucional" => "account_balance",
              _ => "handshake"
          };
      }
      <main class="pt-[80px]">
      
          <!-- Hero with bg image + gradient overlay -->
          <section class="relative min-h-[480px] flex items-center overflow-hidden">
              <div class="absolute inset-0">
                  @{ var parcHeroImg = Model.Value<Umbraco.Cms.Core.Models.MediaWithCrops>("heroImage"); }
                  <img alt="Parceiros RISIN" class="w-full h-full object-cover" src="@(parcHeroImg != null ? parcHeroImg.Url() : "/media/partners-hero.jpg")" />
                  <div class="absolute inset-0 bg-gradient-to-r from-slate-900/90 via-slate-900/70 to-transparent"></div>
              </div>
              <div class="relative z-10 max-w-[1440px] mx-auto px-12 py-24">
                  <div class="max-w-2xl space-y-6">
                      <span class="inline-flex items-center gap-2 px-4 py-1.5 bg-white/10 text-emerald-400 rounded-full text-xs font-bold uppercase tracking-widest">
                          <span class="material-symbols-outlined text-sm">handshake</span>
                          Programa de Parceiros
                      </span>
                      <h1 class="text-5xl lg:text-6xl font-extrabold tracking-tight text-white leading-[1.1]">
                          @(Model.Value<string>("heroTitle") ?? "Programa de Parceiros Estruturantes")
                      </h1>
                      <p class="text-xl text-white/80 leading-relaxed">
                          @(Model.Value<string>("heroSubtitle") ?? "Construa junto conosco a maior plataforma empresarial digital do Brasil. Oportunidades para empresas de tecnologia, jurídico, marketing e institucional.")
                      </p>
                  </div>
              </div>
          </section>
      
          <!-- Bento grid partner categories -->
          <section class="py-24 bg-surface-container-lowest">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="text-center mb-16">
                      <span class="text-primary font-bold tracking-widest uppercase text-xs">Categorias de Parceria</span>
                      <h2 class="text-4xl font-bold tracking-tight mt-2">@(Model.Value<string>("typesTitle") ?? "4 Formas de Fazer Parte")</h2>
                      @if (Model.HasValue("programContent"))
                      {
                          <div class="text-on-surface-variant mt-4 max-w-2xl mx-auto">@Html.Raw(Model.Value("programContent"))</div>
                      }
                  </div>
                  @if (partnerItems.Any())
                  {
                      <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                          @foreach (var item in partnerItems)
                          {
                              var segment = item.Value<string>("partnerSegment") ?? "";
                              var isFeatured = item.Value<bool>("isFeatured");
                              var icon = PartnerIcon(segment);
                              var colSpan = isFeatured ? "md:col-span-8" : "md:col-span-4";
                              var hasImage = isFeatured && item.HasValue("partnerLogo");
                              var imageOnRight = segment == "Tecnologia";
      
                              if (isFeatured && hasImage)
                              {
                                  <div class="@colSpan bg-surface-container-low rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all group relative">
                                      <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary to-secondary"></div>
                                      <div class="grid grid-cols-1 md:grid-cols-2 h-full">
                                          @if (!imageOnRight)
                                          {
                                              <div class="hidden md:block relative">
                                                  <img alt="@(item.Value<string>("partnerName"))" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity" src="@(item.Value<string>("partnerLogo"))" />
                                              </div>
                                          }
                                          <div class="p-8">
                                              <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-6">
                                                  <span class="material-symbols-outlined text-primary">@icon</span>
                                              </div>
                                              <h3 class="text-2xl font-bold mb-2">@(item.Value<string>("partnerName") ?? item.Name)</h3>
                                              <p class="text-xs text-primary font-semibold uppercase tracking-widest mb-4">@segment</p>
                                              <p class="text-sm text-on-surface-variant leading-relaxed mb-6">@(item.Value<string>("partnerDescription") ?? "")</p>
                                              @if (item.HasValue("partnerBenefits"))
                                              {
                                                  var benefitItems = item.Value<IEnumerable<string>>("partnerBenefits");
                                                  if (benefitItems != null && benefitItems.Any())
                                                  {
                                                  <div class="space-y-2 text-sm text-on-surface-variant">
                                                      @foreach (var benefit in benefitItems)
                                                      {
                                                      <div class="flex items-center gap-2"><div class="w-1.5 h-1.5 bg-primary rounded-full flex-shrink-0"></div>@benefit</div>
                                                      }
                                                  </div>
                                                  }
                                              }
                                          </div>
                                          @if (imageOnRight)
                                          {
                                              <div class="hidden md:block relative">
                                                  <img alt="@(item.Value<string>("partnerName"))" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity" src="@(item.Value<string>("partnerLogo"))" />
                                              </div>
                                          }
                                      </div>
                                  </div>
                              }
                              else
                              {
                                  <div class="@colSpan bg-surface-container-low rounded-2xl p-8 shadow-sm hover:shadow-xl transition-all relative">
                                      <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary to-secondary rounded-t-2xl"></div>
                                      <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-6">
                                          <span class="material-symbols-outlined text-primary">@icon</span>
                                      </div>
                                      <h3 class="text-xl font-bold mb-2">@(item.Value<string>("partnerName") ?? item.Name)</h3>
                                      <p class="text-xs text-primary font-semibold uppercase tracking-widest mb-4">@segment</p>
                                      <p class="text-sm text-on-surface-variant leading-relaxed mb-6">@(item.Value<string>("partnerDescription") ?? "")</p>
                                      @if (item.HasValue("partnerBenefits"))
                                      {
                                          var benefitItems = item.Value<IEnumerable<string>>("partnerBenefits");
                                          if (benefitItems != null && benefitItems.Any())
                                          {
                                          <div class="space-y-2 text-sm text-on-surface-variant">
                                              @foreach (var benefit in benefitItems)
                                              {
                                              <div class="flex items-center gap-2"><div class="w-1.5 h-1.5 bg-primary rounded-full flex-shrink-0"></div>@benefit</div>
                                              }
                                          </div>
                                          }
                                      }
                                  </div>
                              }
                          }
                      </div>
                  }
                  else
                  {
                      <!-- Fallback static bento grid -->
                      <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                          <!-- Tech large (8 cols) with image -->
                          <div class="md:col-span-8 bg-surface-container-low rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all group relative">
                              <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary to-secondary"></div>
                              <div class="grid grid-cols-1 md:grid-cols-2 h-full">
                                  <div class="p-8">
                                      <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-6">
                                          <span class="material-symbols-outlined text-primary">computer</span>
                                      </div>
                                      <h3 class="text-2xl font-bold mb-2">Tecnologia</h3>
                                      <p class="text-xs text-primary font-semibold uppercase tracking-widest mb-4">Infraestrutura e Desenvolvimento</p>
                                      <p class="text-sm text-on-surface-variant leading-relaxed mb-6">Para empresas de tecnologia, provedores de infraestrutura e desenvolvedores que desejam contribuir com a evolução técnica da plataforma RISIN.</p>
                                      <div class="space-y-2.5">
                                          <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Co-desenvolvimento de módulos e portais</div>
                                          <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Acesso à API e ambiente de sandbox</div>
                                          <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Revenue sharing por módulos integrados</div>
                                      </div>
                                  </div>
                                  <div class="hidden md:block relative">
                                      @{ var partnerTechImg = Model.Value<Umbraco.Cms.Core.Models.MediaWithCrops>("partnerTechImage"); }
                                      <img alt="Tecnologia" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity" src="@(partnerTechImg != null ? partnerTechImg.Url() : "/media/partners-tech.jpg")" />
                                  </div>
                              </div>
                          </div>
                          <!-- Legal (4 cols) -->
                          <div class="md:col-span-4 bg-surface-container-low rounded-2xl p-8 shadow-sm hover:shadow-xl transition-all relative">
                              <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary to-secondary rounded-t-2xl"></div>
                              <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-6">
                                  <span class="material-symbols-outlined text-primary">gavel</span>
                              </div>
                              <h3 class="text-xl font-bold mb-2">Jurídico &amp; Compliance</h3>
                              <p class="text-xs text-primary font-semibold uppercase tracking-widest mb-4">Assessoria Legal e Regulatória</p>
                              <p class="text-sm text-on-surface-variant leading-relaxed mb-6">Para escritórios de advocacia e consultorias de compliance que desejam atuar como parceiros jurídicos estratégicos.</p>
                              <div class="space-y-2.5">
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Assessoria jurídica nos contratos</div>
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Consultoria em LGPD</div>
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Participação no Conselho Consultivo</div>
                              </div>
                          </div>
                          <!-- Marketing (4 cols) -->
                          <div class="md:col-span-4 bg-surface-container-low rounded-2xl p-8 shadow-sm hover:shadow-xl transition-all relative">
                              <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary to-secondary rounded-t-2xl"></div>
                              <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-6">
                                  <span class="material-symbols-outlined text-primary">brush</span>
                              </div>
                              <h3 class="text-xl font-bold mb-2">Marketing &amp; Branding</h3>
                              <p class="text-xs text-primary font-semibold uppercase tracking-widest mb-4">Comunicação e Identidade</p>
                              <p class="text-sm text-on-surface-variant leading-relaxed mb-6">Para agências de marketing, studios de design e profissionais de comunicação que participam da construção da identidade da RISIN.</p>
                              <div class="space-y-2.5">
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Produção de materiais institucionais</div>
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Gestão de canais e redes sociais</div>
                                  <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Campanhas de lançamento regional</div>
                              </div>
                          </div>
                          <!-- Institutional large (8 cols) with image -->
                          <div class="md:col-span-8 bg-surface-container-low rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all group relative">
                              <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary to-secondary"></div>
                              <div class="grid grid-cols-1 md:grid-cols-2 h-full">
                                  <div class="hidden md:block relative">
                                      @{ var partnerInstitutionalImg = Model.Value<Umbraco.Cms.Core.Models.MediaWithCrops>("partnerInstitutionalImage"); }
                                      <img alt="Institucional" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity" src="@(partnerInstitutionalImg != null ? partnerInstitutionalImg.Url() : "/media/partners-institutional.jpg")" />
                                  </div>
                                  <div class="p-8">
                                      <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-6">
                                          <span class="material-symbols-outlined text-primary">account_balance</span>
                                      </div>
                                      <h3 class="text-2xl font-bold mb-2">Institucional</h3>
                                      <p class="text-xs text-primary font-semibold uppercase tracking-widest mb-4">Câmaras, Associações e Entidades</p>
                                      <p class="text-sm text-on-surface-variant leading-relaxed mb-6">Para câmaras de comércio, associações comerciais e entidades que desejam integrar o ecossistema RISIN como âncora regional.</p>
                                      <div class="space-y-2.5">
                                          <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Plataforma completa para base associativa</div>
                                          <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Portal de classificados e marketplace exclusivo</div>
                                          <div class="flex items-start gap-2 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-primary text-sm mt-0.5">check_circle</span>Representação regional na governança RISIN</div>
                                      </div>
                                  </div>
                              </div>
                          </div>
                      </div>
                  }
              </div>
          </section>
      
          <!-- CTA white card -->
          <section class="py-24 bg-surface-container-low">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="bg-white rounded-2xl p-12 shadow-sm text-center max-w-2xl mx-auto">
                      <span class="material-symbols-outlined text-primary text-5xl mb-6">handshake</span>
                      <h2 class="text-3xl font-bold mb-4">
                          @(Model.Value<string>("ctaTitle") ?? "Seja um Parceiro Estruturante")
                      </h2>
                      <p class="text-on-surface-variant leading-relaxed mb-8">
                          @(Model.Value<string>("ctaText") ?? "Entre em contato com nosso time de parcerias e descubra qual categoria melhor se encaixa ao perfil da sua empresa. Juntos construiremos a maior plataforma empresarial digital do Brasil.")
                      </p>
                      <div class="flex flex-col sm:flex-row gap-4 justify-center">
                          <a href="mailto:@(Model.Value<string>("partnerEmail") ?? "parcerias@risin.com.br")" class="inline-flex items-center justify-center gap-2 bg-primary text-white px-8 py-4 rounded-xl font-bold hover:scale-105 transition-transform">
                              <span class="material-symbols-outlined">mail</span>
                              @(Model.Value<string>("partnerEmail") ?? "parcerias@risin.com.br")
                          </a>
                          <a href="/relacoes-institucionais" class="inline-flex items-center justify-center gap-2 border-2 border-primary text-primary px-8 py-4 rounded-xl font-bold hover:bg-primary/5 transition-colors">
                              Relações Institucionais
                          </a>
                      </div>
                  </div>
              </div>
          </section>
      
      </main>


  - alias: regionais
    name: "Regionais"
    path: Regionais.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @using Umbraco.Cms.Core.Models.PublishedContent
      @{
          Layout = "master.cshtml";
          var modelRegionals = Model.Children?.Where(x => x.ContentType.Alias == "regionalItem" && x.Value<bool>("isModelRegional"))
                                    .OrderBy(x => x.Value<int>("sortOrder"))
                                    ?? Enumerable.Empty<IPublishedContent>();
          var regionColors = new[] { "bg-primary", "bg-secondary", "bg-emerald-600", "bg-cyan-600" };
      }
      <main class="pt-[80px]">
      
          <!-- Hero with decorative orbs and map -->
          <section class="py-24 bg-surface-container-low overflow-hidden relative">
              <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
                  <div class="absolute -top-40 -left-40 w-[600px] h-[600px] bg-primary/5 rounded-full blur-3xl"></div>
                  <div class="absolute -bottom-40 -right-40 w-[600px] h-[600px] bg-secondary/5 rounded-full blur-3xl"></div>
              </div>
              <div class="max-w-[1440px] mx-auto px-12 grid grid-cols-1 md:grid-cols-2 gap-16 items-center relative z-10">
                  <div class="space-y-6">
                      <span class="inline-flex items-center gap-2 px-4 py-1.5 bg-primary/10 text-primary rounded-full text-xs font-bold uppercase tracking-widest">
                          <span class="material-symbols-outlined text-sm">map</span>
                          Expansão Regional
                      </span>
                      <h1 class="text-5xl lg:text-6xl font-extrabold tracking-tight text-on-surface leading-[1.1]">
                          <span class="text-gradient">@(Model.Value<string>("heroStatNumber") ?? "478") Clusters</span> de Inovação
                      </h1>
                      <p class="text-xl text-on-surface-variant leading-relaxed">
                          @(Model.Value<string>("heroSubtitle") ?? "A RISIN está estruturada para expandir por todo o Brasil com um modelo replicável, governança local e sinergia nacional em cada uma das 478 regionais previstas.")
                      </p>
                      <div class="grid grid-cols-2 gap-8 pt-4">
                          <div>
                              <div class="text-5xl font-black text-primary">@(Model.Value<string>("heroStatNumber") ?? "478")</div>
                              <div class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mt-1">Regionais Planejadas</div>
                          </div>
                          <div>
                              <div class="text-5xl font-black text-secondary">27</div>
                              <div class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mt-1">Estados Alcançados</div>
                          </div>
                      </div>
                  </div>
                  <!-- Brazil map with animate-ping dots -->
                  <div class="relative rounded-2xl overflow-hidden shadow-2xl bg-slate-900 aspect-video flex items-center justify-center">
                      @{ var expansionMapImg = Model.Value<Umbraco.Cms.Core.Models.MediaWithCrops>("expansionMapImage"); }
                      <img alt="Mapa de Expansão Brasil" class="absolute inset-0 w-full h-full object-cover opacity-40 map-container" src="@(expansionMapImg != null ? expansionMapImg.Url() : "/media/expansion-map.jpg")" />
                      <!-- SP dot -->
                      <div class="absolute" style="bottom: 42%; right: 28%;">
                          <div class="relative flex items-center justify-center">
                              <div class="w-4 h-4 bg-emerald-400 rounded-full animate-ping absolute"></div>
                              <div class="w-4 h-4 bg-emerald-400 rounded-full relative z-10"></div>
                              <span class="absolute -top-6 text-white text-xs font-bold whitespace-nowrap">SP</span>
                          </div>
                      </div>
                      <!-- RJ dot -->
                      <div class="absolute" style="bottom: 45%; right: 24%;">
                          <div class="relative flex items-center justify-center">
                              <div class="w-3 h-3 bg-cyan-400 rounded-full animate-ping absolute" style="animation-delay: 0.5s;"></div>
                              <div class="w-3 h-3 bg-cyan-400 rounded-full relative z-10"></div>
                              <span class="absolute -top-6 text-white text-xs font-bold whitespace-nowrap">RJ</span>
                          </div>
                      </div>
                      <div class="relative z-10 flex flex-col items-center mt-16">
                          <span class="text-white/60 font-bold tracking-widest text-sm uppercase">EXPANSÃO NACIONAL</span>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Regionais Modelo cards -->
          <section class="py-24 bg-surface-container-lowest">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="text-center mb-16">
                      <span class="text-primary font-bold tracking-widest uppercase text-xs">Pioneiros</span>
                      <h2 class="text-4xl font-bold tracking-tight mt-2">@(Model.Value<string>("modelRegionalsTitle") ?? "Regionais Modelo")</h2>
                      <p class="text-on-surface-variant mt-4 max-w-2xl mx-auto">@(Model.Value<string>("modelRegionalsDescription") ?? "As regionais modelo são laboratórios vivos onde validamos e refinamos o modelo de negócio antes da expansão para os demais estados.")</p>
                  </div>
                  @if (modelRegionals.Any())
                  {
                      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                          @{ int rIdx = 0; }
                          @foreach (var regional in modelRegionals)
                          {
                              var code = regional.Value<string>("regionalCode") ?? "##";
                              var colorClass = regionColors[rIdx % regionColors.Length];
                              var regionalImg = regional.Value<Umbraco.Cms.Core.Models.MediaWithCrops>("regionalImage");
                              var imgSrc = regionalImg != null ? regionalImg.Url() : $"/media/expansion-{code.ToLower()}.jpg";
                              var badgeNum = (rIdx + 1).ToString("D2");
                              <div class="rounded-2xl overflow-hidden shadow-lg group relative">
                                  <img alt="@(regional.Value<string>("regionalName") ?? regional.Name) Regional" class="w-full h-[300px] object-cover grayscale group-hover:grayscale-0 transition-all duration-700" src="@imgSrc" />
                                  <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent"></div>
                                  <div class="absolute bottom-0 left-0 right-0 p-6">
                                      <div class="flex items-center gap-3 mb-3">
                                          <div class="w-10 h-10 @colorClass rounded-full flex items-center justify-center text-white font-black">@code</div>
                                          <div>
                                              <div class="text-white font-bold text-lg">@(regional.Value<string>("regionalName") ?? regional.Name)</div>
                                              <span class="px-2 py-0.5 @colorClass/80 text-white text-xs font-bold rounded-full">Regional Modelo #@badgeNum</span>
                                          </div>
                                      </div>
                                      <p class="text-white/80 text-sm leading-relaxed">@(regional.Value<string>("regionalDescription") ?? "")</p>
                                  </div>
                              </div>
                              rIdx++;
                          }
                      </div>
                  }
                  else
                  {
                      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                          <!-- SP -->
                          <div class="rounded-2xl overflow-hidden shadow-lg group relative">
                              <img alt="São Paulo Regional" class="w-full h-[300px] object-cover grayscale group-hover:grayscale-0 transition-all duration-700" src="/media/expansion-sp.jpg" />
                              <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent"></div>
                              <div class="absolute bottom-0 left-0 right-0 p-6">
                                  <div class="flex items-center gap-3 mb-3">
                                      <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white font-black">SP</div>
                                      <div>
                                          <div class="text-white font-bold text-lg">São Paulo</div>
                                          <span class="px-2 py-0.5 bg-primary/80 text-white text-xs font-bold rounded-full">Regional Modelo #01</span>
                                      </div>
                                  </div>
                                  <p class="text-white/80 text-sm leading-relaxed mb-3">Polo econômico pioneiro com foco em biotecnologia e finanças descentralizadas (DeFi).</p>
                                  <div class="flex flex-wrap gap-2">
                                      <span class="px-2 py-0.5 bg-white/20 text-white text-xs rounded-full">Biotecnologia</span>
                                      <span class="px-2 py-0.5 bg-white/20 text-white text-xs rounded-full">DeFi</span>
                                      <span class="px-2 py-0.5 bg-white/20 text-white text-xs rounded-full">Fintechs</span>
                                      <span class="px-2 py-0.5 bg-white/20 text-white text-xs rounded-full">Startups</span>
                                  </div>
                              </div>
                          </div>
                          <!-- RJ -->
                          <div class="rounded-2xl overflow-hidden shadow-lg group relative">
                              <img alt="Rio de Janeiro Regional" class="w-full h-[300px] object-cover grayscale group-hover:grayscale-0 transition-all duration-700" src="/media/expansion-rj.jpg" />
                              <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent"></div>
                              <div class="absolute bottom-0 left-0 right-0 p-6">
                                  <div class="flex items-center gap-3 mb-3">
                                      <div class="w-10 h-10 bg-secondary rounded-full flex items-center justify-center text-white font-black">RJ</div>
                                      <div>
                                          <div class="text-white font-bold text-lg">Rio de Janeiro</div>
                                          <span class="px-2 py-0.5 bg-secondary/80 text-white text-xs font-bold rounded-full">Regional Modelo #02</span>
                                      </div>
                                  </div>
                                  <p class="text-white/80 text-sm leading-relaxed mb-3">Capital marítima com especialização em energia limpa e setor marítimo-portuário.</p>
                                  <div class="flex flex-wrap gap-2">
                                      <span class="px-2 py-0.5 bg-white/20 text-white text-xs rounded-full">Energia Limpa</span>
                                      <span class="px-2 py-0.5 bg-white/20 text-white text-xs rounded-full">Marítimo</span>
                                      <span class="px-2 py-0.5 bg-white/20 text-white text-xs rounded-full">Óleo &amp; Gás</span>
                                      <span class="px-2 py-0.5 bg-white/20 text-white text-xs rounded-full">Portuário</span>
                                  </div>
                              </div>
                          </div>
                      </div>
                  }
              </div>
          </section>
      
          <!-- Roadmap: sticky panel + bento grid -->
          <section class="py-24 bg-surface-container-low">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-start">
                      <div class="md:sticky md:top-24">
                          <span class="text-primary font-bold tracking-widest uppercase text-xs">Plano de Expansão</span>
                          <h2 class="text-4xl font-bold tracking-tight mt-2 mb-6">@(Model.Value<string>("expansionTitle") ?? "Roadmap de Crescimento Nacional")</h2>
                          @if (Model.HasValue("expansionContent"))
                          {
                              var expansionItems = Model.Value<IEnumerable<string>>("expansionContent");
                              if (expansionItems != null && expansionItems.Any())
                              {
                              <div class="space-y-3 text-on-surface-variant leading-relaxed mb-8">
                                  @foreach (var item in expansionItems)
                                  {
                                  <div class="flex items-center gap-2"><div class="w-1.5 h-1.5 bg-primary rounded-full flex-shrink-0"></div>@item</div>
                                  }
                              </div>
                              }
                          }
                          else
                          {
                              <p class="text-on-surface-variant leading-relaxed mb-8">Cada nova regional recebe um pacote completo: plataforma configurada, treinamento, suporte e o playbook de implantação desenvolvido a partir das regionais modelo SP e RJ.</p>
                          }
                          <div class="space-y-4">
                              <div class="bg-surface-container-lowest rounded-xl p-5">
                                  <div class="flex items-center justify-between mb-3">
                                      <span class="text-sm font-bold">Implantação SP e RJ</span>
                                      <span class="px-2 py-0.5 bg-primary/10 text-primary text-xs font-bold rounded-full">Em andamento</span>
                                  </div>
                                  <div class="h-2 bg-surface-container-high rounded-full overflow-hidden">
                                      <div class="h-full bg-primary rounded-full" style="width: 65%"></div>
                                  </div>
                                  <div class="text-xs text-on-surface-variant mt-1">65% concluído</div>
                              </div>
                              <div class="bg-surface-container-lowest rounded-xl p-5">
                                  <div class="flex items-center justify-between mb-3">
                                      <span class="text-sm font-bold">Expansão Sul/Sudeste</span>
                                      <span class="px-2 py-0.5 bg-secondary/10 text-secondary text-xs font-bold rounded-full">2026</span>
                                  </div>
                                  <div class="h-2 bg-surface-container-high rounded-full overflow-hidden">
                                      <div class="h-full bg-secondary rounded-full" style="width: 15%"></div>
                                  </div>
                                  <div class="text-xs text-on-surface-variant mt-1">15% concluído</div>
                              </div>
                              <div class="bg-surface-container-lowest rounded-xl p-5">
                                  <div class="flex items-center justify-between mb-3">
                                      <span class="text-sm font-bold">Cobertura Nacional 478</span>
                                      <span class="px-2 py-0.5 bg-outline/10 text-outline text-xs font-bold rounded-full">2027–2030</span>
                                  </div>
                                  <div class="h-2 bg-surface-container-high rounded-full overflow-hidden">
                                      <div class="h-full bg-outline rounded-full" style="width: 5%"></div>
                                  </div>
                                  <div class="text-xs text-on-surface-variant mt-1">Planejado</div>
                              </div>
                          </div>
                      </div>
                      <div class="grid grid-cols-2 gap-4">
                          <div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm text-center">
                              <span class="material-symbols-outlined text-primary text-3xl mb-3">inventory_2</span>
