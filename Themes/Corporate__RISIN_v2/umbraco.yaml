      <div class="ecs-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.115 5.19l.319 1.913A6 6 0 008.11 10.36L9.75 12l-.387.775c-.217.433-.132.956.21 1.298l1.348 1.348c.21.21.329.497.329.795v1.089c0 .426.24.815.622 1.006l.153.076c.433.217.956.132 1.298-.21l.723-.723a8.7 8.7 0 002.288-4.042 1.087 1.087 0 00-.358-1.099l-1.33-1.108c-.251-.21-.582-.299-.905-.245l-1.17.195a1.125 1.125 0 01-.98-.314l-.295-.295a1.125 1.125 0 010-1.591l.13-.132a1.125 1.125 0 011.3-.21l.603.302a.809.809 0 001.086-1.086L14.25 7.5l1.256-.837a4.5 4.5 0 001.528-1.732l.146-.292M6.115 5.19A9 9 0 1017.18 4.64M6.115 5.19A8.965 8.965 0 0112 3c1.929 0 3.716.607 5.18 1.64"/></svg>
      <div class="ecs-card-name">Centertur</div><span class="ecs-card-type">Turismo Corporativo</span>
      <p class="ecs-card-desc">Portal de turismo corporativo com pacotes especiais para eventos, viagens empresariais e incentivos.</p></div>
      </div></div></section>
      
      <section class="ecs-integration"><div class="ecs-int-inner">
      <div class="ecs-sec-hd"><span class="ecs-tag">Integra&#231;&#227;o</span><h2 class="ecs-h2" style="margin:.5rem 0 1rem">Como os Portais se Integram</h2><p>A sinergia entre os portais cria um ecossistema onde cada membro se beneficia de toda a rede.</p></div>
      <div class="ecs-int-grid">
      <div class="ecs-int-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg>
      <h3>Clikashop como Hub Central</h3>
      <p>O marketplace conecta vendedores, compradores, log&#237;stica e suprimentos em um &#250;nico fluxo comercial integrado.</p>
