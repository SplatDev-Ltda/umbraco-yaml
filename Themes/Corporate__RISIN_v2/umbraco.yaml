          economicContent:
            - "Aluguéis e condomínios dos shoppings Clikashop (3 setores)."
            - "Comissões sobre vendas (políticas diferenciadas por planos)."
            - "Patrocínios e publicidades (banners, planos Ouro/Prata/Bronze/Básico)."
