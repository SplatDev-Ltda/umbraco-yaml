                              <a href="@(Model.Value<string>("documentButton1Url"))" class="flex items-center gap-2 px-6 py-3 bg-surface-container-low rounded-lg font-semibold text-sm hover:bg-surface-container transition-colors">
                                  <span class="material-symbols-outlined text-primary">download</span>
                                  @(Model.Value<string>("documentButton1Label") ?? "Estatuto Social")
                              </a>
                          }
                          else
                          {
                              <button class="flex items-center gap-2 px-6 py-3 bg-surface-container-low rounded-lg font-semibold text-sm hover:bg-surface-container transition-colors">
                                  <span class="material-symbols-outlined text-primary">download</span>
