# RISIN Corporate – Umbraco Schema
# Generated: 2026-03-30
# Plugin: SplatDev.Umbraco.Plugins.Yaml2Schema

# ─────────────────────────────────────────────
# LANGUAGES
# ─────────────────────────────────────────────
languages:
  - isoCode: pt-BR
    cultureName: "Portuguese (Brazil)"
    isDefault: true
    isMandatory: true
    update: true

# ─────────────────────────────────────────────
# DATA TYPES
# ─────────────────────────────────────────────
dataTypes:

  # Text
  - alias: textString
    name: Text String
    editorUiAlias: Umbraco.TextBox
    config:
      maxLength: 512

  - alias: textStringShort
    name: Text String (Short)
    editorUiAlias: Umbraco.TextBox
    config:
      maxLength: 160

  - alias: textArea
    name: Text Area
    editorUiAlias: Umbraco.TextArea
    config:
      maxChars: 2000

  - alias: markdownText
    name: Markdown
    editorUiAlias: Umbraco.MarkdownEditor

  # Media
  - alias: imagePicker
    name: Image Picker
    editorUiAlias: Umbraco.MediaPicker3
    config:
      multiple: false
      onlyImages: true

  - alias: multiImagePicker
    name: Multi Image Picker
    editorUiAlias: Umbraco.MediaPicker3
    config:
      multiple: true
      onlyImages: true

  # Toggle / Boolean
  - alias: toggle
    name: Toggle
    editorUiAlias: Umbraco.TrueFalse

  # Dropdowns
  - alias: ctaStyle
    name: CTA Style
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - Primary
        - Secondary
        - Outline
        - Ghost

  - alias: pageTheme
    name: Page Theme
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - Light
        - Dark
        - Gradient

  - alias: sectionBackground
    name: Section Background
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - White
        - LightGray
        - LighterGray
        - Primary
        - Dark

  - alias: ecosystemCategory
    name: Ecosystem Category
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - Commerce
        - Logistics
        - Purchasing
        - Directory
        - Classifieds
        - Marketing
        - Media
        - Tourism

  - alias: partnerSegment
    name: Partner Segment
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - Juridico
        - Tecnologia
        - DesenvolvimentoLojas
        - MarketingPublicidade
        - ParceriasCorporativas

  - alias: governanceRole
    name: Governance Role
    update: true
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - Presidencia
        - DiretoriaGeral
        - DiretoriaFinanceira
        - DiretoriaMarketing
        - DiretoriaComercial
        - ConselhoConsultivo
        - Compliance

  - alias: institutionalAudience
    name: Institutional Audience
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - GrandesEmpresas
        - EscritoriosAdvocacia
        - InvestidoresEstrategicos
        - ConselhoConsultivo

  - alias: revenueType
    name: Revenue Type
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - AluguelCondominial
        - Comissoes
        - Patrocinio
        - ServicosDigitais
        - EventosConsultoria

  - alias: contactSubject
    name: Contact Subject
    editorUiAlias: Umbraco.DropDown.Flexible
    config:
      multiple: false
      items:
        - Lojista
        - Franquia
        - Investidor
        - DuvidasGerais

  - alias: tags
    name: Tags
    editorUiAlias: Umbraco.Tags

  - alias: urlPicker
    name: URL Picker
    editorUiAlias: Umbraco.MultiUrlPicker
    update: true
    config:
      maxNumberOfItems: 1

  - alias: integerField
    name: Integer
    editorUiAlias: Umbraco.Integer

  - alias: sortOrderField
    name: Sort Order
    editorUiAlias: Umbraco.Integer

  - alias: pilarBlockList
    name: Pilar Block List
    editorUiAlias: Umbraco.BlockList
    valueType: NTEXT
    update: true
    config:
      blocks:
        - contentElementTypeAlias: pilarElement

  - alias: multipleTextString
    name: Multiple Text String
    editorUiAlias: Umbraco.MultipleTextstring

  - alias: dateTimePicker
    name: Date Time Picker
    editorUiAlias: Umbraco.DateTime

  - alias: timelineBlockList
    name: Timeline Block List
    editorUiAlias: Umbraco.BlockList
    valueType: NTEXT
    config:
      blocks:
        - contentElementTypeAlias: timelineItemElement

  - alias: corpPositionBlockList
    name: Corporate Position Block List
    editorUiAlias: Umbraco.BlockList
    valueType: NTEXT
    config:
      blocks:
        - contentElementTypeAlias: corpPositionElement

  - alias: clikashopBlockList
    name: Clikashop Block List
    editorUiAlias: Umbraco.BlockList
    valueType: NTEXT
    config:
      blocks:
        - contentElementTypeAlias: clikashopItemElement

  - alias: docButtonBlockList
    name: Document Button Block List
    editorUiAlias: Umbraco.BlockList
    valueType: NTEXT
    config:
      blocks:
        - contentElementTypeAlias: docButtonElement


# ─────────────────────────────────────────────
# DOCUMENT TYPES
# ─────────────────────────────────────────────
documentTypes:

  # ── Element Types ─────────────────────────
  - alias: timelineItemElement
    name: Timeline Item
    icon: icon-time
    isElement: true
    tabs:
      - name: Content
        properties:
          - alias: year
            name: Year
            dataType: textString
          - alias: title
            name: Title
            dataType: textString
          - alias: text
            name: Text
            dataType: textArea

  - alias: corpPositionElement
    name: Corporate Position
    icon: icon-user
    isElement: true
    tabs:
      - name: Content
        properties:
          - alias: title
            name: Title
            dataType: textString
          - alias: text
            name: Text
            dataType: textArea

  - alias: clikashopItemElement
    name: Clikashop Item
    icon: icon-item
    isElement: true
    tabs:
      - name: Content
        properties:
          - alias: title
            name: Title
            dataType: textString
          - alias: content
            name: Content
            dataType: "Richtext Editor"
          - alias: image
            name: Image
            dataType: imagePicker

  - alias: docButtonElement
    name: Document Button
    icon: icon-document
    isElement: true
    tabs:
      - name: Content
        properties:
          - alias: label
            name: Label
            dataType: textString
          - alias: url
            name: URL
            dataType: textString

  - alias: pilarElement
    name: Pilar
    icon: icon-item
    isElement: true
    tabs:
      - name: Content
        properties:
          - alias: title
            name: Title
            dataType: textString
          - alias: text
            name: Text
            dataType: textArea

  # ── Site Root ─────────────────────────────
  - alias: siteRoot
    name: Site Root
    icon: icon-home
    allowAsRoot: true
    allowedChildTypes:
      - standardPage
      - aRisinPage
      - ecossistemaPage
      - modeloNegocioPage
      - governancaPage
      - parceirosPage
      - regionaisPage
      - relacoesInstitucionaisPage
      - transparenciaPage
      - paraLojistasPage
      - franquiasPage
      - contatoPage
    update: true
    allowedTemplates:
      - home
    defaultTemplate: home
    tabs:
      - name: Site Settings
        properties:
          - alias: siteName
            name: Site Name
            dataType: textString
            required: true
            description: "Ex: RISIN – Plataforma Empresarial Digital"
          - alias: siteTagline
            name: Tagline
            dataType: textString
            description: Short tagline shown in the browser tab
          - alias: siteEmail
            name: Contact Email
            dataType: textString
            description: "Ex: contato@risin.com.br"
          - alias: siteLocation
            name: Location
            dataType: textString
            description: "Ex: Niterói, RJ - Brasil"
          - alias: siteLogo
            name: Logo
            dataType: imagePicker
          - alias: copyrightText
            name: Copyright Text
            dataType: textString
            description: "Ex: © 2026 RISIN – Rede de Informações e Serviços na Internet Ltda."
      - name: Social & SEO
        properties:
          - alias: linkedInUrl
            name: LinkedIn URL
            dataType: urlPicker
          - alias: instagramUrl
            name: Instagram URL
            dataType: urlPicker
          - alias: youtubeUrl
            name: YouTube URL
            dataType: urlPicker
          - alias: defaultMetaDescription
            name: Default Meta Description
            dataType: textStringShort
          - alias: defaultOgImage
            name: Default OG Image
            dataType: imagePicker
      - name: Navigation
        properties:
          - alias: ctaButtonUrl
            name: Header CTA Button URL
            dataType: urlPicker
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker
          - alias: faviconIco
            name: Favicon (.ico)
            dataType: imagePicker
          - alias: faviconSvg
            name: Favicon (SVG)
            dataType: imagePicker
          - alias: faviconPng96
            name: Favicon 96×96 (PNG)
            dataType: imagePicker
          - alias: faviconAppleTouch
            name: Apple Touch Icon
            dataType: imagePicker
          - alias: appleMobileWebAppTitle
            name: Apple Mobile Web App Title
            dataType: textStringShort

   # ── Base Page (shared fields) ──────────────
  - alias: basePage
    name: Base Page
    icon: icon-document
    allowAsRoot: false
    allowedChildTypes: []
    update: true
    tabs:
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
            description: Overrides the page title in search results
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker
          - alias: hideFromNavigation
            name: Hide from Navigation
            dataType: toggle

  # ── Home Page ──────────────────────────────
  - alias: homePage
    name: Home Page
    icon: icon-home
    allowAsRoot: false
    allowedChildTypes: []
    update: true
    allowedTemplates:
      - home
    defaultTemplate: home
    tabs:
      - name: Hero
        properties:
          - alias: heroTitle
            name: Hero Title
            dataType: textString
            required: true
            description: "Ex: RISIN – Plataforma Empresarial Digital em Implantação Estruturada"
          - alias: heroSubtitle
            name: Hero Subtitle
            dataType: textArea
            description: Supporting paragraph under hero title
          - alias: heroImage
            name: Hero Image
            dataType: imagePicker
          - alias: heroPrimaryCtaUrl
            name: Primary CTA URL
            dataType: urlPicker
          - alias: heroSecondaryCtaUrl
            name: Secondary CTA URL
            dataType: urlPicker
      - name: Macro Vision
        properties:
          - alias: macroTitle
            name: Section Title
            dataType: textString
            description: "Ex: Visão Macro do Projeto"
          - alias: macroDescription
            name: Description
            dataType: textArea
          - alias: macroPilars
            name: Pilars
            dataType: pilarBlockList
            description: "Block list of pilars (title + text). Ex: 2 Regionais Modelo"
      - name: Ecosystem Block
        properties:
          - alias: ecosystemBlockTitle
            name: Section Title
            dataType: textString
            description: "Ex: Ecossistema RISIN – Plataformas Integradas"
          - alias: ecosystemBlockSubtitle
            name: Subtitle
            dataType: textArea
      - name: Economic Model Block
        properties:
          - alias: economicModelTitle
            name: Section Title
            dataType: textString
            description: "Ex: Modelo Econômico Estruturado"
          - alias: economicModelBullets
            name: Revenue Bullets
            dataType: multipleTextString
            description: Bullet list of revenue sources
          - alias: economicModelHighlight
            name: Highlight Statement
            dataType: textString
            description: "Ex: Modelo projetado para sustentabilidade, escalabilidade..."
      - name: Governance Block
        properties:
          - alias: govBlockTitle
            name: Section Title
            dataType: textString
            description: "Ex: Governança desde a Implantação"
          - alias: govBlockDescription
            name: Description
            dataType: textArea
          - alias: govBlockLinkUrl
            name: Link URL
            dataType: urlPicker
      - name: Partners Block
        properties:
          - alias: partnersBlockTitle
            name: Section Title
            dataType: textString
            description: "Ex: Programa Parceiros RISIN"
          - alias: partnersBlockIntro
            name: Intro Text
            dataType: textArea
          - alias: partnersBlockCtaUrl
            name: CTA URL
            dataType: urlPicker
      - name: Expansion Block
        properties:
          - alias: expansionBlockTitle
            name: Section Title
            dataType: textString
            description: "Ex: Arquitetura para Evolução em Holding Digital"
          - alias: expansionBlockContent
            name: Content
            dataType: "Richtext Editor"
          - alias: expansionMapImage
            name: Brazil Map Image
            dataType: imagePicker
      - name: Final CTA
        properties:
          - alias: finalCtaTitle
            name: Final CTA Title
            dataType: textString
            description: "Ex: RISIN. Estrutura. Governança. Escala."
          - alias: finalCtaText
            name: Supporting Text
            dataType: textArea
          - alias: finalCtaButton1Label
            name: Button 1 Label
            dataType: textString
            description: "Ex: Contato Institucional"
          - alias: finalCtaButton1Url
            name: Button 1 URL
            dataType: urlPicker
          - alias: finalCtaButton2Label
            name: Button 2 Label
            dataType: textString
            description: "Ex: Download Apresentação (PDF)"
          - alias: finalCtaButton2Url
            name: Button 2 URL
            dataType: urlPicker
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker

  # ── A RISIN Page ───────────────────────────
  - alias: aRisinPage
    name: A RISIN Page
    icon: icon-book
    allowAsRoot: false
    allowedChildTypes: []
    update: true
    allowedTemplates:
      - aRisin
    defaultTemplate: aRisin
    tabs:
      - name: Hero
        properties:
          - alias: heroTitle
            name: Hero Title
            dataType: textString
            required: true
            description: "Ex: A RISIN"
          - alias: heroSubtitle
            name: Subtitle
            dataType: textArea
            description: "Ex: Holding de projetos digitais..."
          - alias: heroIntro
            name: Intro Paragraph
            dataType: "Richtext Editor"
            description: "Ex: A Risin – Rede de Informações e Serviços na Internet Ltda. é uma empresa..."
          - alias: heroImage
            name: Hero Image
            dataType: imagePicker
      - name: Founding Vision
        properties:
          - alias: foundingVisionTitle
            name: Section Title
            dataType: textString
            description: "Ex: A Visão Fundadora"
          - alias: foundingVisionText
            name: Content
            dataType: "Richtext Editor"
            description: History and founding vision paragraphs
      - name: Structured Project
        properties:
          - alias: structuredProjectTitle
            name: Section Title
            dataType: textString
            description: "Ex: Projeto em Implantação Estruturada"
          - alias: structuredProjectContent
            name: Content
            dataType: "Richtext Editor"
          - alias: structuredProjectKeyTerms
            name: Key Terms (bullets)
            dataType: multipleTextString
            description: Implantação estruturada, Governança progressiva, etc.
      - name: Platform Pillars
        properties:
          - alias: pilars
            name: Pilars
            dataType: pilarBlockList
            description: "Block list of pilars (title + text). Ex: Integração Total"
      - name: Timeline
        properties:
          - alias: timelineTitle
            name: Section Title
            dataType: textString
            description: "Ex: Nossa História"
          - alias: timeline
            name: Timeline
            dataType: timelineBlockList
            description: "Timeline items with year, title and text"
      - name: Mission Vision Values
        properties:
          - alias: mvvTitle
            name: Section Title
            dataType: textString
            description: "Ex: Missão, Visão e Valores"
          - alias: missionTitle
            name: Missão – Title
            dataType: textString
          - alias: missionText
            name: Missão – Text
            dataType: "Richtext Editor"
          - alias: visionTitle
            name: Visão – Title
            dataType: textString
          - alias: visionText
            name: Visão – Text
            dataType: "Richtext Editor"
          - alias: valuesTitle
            name: Valores – Title
            dataType: textString
          - alias: valuesText
            name: Valores – Text (bullets)
            dataType: "Richtext Editor"
      - name: Corporate Structure
        properties:
          - alias: corpStructureTitle
            name: Corporate Structure Title
            dataType: textString
          - alias: corpStructureDescription
            name: Corporate Structure Description
            dataType: textArea
          - alias: corpPositions
            name: Positions
            dataType: corpPositionBlockList
            description: "Board positions (title + text for each role)"
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker

  # ── Ecosystem Website Item ─────────────────
  - alias: ecosystemWebsite
    name: Ecosystem Website
    icon: icon-globe
    allowAsRoot: false
    allowedChildTypes: []
    update: true
    tabs:
      - name: Content
        properties:
          - alias: websiteAlias
            name: Website Alias
            dataType: textString
            required: true
            description: "Ex: clikashop"
          - alias: websiteName
            name: Website Name
            dataType: textString
            required: true
            description: "Ex: Clikashop"
          - alias: websiteCategory
            name: Category
            dataType: ecosystemCategory
            required: true
          - alias: websiteDescription
            name: Short Description
            dataType: textArea
            required: true
          - alias: websiteFullDescription
            name: Full Description
            dataType: "Richtext Editor"
          - alias: websiteUrl
            name: External URL
            dataType: urlPicker
          - alias: websiteLogo
            name: Logo
            dataType: imagePicker
          - alias: websiteImage
            name: Cover Image
            dataType: imagePicker
          - alias: isFeatured
            name: Featured (Spotlight)
            dataType: toggle
            description: Mark as featured – used for Clikashop spotlight card
          - alias: sortOrder
            name: Sort Order
            dataType: sortOrderField
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort

  # ── Ecossistema Page ───────────────────────
  - alias: ecossistemaPage
    name: Ecossistema Page
    icon: icon-nodes
    allowAsRoot: false
    allowedChildTypes:
      - ecosystemWebsite
    update: true
    allowedTemplates:
      - ecossistema
    defaultTemplate: ecossistema
    tabs:
      - name: Hero
        properties:
          - alias: heroTitle
            name: Hero Title
            dataType: textString
            required: true
            description: "Ex: Plataforma Integrada"
          - alias: heroSubtitle
            name: Subtitle
            dataType: textArea
          - alias: heroImage
            name: Hero Image
            dataType: imagePicker
      - name: Websites Section
        properties:
          - alias: websitesSectionTitle
            name: Section Title
            dataType: textString
            description: "Ex: Os 08 Websites da Rede"
      - name: Regional Model
        properties:
          - alias: regionalModelTitle
            name: Section Title
            dataType: textString
            description: "Ex: Modelo Regional e Shopping Empresarial Digital"
          - alias: regionalModelLeftContent
            name: Left Column Content
            dataType: "Richtext Editor"
            description: 3 sectors, 478 regionais, population groupings
          - alias: clikashopSpotlight
            name: Clikashop Spotlight
            dataType: clikashopBlockList
            description: "Spotlight items with title, content and image"
          - alias: gEmpresasSpotlightTitle
            name: G-Empresas Spotlight – Title
            dataType: textString
          - alias: gEmpresasSpotlightContent
            name: G-Empresas Spotlight – Content
            dataType: "Richtext Editor"
          - alias: agenciaSpotlightTitle
            name: Agência-RISIN Spotlight – Title
            dataType: textString
          - alias: agenciaSpotlightContent
            name: Agência-RISIN Spotlight – Content
            dataType: "Richtext Editor"
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker

  # ── Modelo de Negócio Page ─────────────────
  - alias: modeloNegocioPage
    name: Modelo de Negócio Page
    icon: icon-directions-alt
    allowAsRoot: false
    allowedChildTypes: []
    update: true
    allowedTemplates:
      - modeloNegocio
    defaultTemplate: modeloNegocio
    tabs:
      - name: Hero
        properties:
          - alias: heroTitle
            name: Hero Title
            dataType: textString
            required: true
            description: "Ex: Modelo de Negócio"
          - alias: heroSubtitle
            name: Subtitle
            dataType: textArea
          - alias: heroImage
            name: Hero Image
            dataType: imagePicker
      - name: Economic Structure
        properties:
          - alias: economicTitle
            name: Section Title
            dataType: textString
            description: "Ex: Estrutura Econômica"
          - alias: economicContent
            name: Revenue Sources
            dataType: multipleTextString
            description: Aluguéis, comissões, patrocínios, serviços digitais, eventos
      - name: Business Contracts
        properties:
          - alias: contractsTitle
            name: Section Title
            dataType: textString
            description: "Ex: Contratos Empresariais"
          - alias: contractsContent
            name: Content
            dataType: "Richtext Editor"
            description: Shopkeeper contracts, sponsorship contracts, transparency commitments
          - alias: contractsImage
            name: Illustration Image
            dataType: imagePicker
      - name: 5000 Vacancies
        properties:
          - alias: vacanciesTitle
            name: Section Title
            dataType: textString
            description: "Ex: 5.000 Vagas e Sustentabilidade Financeira"
          - alias: vacanciesContent
            name: Content
            dataType: "Richtext Editor"
          - alias: vacanciesHighlightNumber
            name: Highlight Number
            dataType: textString
            description: "Ex: 5.000"
          - alias: vacanciesHighlightLabel
            name: Highlight Label
            dataType: textString
            description: "Ex: Vagas Empresariais"
          - alias: foundersTitle
            name: Founders Section Title
            dataType: textString
            description: "Ex: 5.000 Vagas de Sócios Fundadores"
          - alias: foundersSubtitle
            name: Founders Subtitle
            dataType: textArea
            description: Supporting paragraph for the founders dark section
          - alias: foundersCtaLabel
            name: Founders CTA Label
            dataType: textString
            description: "Ex: Garanta sua Vaga como Sócio Fundador"
          - alias: foundersCtaUrl
            name: Founders CTA URL
            dataType: urlPicker
      - name: Commercial Policy
        properties:
          - alias: commercialPolicyTitle
            name: Section Title
            dataType: textString
            description: "Ex: Política Comercial"
          - alias: commercialPolicyContent
            name: Content
            dataType: "Richtext Editor"
      - name: CTA
        properties:
          - alias: ctaTitle
            name: CTA Title
            dataType: textString
          - alias: ctaUrl
            name: CTA Button URL
            dataType: urlPicker
      - name: SEO
        properties:
          - alias: metaTitle
            name: Meta Title
            dataType: textStringShort
          - alias: metaDescription
            name: Meta Description
            dataType: textStringShort
          - alias: ogImage
            name: OG Image
            dataType: imagePicker

  # ── Governance Role Item ───────────────────
  - alias: governanceRole
    name: Governance Role
    icon: icon-user
    allowAsRoot: false
    allowedChildTypes: []
    update: true
    tabs:
      - name: Content
        properties:
          - alias: roleAlias
            name: Role Alias
            dataType: governanceRole
            required: true
          - alias: roleTitle
            name: Role Title
            dataType: textString
            required: true
            description: "Ex: Presidência Executiva"
          - alias: roleDescription
            name: Description
            dataType: textArea
            required: true
          - alias: roleHolder
            name: Role Holder (optional)
            dataType: textString
            description: Name of person holding this role (if public)
          - alias: sortOrder
            name: Sort Order
            dataType: sortOrderField

  # ── Governança Page ────────────────────────
  - alias: governancaPage
    name: Governança Page
    icon: icon-shield
    allowAsRoot: false
    allowedChildTypes:
      - governanceRole
    update: true
    allowedTemplates:
      - governanca
    defaultTemplate: governanca
    tabs:
      - name: Hero
        properties:
          - alias: heroTitle
            name: Hero Title
            dataType: textString
            required: true
            description: "Ex: Governança"
          - alias: heroSubtitle
            name: Subtitle
