                              <div class="font-bold mb-1">Treinamento</div>
                              <div class="text-sm text-on-surface-variant">Capacitação da equipe operacional regional</div>
                          </div>
                          <div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm text-center">
                              <span class="material-symbols-outlined text-primary text-3xl mb-3">support_agent</span>
                              <div class="font-bold mb-1">Suporte 24/7</div>
                              <div class="text-sm text-on-surface-variant">Suporte técnico e operacional dedicado</div>
                          </div>
                          <div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm text-center">
