  - alias: relacoesInstitucionais
    name: "Relacoes Institucionais"
    path: relacoesInstitucionais.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
      .rel-tag{color:var(--risin-green);font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-size:.75rem;display:block;margin-bottom:.5rem}
      .rel-h2{font-size:clamp(1.75rem,3vw,2.5rem);font-weight:800;color:#0f172a;letter-spacing:-.02em;margin:0 0 1.5rem}
      .rel-audiences{padding:var(--risin-section-py) var(--risin-padding);background:#fff}
      .rel-aud-inner{max-width:var(--risin-max-width);margin:0 auto}
      .rel-sec-hd{text-align:center;margin-bottom:3.5rem}
      .rel-sec-hd p{color:#64748b;max-width:540px;margin:.75rem auto 0;line-height:1.6}
      .rel-bento{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
      .rel-card{background:#f8fafc;border-radius:1.25rem;padding:2.5rem;border-top:3px solid transparent;transition:border-color .2s,box-shadow .2s}
      .rel-card:hover{border-top-color:var(--risin-green);box-shadow:0 8px 32px rgba(5,150,105,.1)}
      .rel-card.dark{background:#0f172a;border-top:none}
      .rel-card svg{width:40px;height:40px;stroke:var(--risin-green);fill:none;margin-bottom:1.25rem}
      .rel-card.dark svg{stroke:#34d399}
      .rel-card h3{font-weight:800;font-size:1.2rem;color:#0f172a;margin-bottom:.75rem}
      .rel-card.dark h3{color:#f1f5f9}
      .rel-card p{font-size:.875rem;color:#64748b;line-height:1.6;margin-bottom:1.25rem}
      .rel-card.dark p{color:#94a3b8}
      .rel-mini-tags{display:flex;flex-wrap:wrap;gap:.4rem}
      .rel-mini-tag{padding:.2rem .5rem;background:rgba(5,150,105,.1);color:var(--risin-green);font-size:.7rem;font-weight:700;border-radius:9999px}
      .rel-card.dark .rel-mini-tag{background:rgba(52,211,153,.15);color:#34d399}
      .rel-benefits{display:flex;flex-direction:column;gap:.5rem}
      .rel-benefit{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:#475569}
      .rel-card.dark .rel-benefit{color:#94a3b8}
      .rel-benefit::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--risin-green);flex-shrink:0}
      .rel-card.dark .rel-benefit::before{background:#34d399}
      .rel-cta{padding:var(--risin-section-py) var(--risin-padding);background:#f8fafc}
      .rel-cta-inner{max-width:var(--risin-max-width);margin:0 auto;text-align:center}
      .rel-cta-inner h2{font-size:clamp(1.5rem,2.5vw,2rem);font-weight:800;color:#0f172a;margin:.5rem 0 1rem}
      .rel-cta-inner > p{color:#64748b;max-width:480px;margin:0 auto 3rem;line-height:1.65}
      .rel-contacts{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;max-width:860px;margin:0 auto}
      .rel-contact-card{background:#fff;border-radius:1rem;padding:2rem;text-align:left;box-shadow:0 1px 3px rgba(0,0,0,.06)}
      .rel-contact-card svg{width:32px;height:32px;stroke:var(--risin-green);fill:none;margin-bottom:1rem}
      .rel-contact-card h4{font-weight:700;font-size:.95rem;color:#0f172a;margin-bottom:.5rem}
      .rel-contact-card p{font-size:.8rem;color:#64748b;line-height:1.5;margin-bottom:.75rem}
      .rel-contact-card a{color:var(--risin-green);font-weight:600;font-size:.85rem;text-decoration:none}
      .rel-contact-card a:hover{text-decoration:underline}
      @@media(max-width:1024px){.rel-bento{grid-template-columns:1fr}.rel-contacts{grid-template-columns:1fr}}
      </style>
      <main>
      <section class="page-hero"><div class="grid-bg"></div><div class="orb-1"></div><div class="orb-2"></div>
      <div class="ph-container"><h1>Rela&#231;&#245;es <span class="gradient">Institucionais</span></h1>
      <p class="ph-subtitle">Canal oficial para grandes empresas, investidores e membros do Conselho Consultivo interessados em parcerias estrat&#233;gicas com a plataforma RISIN.</p></div></section>
      
      <section class="rel-audiences"><div class="rel-aud-inner">
      <div class="rel-sec-hd"><span class="rel-tag">P&#250;blico</span><h2 class="rel-h2" style="margin:.5rem 0 0">Para Quem &#233; Este Canal</h2><p>Rela&#231;&#245;es institucionais atende tr&#234;s perfis estrat&#233;gicos com abordagens e benef&#237;cios espec&#237;ficos.</p></div>
      <div class="rel-bento">
      
      <div class="rel-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18"/></svg>
      <h3>Grandes Empresas</h3>
      <p>Corpora&#231;&#245;es e grupos empresariais que buscam solu&#231;&#245;es integradas para sua cadeia de fornecedores, distribuidores e parceiros comerciais.</p>
      <div class="rel-mini-tags" style="margin-bottom:1.25rem">
      <span class="rel-mini-tag">Varejo</span><span class="rel-mini-tag">Ind&#250;stria</span><span class="rel-mini-tag">Servi&#231;os</span><span class="rel-mini-tag">Log&#237;stica</span>
      </div>
      <div class="rel-benefits">
      <span class="rel-benefit">Integra&#231;&#227;o com cadeia de fornecedores</span>
      <span class="rel-benefit">Acesso ao marketplace B2B exclusivo</span>
      <span class="rel-benefit">Suporte dedicado a grandes contas</span>
      <span class="rel-benefit">Contrato personalizado e SLA premium</span>
      </div></div>
      
      <div class="rel-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>
      <h3>Investidores</h3>
      <p>Fundos de investimento, family offices e investidores-anjo interessados em participar do crescimento da maior plataforma digital corporativa do Brasil.</p>
      <div class="rel-mini-tags" style="margin-bottom:1.25rem">
      <span class="rel-mini-tag">VC</span><span class="rel-mini-tag">Family Office</span><span class="rel-mini-tag">Angel</span><span class="rel-mini-tag">Private Equity</span>
      </div>
      <div class="rel-benefits">
      <span class="rel-benefit">Acesso ao investor deck atualizado</span>
      <span class="rel-benefit">Reuni&#245;es com a diretoria executiva</span>
      <span class="rel-benefit">Due diligence assistida</span>
      <span class="rel-benefit">Relat&#243;rios de performance mensais</span>
      </div></div>
      
