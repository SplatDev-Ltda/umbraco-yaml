                              <div class="flex items-start gap-3 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-secondary text-sm mt-0.5">check_circle</span>Consultoria comercial e de crescimento</div>
                              <div class="flex items-start gap-3 text-sm text-on-surface-variant"><span class="material-symbols-outlined text-secondary text-sm mt-0.5">check_circle</span>Acesso à rede nacional de franqueados</div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Ideal franchisee profile -->
