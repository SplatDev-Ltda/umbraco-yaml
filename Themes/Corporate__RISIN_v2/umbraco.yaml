              <div class="max-w-[1440px] mx-auto px-12 grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
                  <div>
                      <span class="text-primary font-bold tracking-widest uppercase text-xs">Perfil Ideal</span>
                      <h2 class="text-4xl font-bold tracking-tight mt-2 mb-8">Quem Buscamos</h2>
                      <div class="space-y-5">
                          <div class="flex items-start gap-4 p-5 rounded-xl bg-surface-container-low">
