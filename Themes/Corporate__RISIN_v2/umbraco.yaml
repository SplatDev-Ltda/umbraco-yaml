      <style>
          /* ── Hero ── */
          .home-hero { position: relative; background: linear-gradient(135deg,#F3F4F6,#F9FAFB,#F3F4F6); padding: var(--risin-section-py) 0; overflow: hidden; }
          .home-hero .grid-bg { position: absolute; inset: 0; opacity: 0.3; background-image: linear-gradient(rgba(5,150,105,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(5,150,105,0.1) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
          .home-hero .orb { position: absolute; border-radius: 50%; filter: blur(48px); animation: pulse 2s ease-in-out infinite; pointer-events: none; }
          .home-hero .orb-green { top: 80px; right: 160px; width: 384px; height: 384px; background: rgba(5,150,105,0.1); }
          .home-hero .orb-cyan  { bottom: 80px; left: 160px; width: 384px; height: 384px; background: rgba(8,145,178,0.1); animation-delay: 1s; }
          .hh-container { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; display: flex; gap: 48px; align-items: center; }
          .hh-left  { width: 600px; flex-shrink: 0; }
          .hh-right { flex: 1; }
          .hh-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(5,150,105,0.2); border-radius: 9999px; margin-bottom: 24px; }
          .hh-badge svg { width: 16px; height: 16px; color: #059669; }
          .hh-badge span { font-size: 14px; font-weight: 500; color: #059669; }
          .home-hero h1 { font-size: var(--risin-hero-size); font-weight: 700; color: var(--risin-text-dark); line-height: 1.15; margin-bottom: 24px; }
          .home-hero h1 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .hh-subtitle { font-size: 18px; color: var(--risin-text-muted); margin-bottom: 32px; line-height: 1.7; }
          .hh-actions { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
          .hh-btn-p { display: inline-flex; align-items: center; gap: 8px; height: 48px; padding: 0 28px; background: linear-gradient(90deg,#059669,#047857); color: white; font-weight: 600; font-size: 15px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-lg); transition: all var(--risin-transition); text-decoration: none; }
          .hh-btn-p:hover { box-shadow: var(--risin-shadow-2xl); transform: translateY(-1px); }
          .hh-btn-p svg,.hh-btn-s svg { width: 16px; height: 16px; }
          .hh-btn-s { display: inline-flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: var(--risin-text-subtle); transition: color var(--risin-transition); text-decoration: none; }
          .hh-btn-s:hover { color: #059669; }
          .hh-frame { position: relative; border-radius: var(--risin-radius-xl); overflow: hidden; height: 400px; }
          .hh-frame img { width: 100%; height: 100%; object-fit: cover; transition: transform 500ms ease; }
          .hh-frame:hover img { transform: scale(1.05); }
          .hh-frame .ov  { position: absolute; inset: 0; background: linear-gradient(135deg,rgba(5,150,105,0.2),rgba(8,145,178,0.2)); z-index: 1; }
          .hh-frame .bov { position: absolute; inset: 0; border: 2px solid rgba(5,150,105,0.3); border-radius: var(--risin-radius-xl); z-index: 2; pointer-events: none; }
          @@media (max-width: 1024px) { .hh-container { flex-direction: column; } .hh-left { width: 100%; } .home-hero h1 { font-size: 36px; } }
          @@media (max-width: 640px) { .home-hero h1 { font-size: 28px; } .hh-actions { flex-direction: column; align-items: flex-start; } .hh-frame { height: 220px; } }
      
          /* ── Visao Macro ── */
          .visao-macro { background: white; padding: var(--risin-section-py) 0; position: relative; overflow: hidden; }
          .visao-macro .bg-orb { position: absolute; top: 0; right: 0; width: 500px; height: 500px; background: linear-gradient(225deg,rgba(5,150,105,0.05),transparent); border-radius: 50%; filter: blur(48px); pointer-events: none; }
          .vm-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .vm-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; text-align: center; }
          .vm-sub { text-align: center; color: var(--risin-text-muted); margin-bottom: 48px; max-width: 768px; margin-left: auto; margin-right: auto; line-height: 1.7; }
          .vm-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 24px; }
          .vm-card { position: relative; background: white; border: 1px solid var(--risin-border); border-radius: var(--risin-radius-lg); padding: 24px; transition: all var(--risin-transition); overflow: hidden; }
          .vm-card:hover { border-color: rgba(5,150,105,0.5); box-shadow: var(--risin-shadow-xl); transform: translateY(-4px); }
          .vm-card .vm-bg { position: absolute; inset: 0; opacity: 0; transition: opacity var(--risin-transition); border-radius: var(--risin-radius-lg); }
          .vm-card:hover .vm-bg { opacity: 0.05; }
          .vm-inner { position: relative; }
          .vm-icon { width: 48px; height: 48px; border-radius: var(--risin-radius-lg); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; transition: transform var(--risin-transition); }
          .vm-card:hover .vm-icon { transform: scale(1.1); }
          .vm-icon svg { width: 24px; height: 24px; color: white; }
          .vm-card h3 { font-weight: 700; color: var(--risin-text-dark); margin-bottom: 8px; font-size: 16px; }
          .vm-card p { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; margin-bottom: 12px; }
          .vm-line { height: 2px; width: 24px; border-radius: 1px; background: var(--risin-border); transition: width var(--risin-transition); }
          .vm-card:hover .vm-line { width: 48px; }
          @@media (max-width: 1024px) { .vm-grid { grid-template-columns: repeat(2,1fr); } }
          @@media (max-width: 640px)  { .vm-grid { grid-template-columns: 1fr; } }
      
          /* ── Ecossistema ── */
          .eco-sec { position: relative; background: linear-gradient(180deg,#F9FAFB,white); padding: var(--risin-section-py) 0; overflow: hidden; }
          .eco-sec .dot-bg { position: absolute; inset: 0; opacity: 0.2; background-image: radial-gradient(circle at 1px 1px,#059669 1px,transparent 0); background-size: 40px 40px; pointer-events: none; }
          .eco-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .eco-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; text-align: center; }
          .eco-wrap h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .eco-sub { text-align: center; color: var(--risin-text-muted); margin-bottom: 48px; max-width: 768px; margin-left: auto; margin-right: auto; line-height: 1.7; }
          .eco-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; }
          .eco-card { background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); padding: 24px; transition: all var(--risin-transition); }
          .eco-card:hover { border-color: rgba(5,150,105,0.5); box-shadow: var(--risin-shadow-2xl); }
          .eco-row { display: flex; align-items: flex-start; gap: 16px; }
          .eco-icon { width: 56px; height: 56px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform var(--risin-transition); }
          .eco-card:hover .eco-icon { transform: scale(1.1); }
          .eco-icon svg { width: 28px; height: 28px; }
          .eco-text h3 { font-size: 18px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 8px; }
          .eco-text p  { font-size: 14px; color: var(--risin-text-muted); margin-bottom: 12px; line-height: 1.6; }
          .eco-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 500; transition: gap var(--risin-transition); text-decoration: none; }
          .eco-link svg { width: 14px; height: 14px; }
          @@media (max-width: 768px) { .eco-grid { grid-template-columns: 1fr; } }
      
          /* ── Modelo Economico ── */
          .modelo-sec { position: relative; background: white; padding: var(--risin-section-py) 0; overflow: hidden; }
          .modelo-sec .top-acc { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg,#059669,#0891B2,#059669); }
          .me-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .me-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 32px; }
          .me-wrap h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .me-row { display: flex; gap: 64px; align-items: flex-start; }
          .bullet-list { flex: 1; list-style: none; display: flex; flex-direction: column; gap: 16px; }
          .bullet-item { display: flex; gap: 16px; align-items: flex-start; }
          .b-marker { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
          .b-dot  { width: 10px; height: 10px; background: linear-gradient(135deg,#059669,#0891B2); border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
          .b-conn { width: 2px; height: 32px; background: linear-gradient(180deg,rgba(5,150,105,0.3),transparent); }
          .b-text { color: var(--risin-text-dark); line-height: 1.6; padding-top: 4px; }
          .impact-col { flex: 1; }
          .impact-card { position: relative; background: linear-gradient(135deg,#F9FAFB,white); border-left: 4px solid #059669; border-radius: 0 var(--risin-radius-xl) var(--risin-radius-xl) 0; padding: 32px; box-shadow: var(--risin-shadow-lg); }
          .impact-icon { position: absolute; top: -24px; right: -24px; width: 64px; height: 64px; background: linear-gradient(135deg,#059669,#0891B2); border-radius: var(--risin-radius-xl); transform: rotate(12deg); display: flex; align-items: center; justify-content: center; box-shadow: var(--risin-shadow-xl); }
          .impact-icon svg { width: 32px; height: 32px; color: white; transform: rotate(-12deg); }
          .impact-txt { font-size: 18px; color: var(--risin-text-dark); line-height: 1.7; }
          .hl-g::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: rgba(5,150,105,0.2); z-index: -1; }
          .hl-c::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: rgba(8,145,178,0.2); z-index: -1; }
          .hl-g,.hl-c { position: relative; display: inline; }
          @@media (max-width: 1024px) { .me-row { flex-direction: column; gap: 40px; } }
      
          /* ── Governanca ── */
          .gov-sec { position: relative; background: var(--risin-bg-lighter); padding: var(--risin-section-py) 0; overflow: hidden; }
          .gov-orbital { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
          .gov-ring { position: absolute; border: 1px solid rgba(5,150,105,0.1); border-radius: 50%; }
          .gov-r1 { width: 400px; height: 400px; } .gov-r2 { width: 600px; height: 600px; } .gov-r3 { width: 800px; height: 800px; }
          .gov-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .gov-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; text-align: center; }
          .gov-wrap h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .gov-sub { text-align: center; color: var(--risin-text-muted); margin-bottom: 48px; max-width: 768px; margin-left: auto; margin-right: auto; line-height: 1.7; }
          .gov-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 32px; margin-bottom: 48px; }
          .gov-item { text-align: center; padding: 32px 24px; background: white; border-radius: var(--risin-radius-xl); box-shadow: var(--risin-shadow); transition: all var(--risin-transition); }
          .gov-item:hover { box-shadow: var(--risin-shadow-xl); transform: translateY(-4px); }
          .gov-iw { position: relative; display: inline-flex; margin-bottom: 20px; }
          .gov-ic { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
          .gov-ic svg { width: 28px; height: 28px; color: white; }
          .gov-nb { position: absolute; bottom: -4px; right: -4px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; }
          .gov-item h3 { font-size: 18px; font-weight: 700; color: var(--risin-text-dark); margin-bottom: 12px; }
          .gov-item p  { font-size: 14px; color: var(--risin-text-muted); line-height: 1.6; }
          .gov-cta { display: flex; justify-content: center; }
          .gov-btn { display: inline-flex; align-items: center; gap: 8px; height: 48px; padding: 0 28px; border: 2px solid #059669; color: #059669; font-weight: 600; font-size: 15px; border-radius: var(--risin-radius-lg); transition: all var(--risin-transition); text-decoration: none; }
          .gov-btn:hover { background: #059669; color: white; box-shadow: var(--risin-shadow-lg); }
          .gov-btn svg { width: 16px; height: 16px; }
          @@media (max-width: 768px) { .gov-grid { grid-template-columns: 1fr; } }
      
          /* ── Parceiros ── */
          .par-sec { background: white; padding: var(--risin-section-py) 0; }
          .par-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); }
          .par-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 16px; text-align: center; }
          .par-wrap h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .par-sub { text-align: center; color: var(--risin-text-muted); margin-bottom: 48px; max-width: 768px; margin-left: auto; margin-right: auto; line-height: 1.7; }
          .par-row { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; margin-bottom: 48px; }
          .par-item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
          .par-pulse { position: relative; display: flex; align-items: center; justify-content: center; }
          .par-pdot { width: 8px; height: 8px; border-radius: 50%; position: absolute; animation: ping 1.5s ease-in-out infinite; opacity: 0.5; }
          .par-ibox { width: 80px; height: 80px; border-radius: var(--risin-radius-xl); display: flex; align-items: center; justify-content: center; border: 2px solid transparent; }
          .par-ibox svg { width: 32px; height: 32px; }
          .par-name { font-size: 14px; font-weight: 600; color: var(--risin-text-dark); }
          .par-cta { display: flex; justify-content: center; }
          .par-btn { position: relative; display: inline-flex; align-items: center; gap: 12px; height: 56px; padding: 0 36px; background: linear-gradient(90deg,#059669,#047857); color: white; font-weight: 700; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-xl); transition: all var(--risin-transition); text-decoration: none; overflow: hidden; }
          .par-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg,#0891B2,#059669); opacity: 0; transition: opacity var(--risin-transition); }
          .par-btn:hover::after { opacity: 1; }
          .par-btn span { position: relative; z-index: 1; display: flex; align-items: center; gap: 12px; }
          .par-btn svg { width: 18px; height: 18px; }
      
          /* ── Expansao ── */
          .exp-sec { position: relative; background: linear-gradient(135deg,#F9FAFB,white,#F9FAFB); padding: var(--risin-section-py) 0; overflow: hidden; }
          .exp-fl { position: absolute; left: 0; width: 100%; height: 1px; }
          .exp-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .exp-wrap h2 { font-size: var(--risin-section-size); font-weight: 700; color: var(--risin-text-dark); margin-bottom: 48px; text-align: center; }
          .exp-wrap h2 .grad { background: linear-gradient(90deg,#059669,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .exp-row { display: flex; gap: 64px; align-items: center; }
          .exp-tl { flex: 1; display: flex; flex-direction: column; gap: 24px; }
          .exp-ti { position: relative; padding: 20px 20px 20px 24px; border-left: 3px solid rgba(5,150,105,0.3); border-radius: 0 var(--risin-radius-lg) var(--risin-radius-lg) 0; background: rgba(255,255,255,0.8); box-shadow: var(--risin-shadow); }
          .exp-td { width: 12px; height: 12px; border-radius: 50%; position: absolute; left: -7px; top: 24px; }
          .exp-ti p { color: var(--risin-text-subtle); line-height: 1.7; font-size: 15px; }
          .exp-map { flex: 1; }
          .exp-mf { position: relative; background: linear-gradient(135deg,#F9FAFB,white); border: 1px solid var(--risin-border); border-radius: var(--risin-radius-xl); overflow: hidden; padding: 24px; box-shadow: var(--risin-shadow-lg); }
          .exp-leg { display: flex; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--risin-border); }
          .exp-li { display: flex; align-items: center; gap: 8px; font-size: 13px; }
          .exp-ld { width: 10px; height: 10px; border-radius: 50%; }
          @@media (max-width: 1024px) { .exp-row { flex-direction: column; } }
      
          /* ── Chamada Final ── */
          .cf-sec { position: relative; background: var(--risin-bg-lighter); padding: calc(var(--risin-section-py)*1.5) 0; overflow: hidden; text-align: center; }
          .cf-sec .radial { position: absolute; inset: 0; background: radial-gradient(ellipse at center,rgba(5,150,105,0.08) 0%,transparent 60%); pointer-events: none; }
          .cf-rings { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
          .cf-r { position: absolute; border: 1px solid rgba(5,150,105,0.08); border-radius: 50%; }
          .cf-r1 { width: 400px; height: 400px; } .cf-r2 { width: 700px; height: 700px; } .cf-r3 { width: 1000px; height: 1000px; }
          .cf-wrap { max-width: var(--risin-max-width); margin: 0 auto; padding: 0 var(--risin-padding); position: relative; z-index: 1; }
          .cf-wrap h2 { font-size: clamp(32px,5vw,56px); font-weight: 900; color: var(--risin-text-dark); line-height: 1.1; }
          .cf-g1 { background: linear-gradient(90deg,#059669,#047857); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .cf-g2 { background: linear-gradient(90deg,#047857,#0891B2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .cf-g3 { background: linear-gradient(90deg,#0891B2,#059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
          .cf-line { width: 80px; height: 3px; background: linear-gradient(90deg,#059669,#0891B2); border-radius: 2px; margin: 16px auto 0; }
          .cf-sub { font-size: 18px; color: var(--risin-text-muted); max-width: 640px; margin: 24px auto 40px; line-height: 1.7; }
          .cf-acts { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; }
          .cf-bp { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: linear-gradient(90deg,#059669,#047857); color: white; font-weight: 600; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-xl); transition: all var(--risin-transition); text-decoration: none; }
          .cf-bp:hover { box-shadow: var(--risin-shadow-2xl); transform: translateY(-1px); }
          .cf-bp svg,.cf-bs svg { width: 18px; height: 18px; }
          .cf-bs { display: inline-flex; align-items: center; gap: 8px; height: 52px; padding: 0 32px; background: white; border: 2px solid #0891B2; color: #0891B2; font-weight: 500; font-size: 16px; border-radius: var(--risin-radius-lg); box-shadow: var(--risin-shadow-lg); transition: all var(--risin-transition); text-decoration: none; }
          .cf-bs:hover { background: #0891B2; color: white; box-shadow: var(--risin-shadow-2xl); }
          .cf-dots { display: flex; justify-content: center; gap: 16px; margin-top: 48px; }
          .cf-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
      </style>
      
      <main>
      
          <!-- Hero -->
          <section class="home-hero">
              <div class="grid-bg"></div>
              <div class="orb orb-green"></div>
              <div class="orb orb-cyan"></div>
              <div class="hh-container">
                  <div class="hh-left">
                      <div class="hh-badge">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
                          <span>Plataforma Digital em Implanta&#231;&#227;o</span>
                      </div>
                      <h1>RISIN &#8211; Plataforma Empresarial Digital em <span class="grad">Implanta&#231;&#227;o Estruturada</span></h1>
                      <p class="hh-subtitle">Integra&#231;&#227;o de 08 websites sob um ecossistema tecnol&#243;gico &#250;nico, com modelo regional estruturado e governan&#231;a progressiva para escalar empresas com seguran&#231;a.</p>
                      <div class="hh-actions">
                          <a class="hh-btn-p" href="@(heroLink1?.Url ?? "/a-risin")">
                              @(heroLink1?.Name ?? "Conhe&#231;a o Projeto")
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
                          </a>
                          <a class="hh-btn-s" href="@(heroLink2?.Url ?? "/parceiros")">
                              @(heroLink2?.Name ?? "Parcerias Estruturantes")
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
                          </a>
                      </div>
                  </div>
                  <div class="hh-right">
                      <div class="hh-frame">
                          <div class="ov"></div>
                          <div class="bov"></div>
                          <img src="@(heroImg != null ? heroImg.Url() : "https://images.unsplash.com/photo-1703635499934-33a8fd14dbf4?auto=format&fit=crop&w=1920&q=85")" alt="RISIN Plataforma Digital" loading="lazy" />
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Visao Macro -->
          <section class="visao-macro">
              <div class="bg-orb"></div>
              <div class="vm-wrap">
                  <h2>Vis&#227;o Macro do Projeto</h2>
                  <p class="vm-sub">Um projeto estruturado para transformar a forma como empresas escalam digitalmente no Brasil, com governan&#231;a, tecnologia e modelo econ&#244;mico integrados desde a concep&#231;&#227;o.</p>
                  <div class="vm-grid">
                      @{
                          int piIdx = 0;
                          if (macroPilars != null && macroPilars.Any())
                          {
                              foreach (var pilar in macroPilars)
                              {
                                  var pT = pilar.Content.Value<string>("title") ?? "";
                                  var pD = pilar.Content.Value<string>("text") ?? "";
                                  var pG = pilarGradients[piIdx % 4];
                                  <div class="vm-card">
                                      <div class="vm-bg" style="background: @pG"></div>
                                      <div class="vm-inner">
                                          <div class="vm-icon" style="background: @pG">@Html.Raw(pilarIcons[piIdx % 4])</div>
                                          <h3>@pT</h3>
                                          <p>@pD</p>
                                          <div class="vm-line" style="background: @pG"></div>
                                      </div>
                                  </div>
                                  piIdx++;
                              }
                          }
                          else
                          {
                              for (int i = 0; i < defaultPilars.Length; i++)
                              {
                                  <div class="vm-card">
                                      <div class="vm-bg" style="background: @pilarGradients[i]"></div>
                                      <div class="vm-inner">
                                          <div class="vm-icon" style="background: @pilarGradients[i]">@Html.Raw(pilarIcons[i])</div>
                                          <h3>@Html.Raw(defaultPilars[i].Title)</h3>
                                          <p>@Html.Raw(defaultPilars[i].Description)</p>
                                          <div class="vm-line" style="background: @pilarGradients[i]"></div>
                                      </div>
                                  </div>
                              }
                          }
                      }
                  </div>
              </div>
          </section>
      
          <!-- Ecossistema -->
          <section class="eco-sec">
              <div class="dot-bg"></div>
              <div class="eco-wrap">
                  <h2>Ecossistema RISIN &#8211; <span class="grad">Plataformas Integradas</span></h2>
                  <p class="eco-sub">Oito websites independentes funcionando sob uma &#250;nica infraestrutura tecnol&#243;gica, compartilhando governan&#231;a, dados e modelo econ&#244;mico para criar valor exponencial.</p>
                  <div class="eco-grid">
                      @foreach (var p in platforms)
                      {
                          <div class="eco-card">
                              <div class="eco-row">
                                  <div class="eco-icon" style="background: linear-gradient(135deg,@(p.Color)20,@(p.Color)10)">
                                      @Html.Raw(p.Icon.Replace("currentColor", p.Color))
                                  </div>
                                  <div class="eco-text">
                                      <h3>@Html.Raw(p.Name)</h3>
                                      <p>@Html.Raw(p.Desc)</p>
                                      <a class="eco-link" href="/ecossistema" style="color: @p.Color">
                                          Ver detalhes
                                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                                      </a>
                                  </div>
                              </div>
                          </div>
                      }
                  </div>
              </div>
          </section>
      
          <!-- Modelo Economico -->
          <section class="modelo-sec">
              <div class="top-acc"></div>
              <div class="me-wrap">
                  <h2>Modelo Econ&#244;mico <span class="grad">Estruturado</span></h2>
                  <div class="me-row">
                      <ul class="bullet-list">
                          @{ int bi = 0; var bList = econBullets.ToList(); }
                          @foreach (var bullet in bList)
                          {
                              <li class="bullet-item">
                                  <div class="b-marker">
                                      <div class="b-dot"></div>
                                      @if (bi < bList.Count - 1) { <div class="b-conn"></div> }
                                  </div>
                                  <span class="b-text">@Html.Raw(bullet)</span>
                              </li>
                              bi++;
                          }
                      </ul>
                      <div class="impact-col">
                          <div class="impact-card">
                              <div class="impact-icon">
                                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941"/></svg>
                              </div>
                              <p class="impact-txt">
                                  Modelo projetado para <strong><span class="hl-g">sustentabilidade</span></strong>, <strong><span class="hl-c">escalabilidade</span></strong> e <strong><span class="hl-g">previsibilidade financeira</span></strong>.
                              </p>
                          </div>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Governanca -->
          <section class="gov-sec">
              <div class="gov-orbital">
                  <div class="gov-ring gov-r1"></div>
                  <div class="gov-ring gov-r2"></div>
                  <div class="gov-ring gov-r3"></div>
              </div>
              <div class="gov-wrap">
                  <h2><span class="grad">Governan&#231;a</span> desde a Implanta&#231;&#227;o</h2>
                  <p class="gov-sub">Estrutura de governan&#231;a corporativa implementada desde o dia zero, garantindo transpar&#234;ncia, responsabilidade e crescimento sustent&#225;vel em todas as fases do projeto.</p>
                  <div class="gov-grid">
                      @for (int gi = 0; gi < govItems.Length; gi++)
                      {
                          <div class="gov-item">
                              <div class="gov-iw">
                                  <div class="gov-ic" style="background: linear-gradient(135deg,@govItems[gi].Color,@(govItems[gi].Color)dd)">
                                      @Html.Raw(govItems[gi].Icon)
                                  </div>
                                  <div class="gov-nb" style="background: @govItems[gi].Color">@(gi+1)</div>
                              </div>
                              <h3>@Html.Raw(govItems[gi].Title)</h3>
                              <p>@Html.Raw(govItems[gi].Desc)</p>
                          </div>
                      }
                  </div>
                  <div class="gov-cta">
                      <a class="gov-btn" href="/governanca">
                          Conhe&#231;a a Estrutura de Governan&#231;a
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                      </a>
                  </div>
              </div>
          </section>
      
          <!-- Parceiros -->
          <section class="par-sec">
              <div class="par-wrap">
                  <h2>Programa <span class="grad">Parceiros RISIN</span></h2>
                  <p class="par-sub">Buscamos parceiros estrat&#233;gicos nas &#225;reas-chave para construir um ecossistema robusto e integrado. Oportunidades estruturadas para empresas que compartilham nossa vis&#227;o.</p>
                  <div class="par-row">
                      @foreach (var p in partners)
                      {
                          <div class="par-item">
                              <div class="par-pulse">
                                  <div class="par-pdot" style="background: @p.Color; width: 80px; height: 80px;"></div>
                                  <div class="par-ibox" style="background: linear-gradient(135deg,@(p.Color)15,@(p.Color)05); border-color: @(p.Color)30">
                                      <svg fill="none" viewBox="0 0 24 24" stroke="@p.Color" stroke-width="2" style="width:32px;height:32px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
                                  </div>
                              </div>
                              <span class="par-name">@Html.Raw(p.Name)</span>
                          </div>
                      }
                  </div>
                  <div class="par-cta">
                      <a class="par-btn" href="@(partnersLink?.Url ?? "/parceiros")">
                          <span>
                              @(partnersLink?.Name ?? "Seja Parceiro Estruturante")
                              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                          </span>
                      </a>
                  </div>
              </div>
          </section>
      
          <!-- Expansao -->
          <section class="exp-sec">
              <div class="exp-fl" style="top:25%;background:linear-gradient(90deg,transparent,rgba(5,150,105,0.1),transparent)"></div>
              <div class="exp-fl" style="top:75%;background:linear-gradient(90deg,transparent,rgba(8,145,178,0.1),transparent)"></div>
              <div class="exp-wrap">
                  <h2>Arquitetura para Evolu&#231;&#227;o em <span class="grad">Holding Digital</span></h2>
                  <div class="exp-row">
                      <div class="exp-tl">
                          <div class="exp-ti" style="border-left-color:rgba(5,150,105,0.5)">
                              <div class="exp-td" style="background:#059669"></div>
                              <p><strong style="color:#059669">2 Regionais Modelo</strong> iniciais (S&#227;o Paulo e Rio de Janeiro) para valida&#231;&#227;o completa do modelo de governan&#231;a, tecnologia e opera&#231;&#227;o.</p>
                          </div>
                          <div class="exp-ti" style="border-left-color:rgba(8,145,178,0.3)">
                              <div class="exp-td" style="background:#0891B2"></div>
                              <p>Expans&#227;o estruturada para <strong style="color:#0891B2">478 regionais</strong> cobrindo todo o territ&#243;rio nacional, com replica&#231;&#227;o consistente de governan&#231;a e padr&#245;es operacionais.</p>
                          </div>
                          <div class="exp-ti" style="border-left-color:rgba(5,150,105,0.2)">
                              <div class="exp-td" style="background:#059669;opacity:0.6"></div>
                              <p>Horizonte de expans&#227;o internacional para pa&#237;ses lus&#243;fonos e mercados latino-americanos com <strong style="color:#059669">governan&#231;a adaptada</strong>.</p>
                          </div>
                      </div>
                      <div class="exp-map">
                          <div class="exp-mf">
                              @if (expansionMapImg != null)
                              {
                                  <img src="@expansionMapImg.Url()" alt="Mapa de Expans&#227;o RISIN" style="width:100%;border-radius:var(--risin-radius-lg)" />
                              }
                              else
                              {
                                  <div style="padding:40px;text-align:center">
                                      <div style="font-size:14px;font-weight:600;color:var(--risin-text-muted);margin-bottom:24px">Mapa de Expans&#227;o Nacional</div>
                                      <div style="display:flex;gap:32px;justify-content:center">
                                          <div style="text-align:center"><div style="font-size:32px;font-weight:900;color:#059669">478</div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--risin-text-muted)">Regionais Planejadas</div></div>
                                          <div style="text-align:center"><div style="font-size:32px;font-weight:900;color:#0891B2">27</div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--risin-text-muted)">Estados</div></div>
                                      </div>
                                  </div>
                              }
                              <div class="exp-leg">
                                  <div class="exp-li"><div class="exp-ld" style="background:#059669"></div><span style="color:var(--risin-text-dark);font-weight:500">Regionais Modelo</span></div>
                                  <div class="exp-li"><div class="exp-ld" style="background:#D1D5DB"></div><span style="color:var(--risin-text-muted)">Expans&#227;o Planejada</span></div>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Chamada Final -->
          <section class="cf-sec">
              <div class="radial"></div>
              <div class="cf-rings">
                  <div class="cf-r cf-r1"></div>
                  <div class="cf-r cf-r2"></div>
                  <div class="cf-r cf-r3"></div>
              </div>
              <div class="cf-wrap">
                  <h2>RISIN. <span class="cf-g1">Estrutura</span>. <span class="cf-g2">Governan&#231;a</span>. <span class="cf-g3">Escala</span>.</h2>
                  <div class="cf-line"></div>
                  <p class="cf-sub">Entre em contato para conhecer mais sobre o projeto ou fa&#231;a o download da nossa apresenta&#231;&#227;o institucional completa.</p>
                  <div class="cf-acts">
                      <a class="cf-bp" href="@(finalLink1?.Url ?? "/contato")">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
                          @(finalLink1?.Name ?? "Contato Institucional")
                      </a>
                      <a class="cf-bs" href="@(finalLink2?.Url ?? "/transparencia")">
                          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                          @(finalLink2?.Name ?? "Download Apresenta&#231;&#227;o Institucional")
                      </a>
                  </div>
                  <div class="cf-dots">
                      <div class="cf-dot" style="background:#059669"></div>
                      <div class="cf-dot" style="background:#0891B2;animation-delay:0.3s"></div>
                      <div class="cf-dot" style="background:#059669;animation-delay:0.6s"></div>
                  </div>
              </div>
          </section>
      
      </main>

  - alias: aRisin
    name: "A RISIN"
    path: aRisin.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
      .ar-tag{color:var(--risin-green);font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-size:.75rem;display:block;margin-bottom:.5rem}
      .ar-h2{font-size:clamp(1.75rem,3vw,2.5rem);font-weight:800;color:#0f172a;letter-spacing:-.02em;margin:0 0 2rem}
      .ar-sec-hd{text-align:center;margin-bottom:4rem}
      .ar-history{padding:var(--risin-section-py) var(--risin-padding);background:#fff}
      .ar-history-inner{max-width:var(--risin-max-width);margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
      .ar-body{color:#475569;line-height:1.8}.ar-body p{margin-bottom:1.25rem}.ar-body strong{color:#0f172a;font-weight:600}
      .ar-pillars{display:flex;flex-direction:column;gap:1rem;margin-top:1.5rem}
      .ar-pilar{display:flex;align-items:flex-start;gap:1rem;padding:1.25rem;border-radius:.75rem;background:#f8fafc}
      .ar-pilar-icon{width:40px;height:40px;background:rgba(5,150,105,.1);border-radius:.5rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .ar-pilar-icon svg{width:20px;height:20px;stroke:var(--risin-green);fill:none}
      .ar-pilar-title{font-weight:700;color:#0f172a;font-size:.95rem;margin-bottom:.25rem}
      .ar-pilar-text{font-size:.875rem;color:#64748b}
      .ar-timeline{padding:var(--risin-section-py) var(--risin-padding);background:#f8fafc}
      .ar-tl-list{position:relative;max-width:720px;margin:0 auto}
      .ar-tl-list::before{content:'';position:absolute;left:24px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--risin-green),var(--risin-cyan),#cbd5e1)}
      .ar-tl-item{display:flex;gap:2rem;align-items:flex-start;margin-bottom:2rem}
      .ar-tl-num{width:48px;height:48px;border-radius:50%;background:var(--risin-green);color:#fff;font-weight:900;font-size:.875rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1}
      .ar-tl-card{background:#fff;border-radius:.75rem;padding:1.5rem;flex:1;box-shadow:0 1px 3px rgba(0,0,0,.06)}
      .ar-tl-year{display:inline-block;padding:.125rem .625rem;background:rgba(5,150,105,.1);color:var(--risin-green);font-size:.75rem;font-weight:700;border-radius:9999px;margin-bottom:.5rem}
      .ar-tl-title{font-weight:700;font-size:1.05rem;color:#0f172a;margin-bottom:.25rem}
      .ar-tl-desc{font-size:.875rem;color:#64748b;line-height:1.6}
      .ar-mvv{padding:var(--risin-section-py) var(--risin-padding);background:#fff}
      .ar-mvv-grid{max-width:var(--risin-max-width);margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:2rem}
      .ar-mvv-card{background:#f8fafc;border-radius:1rem;padding:2rem}
      .ar-mvv-card svg{width:40px;height:40px;stroke:var(--risin-green);fill:none;margin-bottom:1rem}
      .ar-mvv-card h3{font-size:1.2rem;font-weight:700;color:#0f172a;margin-bottom:1rem}
      .ar-mvv-card p{color:#64748b;line-height:1.7;font-size:.925rem}
      .ar-directors{padding:var(--risin-section-py) var(--risin-padding);background:#f8fafc}
      .ar-dir-grid{max-width:var(--risin-max-width);margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:1.5rem}
      .ar-dir-card{background:#fff;border-radius:.75rem;padding:2rem;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
      .ar-dir-card.green{background:var(--risin-green)}
      .ar-dir-card svg{width:40px;height:40px;stroke:var(--risin-green);fill:none;margin-bottom:1rem}
      .ar-dir-card.green svg{stroke:rgba(255,255,255,.9)}
      .ar-dir-title{font-weight:700;font-size:1rem;color:#0f172a;margin-bottom:.5rem}
      .ar-dir-card.green .ar-dir-title{color:#fff}
      .ar-dir-desc{font-size:.8rem;color:#64748b;line-height:1.5}
      .ar-dir-card.green .ar-dir-desc{color:rgba(255,255,255,.8)}
      @@media(max-width:1024px){.ar-history-inner{grid-template-columns:1fr;gap:3rem}.ar-mvv-grid{grid-template-columns:1fr}.ar-dir-grid{grid-template-columns:repeat(2,1fr)}}
      @@media(max-width:640px){.ar-dir-grid{grid-template-columns:1fr}}
      </style>
      <main>
      <section class="page-hero"><div class="grid-bg"></div><div class="orb-1"></div><div class="orb-2"></div>
      <div class="ph-container"><h1>A <span class="gradient">RISIN</span></h1>
      <p class="ph-subtitle">Conhe&#231;a a hist&#243;ria, miss&#227;o, vis&#227;o e valores da holding digital que est&#225; estruturando o futuro do com&#233;rcio empresarial no Brasil.</p></div></section>
      
      <section class="ar-history"><div class="ar-history-inner">
      <div><span class="ar-tag">Nossa Hist&#243;ria</span><h2 class="ar-h2">A Vis&#227;o Fundadora</h2>
      <div class="ar-body">
      <p>A <strong>RISIN &#8211; Plataforma Empresarial Digital</strong> nasceu da vis&#227;o de criar um ecossistema integrado que conectasse empresas, profissionais e consumidores em uma &#250;nica plataforma robusta e governada.</p>
      <p>Identificamos que o mercado brasileiro carecia de uma solu&#231;&#227;o que unificasse servi&#231;os empresariais digitais com <strong>governan&#231;a regional estruturada</strong>, permitindo que pequenas e m&#233;dias empresas acessassem ferramentas de n&#237;vel corporativo.</p>
      <p>Com 08 portais estrat&#233;gicos operando de forma integrada, a RISIN oferece desde marketplace B2B/B2C at&#233; streaming corporativo, passando por log&#237;stica, suprimentos, classificados e marketing digital &#8211; tudo sob uma &#250;nica identidade e governan&#231;a.</p>
      <p>O modelo de <strong>S&#243;cios Fundadores</strong> permite que empresas e profissionais participem ativamente da constru&#231;&#227;o desta plataforma, garantindo benef&#237;cios exclusivos e participa&#231;&#227;o no crescimento do ecossistema.</p>
      </div></div>
      <div><span class="ar-tag">Pilares da Plataforma</span><div class="ar-pillars">
      <div class="ar-pilar"><div class="ar-pilar-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg></div><div><div class="ar-pilar-title">Integra&#231;&#227;o Total</div><div class="ar-pilar-text">Todos os portais comunicam entre si, criando uma experi&#234;ncia unificada.</div></div></div>
      <div class="ar-pilar"><div class="ar-pilar-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18"/></svg></div><div><div class="ar-pilar-title">Governan&#231;a Estruturada</div><div class="ar-pilar-text">Presid&#234;ncia, diretoria executiva e conselho consultivo com pap&#233;is bem definidos.</div></div></div>
      <div class="ar-pilar"><div class="ar-pilar-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c-.317-.159-.69-.159-1.006 0l4.994 2.497z"/></svg></div><div><div class="ar-pilar-title">Capilaridade Regional</div><div class="ar-pilar-text">Modelo replic&#225;vel para 478 regionais em todos os 27 estados.</div></div></div>
      <div class="ar-pilar"><div class="ar-pilar-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg></div><div><div class="ar-pilar-title">Compliance e LGPD</div><div class="ar-pilar-text">Conformidade regulat&#243;ria e prote&#231;&#227;o de dados em toda a plataforma.</div></div></div>
      <div class="ar-pilar"><div class="ar-pilar-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg></div><div><div class="ar-pilar-title">Cooperativismo Digital</div><div class="ar-pilar-text">Poder coletivo de compras, negocia&#231;&#245;es e visibilidade para todos os membros.</div></div></div>
      </div></div></div></section>
      
      <section class="ar-timeline">
      <div style="max-width:var(--risin-max-width);margin:0 auto;padding:0 var(--risin-padding)"><div class="ar-sec-hd" style="padding-top:0"><span class="ar-tag">Cronograma</span><h2 class="ar-h2" style="margin:0">Linha do Tempo da Implanta&#231;&#227;o</h2></div></div>
      <div class="ar-tl-list">
      <div class="ar-tl-item"><div class="ar-tl-num">1</div><div class="ar-tl-card"><span class="ar-tl-year">2024</span><div class="ar-tl-title">Concep&#231;&#227;o e Estrutura&#231;&#227;o</div><p class="ar-tl-desc">Defini&#231;&#227;o do modelo de neg&#243;cio, arquitetura da plataforma e estrutura de governan&#231;a corporativa.</p></div></div>
      <div class="ar-tl-item"><div class="ar-tl-num">2</div><div class="ar-tl-card"><span class="ar-tl-year">2025</span><div class="ar-tl-title">Implanta&#231;&#227;o das Regionais Modelo</div><p class="ar-tl-desc">Lan&#231;amento das 2 primeiras regionais (SP e RJ) com 5.000 vagas para S&#243;cios Fundadores.</p></div></div>
      <div class="ar-tl-item"><div class="ar-tl-num">3</div><div class="ar-tl-card"><span class="ar-tl-year">2026&#8211;2027</span><div class="ar-tl-title">Expans&#227;o Nacional</div><p class="ar-tl-desc">Replica&#231;&#227;o do modelo validado para as primeiras 50 regionais priorit&#225;rias no Brasil.</p></div></div>
      <div class="ar-tl-item"><div class="ar-tl-num">4</div><div class="ar-tl-card"><span class="ar-tl-year">2028&#8211;2030</span><div class="ar-tl-title">Consolida&#231;&#227;o Nacional</div><p class="ar-tl-desc">Atingir 478 regionais ativas em todo o territ&#243;rio nacional com autossufici&#234;ncia financeira.</p></div></div>
      <div class="ar-tl-item"><div class="ar-tl-num">5</div><div class="ar-tl-card"><span class="ar-tl-year">2030+</span><div class="ar-tl-title">Hold-Dig &#8211; Soberania Digital</div><p class="ar-tl-desc">Consolida&#231;&#227;o da holding digital com autossufici&#234;ncia financeira em todas as regionais.</p></div></div>
      </div></section>
      
      <section class="ar-mvv">
      <div style="max-width:var(--risin-max-width);margin:0 auto"><div class="ar-sec-hd"><span class="ar-tag">Prop&#243;sito</span><h2 class="ar-h2" style="margin:0">Miss&#227;o, Vis&#227;o e Valores</h2></div></div>
      <div class="ar-mvv-grid">
      <div class="ar-mvv-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l1.664 9.526a2.25 2.25 0 002.238 1.974h10.196a2.25 2.25 0 002.238-1.974L21 3M3 3h18M12 12v9m0 0H8.25m3.75 0H15.75"/></svg><h3>Nossa Miss&#227;o</h3><p>Integrar, estruturar e potencializar o ecossistema empresarial brasileiro por meio de uma plataforma digital completa, acess&#237;vel e com governan&#231;a transparente.</p></div>
      <div class="ar-mvv-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg><h3>Nossa Vis&#227;o</h3><p>Ser a maior plataforma de integra&#231;&#227;o empresarial do Brasil at&#233; 2030, com 478 regionais ativas, impactando mais de 100 mil empresas em todo o territ&#243;rio nacional.</p></div>
      <div class="ar-mvv-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.631 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 00-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.448 14.9 14.9 0 01.06-.312m-2.24 2.39a4.493 4.493 0 00-1.757 4.306 4.493 4.493 0 004.306-1.758M16.5 9a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg><h3>Nossos Valores</h3><p>Transpar&#234;ncia na governan&#231;a, inova&#231;&#227;o cont&#237;nua, cooperativismo empresarial, responsabilidade regional e compromisso com o desenvolvimento sustent&#225;vel do pa&#237;s.</p></div>
      </div></section>
      
      <section class="ar-directors">
      <div style="max-width:var(--risin-max-width);margin:0 auto"><div class="ar-sec-hd"><span class="ar-tag">Estrutura Executiva</span><h2 class="ar-h2" style="margin:0">5 Diretorias Especializadas</h2><p style="color:#64748b;margin-top:1rem;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6">A RISIN opera com uma estrutura executiva completa, cada diretoria respons&#225;vel por uma &#225;rea estrat&#233;gica da plataforma.</p></div></div>
      <div class="ar-dir-grid">
      <div class="ar-dir-card green"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z"/></svg><div class="ar-dir-title">Presid&#234;ncia</div><div class="ar-dir-desc">Dire&#231;&#227;o estrat&#233;gica e representa&#231;&#227;o institucional</div></div>
      <div class="ar-dir-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3"/></svg><div class="ar-dir-title">Diretoria de TI</div><div class="ar-dir-desc">Infraestrutura tecnol&#243;gica, desenvolvimento e seguran&#231;a da plataforma.</div></div>
      <div class="ar-dir-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg><div class="ar-dir-title">Diretoria Financeira</div><div class="ar-dir-desc">Gest&#227;o financeira, controladoria e rela&#231;&#245;es com investidores.</div></div>
      <div class="ar-dir-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.402m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014 8.855c-.118.38-.245.754-.38 1.125m.38-1.125a23.91 23.91 0 001.014-5.395m0-3.46c.495.413.811 1.035.811 1.73 0 .695-.316 1.317-.811 1.73m0-3.46a24.347 24.347 0 010 3.46"/></svg><div class="ar-dir-title">Diretoria de Marketing</div><div class="ar-dir-desc">Comunica&#231;&#227;o institucional, branding e estrat&#233;gias de crescimento.</div></div>
      <div class="ar-dir-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg><div class="ar-dir-title">Diretoria Comercial</div><div class="ar-dir-desc">Vendas, parcerias estrat&#233;gicas e expans&#227;o de base de clientes.</div></div>
      </div></section>
      </main>
  - alias: ecossistema
    name: "Ecossistema"
    path: ecossistema.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
      .ecs-tag{color:var(--risin-green);font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-size:.75rem;display:block;margin-bottom:.5rem}
      .ecs-h2{font-size:clamp(1.75rem,3vw,2.5rem);font-weight:800;color:#0f172a;letter-spacing:-.02em;margin:0 0 1.5rem}
      .ecs-portals{padding:var(--risin-section-py) var(--risin-padding);background:#fff}
      .ecs-portals-inner{max-width:var(--risin-max-width);margin:0 auto}
      .ecs-sec-hd{text-align:center;margin-bottom:3.5rem}
      .ecs-sec-hd h2{margin:.5rem 0 1rem}
      .ecs-sec-hd p{color:#64748b;max-width:560px;margin:0 auto;line-height:1.6}
      .ecs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem}
      .ecs-card{background:#f8fafc;border-radius:1rem;padding:1.75rem;border-top:3px solid transparent;transition:border-color .2s,transform .2s,box-shadow .2s}
      .ecs-card:hover{border-top-color:var(--risin-green);transform:translateY(-3px);box-shadow:0 8px 24px rgba(5,150,105,.12)}
      .ecs-card svg{width:36px;height:36px;stroke:var(--risin-green);fill:none;margin-bottom:1rem}
      .ecs-card-name{font-weight:800;font-size:1.05rem;color:#0f172a;margin-bottom:.5rem}
      .ecs-card-type{display:inline-block;padding:.2rem .625rem;background:rgba(5,150,105,.1);color:var(--risin-green);font-size:.7rem;font-weight:700;border-radius:9999px;margin-bottom:.75rem}
      .ecs-card-desc{font-size:.85rem;color:#64748b;line-height:1.55}
      .ecs-integration{padding:var(--risin-section-py) var(--risin-padding);background:#f8fafc}
      .ecs-int-inner{max-width:var(--risin-max-width);margin:0 auto}
      .ecs-int-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem}
      .ecs-int-card{background:#fff;border-radius:1rem;padding:2rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
      .ecs-int-card.accent{background:var(--risin-green)}
