  - alias: contato
    name: "Contato"
    path: Contato.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{
          Layout = "master.cshtml";
          var root = Model.Root();
          var siteEmail = root.Value<string>("siteEmail") ?? "contato@risin.com.br";
          var siteLocation = root.Value<string>("siteLocation") ?? "Niterói, RJ";
      }
      <main class="pt-[80px]">
      
          <!-- Hero -->
          <section class="py-24 bg-surface-container-low overflow-hidden relative">
              <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
                  <div class="absolute -top-32 -left-32 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
                  <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"></div>
              </div>
              <div class="max-w-[1440px] mx-auto px-12 text-center relative z-10">
                  <span class="inline-flex items-center gap-2 px-4 py-1.5 bg-primary/10 text-primary rounded-full text-xs font-bold uppercase tracking-widest mb-6">
                      <span class="material-symbols-outlined text-sm">mail</span>
                      Contato
                  </span>
                  <h1 class="text-5xl lg:text-6xl font-extrabold tracking-tight text-on-surface leading-[1.1] mb-6">
                      @(Model.Value<string>("heroTitle") ?? "Fale com a RISIN")
                  </h1>
                  <p class="text-xl text-on-surface-variant leading-relaxed max-w-2xl mx-auto">
                      @(Model.Value<string>("heroSubtitle") ?? "Entre em contato com nossa equipe. Estamos prontos para responder suas perguntas e explorar oportunidades de parceria.")
                  </p>
              </div>
          </section>
      
          <!-- Contact form + info -->
          <section class="py-24 bg-surface-container-lowest">
              <div class="max-w-[1440px] mx-auto px-12 grid grid-cols-1 md:grid-cols-2 gap-16">
                  <!-- Contact form -->
                  <div class="bg-surface-container-low rounded-2xl p-10 shadow-sm">
                      <h2 class="text-2xl font-bold mb-8">Envie uma mensagem</h2>
                      <form class="space-y-6" action="#" method="post">
                          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                              <div>
                                  <label class="block text-sm font-semibold mb-2">Nome *</label>
                                  <input type="text" name="name" required placeholder="Seu nome completo"
                                      class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" />
                              </div>
                              <div>
                                  <label class="block text-sm font-semibold mb-2">Empresa</label>
                                  <input type="text" name="company" placeholder="Nome da sua empresa"
                                      class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" />
                              </div>
                          </div>
                          <div>
                              <label class="block text-sm font-semibold mb-2">E-mail *</label>
                              <input type="email" name="email" required placeholder="seu@email.com"
                                  class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" />
                          </div>
                          <div>
                              <label class="block text-sm font-semibold mb-2">Assunto</label>
                              <select name="subject" class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm">
                                  <option value="">Selecione um assunto</option>
                                  <option value="partnership">Parceria Estratégica</option>
                                  <option value="investor">Investimento</option>
                                  <option value="regional">Operador Regional</option>
                                  <option value="institutional">Relações Institucionais</option>
                                  <option value="other">Outro</option>
                              </select>
                          </div>
                          <div>
                              <label class="block text-sm font-semibold mb-2">Mensagem *</label>
                              <textarea name="message" required rows="5" placeholder="Descreva como podemos ajudar..."
                                  class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm resize-none"></textarea>
                          </div>
                          <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-sm hover:bg-primary-container transition-colors active:scale-95">
                              Enviar Mensagem
                          </button>
                      </form>
                  </div>
                  <!-- Contact info -->
                  <div class="space-y-8">
                      <div>
                          <h2 class="text-2xl font-bold mb-6">Informações de Contato</h2>
                          <div class="space-y-4">
                              <div class="flex items-start gap-4 p-6 bg-surface-container-low rounded-xl">
                                  <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                                      <span class="material-symbols-outlined text-primary">mail</span>
                                  </div>
                                  <div>
                                      <div class="font-bold mb-1">E-mail Geral</div>
                                      <a href="mailto:@siteEmail" class="text-primary hover:underline text-sm">@siteEmail</a>
                                  </div>
                              </div>
                              <div class="flex items-start gap-4 p-6 bg-surface-container-low rounded-xl">
                                  <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                                      <span class="material-symbols-outlined text-primary">handshake</span>
                                  </div>
                                  <div>
                                      <div class="font-bold mb-1">Parcerias</div>
                                      <a href="mailto:parcerias@risin.com.br" class="text-primary hover:underline text-sm">parcerias@risin.com.br</a>
                                  </div>
                              </div>
                              <div class="flex items-start gap-4 p-6 bg-surface-container-low rounded-xl">
                                  <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                                      <span class="material-symbols-outlined text-primary">corporate_fare</span>
                                  </div>
                                  <div>
                                      <div class="font-bold mb-1">Relações Institucionais</div>
                                      <a href="mailto:institucional@risin.com.br" class="text-primary hover:underline text-sm">institucional@risin.com.br</a>
                                  </div>
                              </div>
                              <div class="flex items-start gap-4 p-6 bg-surface-container-low rounded-xl">
                                  <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                                      <span class="material-symbols-outlined text-primary">location_on</span>
                                  </div>
                                  <div>
                                      <div class="font-bold mb-1">Localização</div>
                                      <div class="text-sm text-on-surface-variant">@siteLocation</div>
                                  </div>
                              </div>
                          </div>
                      </div>
                      <!-- Quick links -->
                      <div class="bg-primary rounded-2xl p-8 text-white">
                          <h3 class="font-bold text-lg mb-6">Acesso Rápido</h3>
                          <div class="space-y-3">
                              <a href="/parceiros" class="flex items-center gap-3 text-white/80 hover:text-white transition-colors text-sm">
                                  <span class="material-symbols-outlined text-white/60 text-sm">handshake</span>
                                  Programa de Parceiros
                              </a>
                              <a href="/relacoes-institucionais" class="flex items-center gap-3 text-white/80 hover:text-white transition-colors text-sm">
                                  <span class="material-symbols-outlined text-white/60 text-sm">corporate_fare</span>
                                  Relações Institucionais
                              </a>
                              <a href="/regionais" class="flex items-center gap-3 text-white/80 hover:text-white transition-colors text-sm">
                                  <span class="material-symbols-outlined text-white/60 text-sm">map</span>
                                  Expansão Regional
                              </a>
                              <a href="/modelo-de-negocio" class="flex items-center gap-3 text-white/80 hover:text-white transition-colors text-sm">
                                  <span class="material-symbols-outlined text-white/60 text-sm">trending_up</span>
                                  Modelo de Negócio
                              </a>
                          </div>
                      </div>
                  </div>
              </div>
          </section>
      
      </main>

