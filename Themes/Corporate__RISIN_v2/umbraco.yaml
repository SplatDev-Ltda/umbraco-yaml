              </div>
          </section>
      
      </main>


  - alias: governanca
    name: "Governança"
    path: Governanca.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @using Umbraco.Cms.Core.Models.PublishedContent
      @{
          Layout = "master.cshtml";
          var govRoles = Model.Children?.Where(x => x.ContentType.Alias == "governanceRole")
                             .OrderBy(x => x.Value<int>("sortOrder"))
                             ?? Enumerable.Empty<IPublishedContent>();
      }
      <main class="pt-[80px]">
      
          <!-- Hero -->
          <section class="py-24 bg-surface-container-low overflow-hidden relative">
              <div class="max-w-[1440px] mx-auto px-12 grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
                  <div class="space-y-6">
                      <span class="inline-flex items-center gap-2 px-4 py-1.5 bg-secondary/10 text-secondary rounded-full text-xs font-bold uppercase tracking-widest">
                          <span class="material-symbols-outlined text-sm">account_balance</span>
                          Governança Corporativa
                      </span>
                      <h1 class="text-5xl lg:text-6xl font-extrabold tracking-tight text-on-surface leading-[1.1]">
                          @(Model.Value<string>("heroTitle") ?? "Governança Corporativa")
                      </h1>
                      <p class="text-xl text-on-surface-variant leading-relaxed">
                          @(Model.Value<string>("heroSubtitle") ?? "Modelo de governança robusto e transparente, com definição clara de papéis, responsabilidades e processos de tomada de decisão.")
                      </p>
                  </div>
                  <div class="relative">
                      <div class="absolute -inset-4 bg-secondary/5 rounded-3xl blur-2xl"></div>
                      @{ var govHeroImg = Model.Value<Umbraco.Cms.Core.Models.MediaWithCrops>("heroImage"); }
                      <img alt="Governança Corporativa" class="rounded-2xl shadow-2xl relative z-10 w-full h-[360px] object-cover" src="@(govHeroImg != null ? govHeroImg.Url() : "/media/governance-hero.jpg")" />
                  </div>
              </div>
          </section>
      
          <!-- 3-col governance structure cards -->
          <section class="py-24 bg-surface-container-lowest">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="text-center mb-16">
                      <span class="text-primary font-bold tracking-widest uppercase text-xs">Estrutura Organizacional</span>
                      <h2 class="text-4xl font-bold tracking-tight mt-2">@(Model.Value<string>("structureTitle") ?? "Hierarquia e Responsabilidades")</h2>
                      @if (Model.HasValue("structureDescription"))
                      {
                          <p class="text-on-surface-variant mt-4 max-w-xl mx-auto">@Model@(Model.Value<string>("structureDescription"))</p>
                      }
                  </div>
                  @if (govRoles.Any())
                  {
                      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                          @foreach (var role in govRoles)
                          {
                              var borderColor = role.Value<string>("roleAlias") == "conselho-admin" ? "border-primary" : (role.Value<string>("roleAlias") == "conselho-consultivo" ? "border-secondary" : "border-primary");
                              var iconColor = role.Value<string>("roleAlias") == "conselho-consultivo" ? "text-secondary" : "text-primary";
                              <div class="bg-surface-container-low p-8 rounded-xl shadow-sm border-t-4 @borderColor hover:-translate-y-1 transition-transform">
                                  <span class="material-symbols-outlined @iconColor text-4xl mb-6">account_balance</span>
                                  <h3 class="text-xl font-bold mb-4">@(role.Value<string>("roleTitle") ?? role.Name)</h3>
                                  <p class="text-on-surface-variant text-sm leading-relaxed mb-6">@(role.Value<string>("roleDescription") ?? "")</p>
                              </div>
                          }
                      </div>
                  }
                  else
                  {
                      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                          <div class="bg-surface-container-low p-8 rounded-xl shadow-sm border-t-4 border-primary hover:-translate-y-1 transition-transform">
                              <span class="material-symbols-outlined text-primary text-4xl mb-6">account_balance</span>
                              <h3 class="text-xl font-bold mb-4">Conselho de Administração</h3>
                              <p class="text-on-surface-variant text-sm leading-relaxed mb-6">Definição das diretrizes estratégicas, aprovação de orçamentos e supervisão geral da plataforma RISIN em todos os níveis.</p>
                              <div class="space-y-3">
                                  <div class="flex items-center gap-2 text-sm text-on-surface-variant">
                                      <span class="material-symbols-outlined text-primary text-sm">check_circle</span>
                                      Aprovação de grandes investimentos
                                  </div>
                                  <div class="flex items-center gap-2 text-sm text-on-surface-variant">
                                      <span class="material-symbols-outlined text-primary text-sm">check_circle</span>
                                      Definição de metas estratégicas
                                  </div>
                                  <div class="flex items-center gap-2 text-sm text-on-surface-variant">
                                      <span class="material-symbols-outlined text-primary text-sm">check_circle</span>
                                      Supervisão da Diretoria Executiva
                                  </div>
                              </div>
                          </div>
                          <div class="bg-surface-container-low p-8 rounded-xl shadow-sm border-t-4 border-secondary hover:-translate-y-1 transition-transform">
                              <span class="material-symbols-outlined text-secondary text-4xl mb-6">verified_user</span>
                              <h3 class="text-xl font-bold mb-4">Conselho Consultivo</h3>
                              <p class="text-on-surface-variant text-sm leading-relaxed mb-6">Especialistas independentes em Jurídico, Finanças e Tecnologia que assessoram as decisões estratégicas e garantem compliance.</p>
                              <div class="space-y-3">
                                  <div class="flex items-center gap-2 text-sm text-on-surface-variant">
                                      <span class="material-symbols-outlined text-secondary text-sm">check_circle</span>
                                      Assessoria jurídica e compliance
                                  </div>
                                  <div class="flex items-center gap-2 text-sm text-on-surface-variant">
                                      <span class="material-symbols-outlined text-secondary text-sm">check_circle</span>
                                      Auditoria financeira independente
                                  </div>
                                  <div class="flex items-center gap-2 text-sm text-on-surface-variant">
                                      <span class="material-symbols-outlined text-secondary text-sm">check_circle</span>
                                      Orientação tecnológica e inovação
                                  </div>
                              </div>
                          </div>
                          <div class="bg-surface-container-low p-8 rounded-xl shadow-sm border-l-4 border-primary hover:-translate-y-1 transition-transform">
                              <span class="material-symbols-outlined text-primary text-4xl mb-6">groups</span>
                              <h3 class="text-xl font-bold mb-4">Diretoria Executiva</h3>
                              <p class="text-on-surface-variant text-sm leading-relaxed mb-6">Gestão técnica e operacional das verticais de serviço e tecnologia, garantindo a execução da estratégia aprovada pelo conselho.</p>
                              <div class="space-y-3">
                                  <div class="flex items-center gap-2 text-sm text-on-surface-variant">
                                      <span class="material-symbols-outlined text-primary text-sm">check_circle</span>
                                      Gestão operacional dos portais
                                  </div>
                                  <div class="flex items-center gap-2 text-sm text-on-surface-variant">
                                      <span class="material-symbols-outlined text-primary text-sm">check_circle</span>
                                      Coordenação das diretorias
                                  </div>
                                  <div class="flex items-center gap-2 text-sm text-on-surface-variant">
                                      <span class="material-symbols-outlined text-primary text-sm">check_circle</span>
                                      Prestação de contas ao conselho
                                  </div>
                              </div>
                          </div>
                      </div>
                  }
              </div>
          </section>
      
          <!-- Principles + Compliance 2-col white card -->
          <section class="py-24 bg-surface-container-low">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                      <div class="grid grid-cols-1 md:grid-cols-2">
                          <div class="p-12 border-r border-outline-variant/20">
                              <span class="text-primary font-bold tracking-widest uppercase text-xs">Princípios</span>
                              <h2 class="text-3xl font-bold tracking-tight mt-2 mb-8">@(Model.Value<string>("agreementTitle") ?? "Pilares da Nossa Governança")</h2>
                              @if (Model.HasValue("agreementContent"))
                              {
                                  <div class="text-on-surface-variant leading-relaxed">
                                      @Html.Raw(Model.Value("agreementContent"))
                                  </div>
                              }
                              else
                              {
                                  <div class="space-y-6">
                                      <div class="flex gap-6 items-start">
                                          <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center text-primary font-black text-sm flex-shrink-0">1</div>
                                          <div>
                                              <h4 class="font-bold mb-1">Transparência</h4>
                                              <p class="text-sm text-on-surface-variant">Relatórios periódicos, prestação de contas clara e comunicação aberta com todos os stakeholders.</p>
                                          </div>
                                      </div>
                                      <div class="flex gap-6 items-start">
                                          <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center text-primary font-black text-sm flex-shrink-0">2</div>
                                          <div>
                                              <h4 class="font-bold mb-1">Equidade</h4>
                                              <p class="text-sm text-on-surface-variant">Tratamento justo e igualitário para todos os membros, parceiros e colaboradores da plataforma.</p>
                                          </div>
                                      </div>
                                      <div class="flex gap-6 items-start">
                                          <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center text-primary font-black text-sm flex-shrink-0">3</div>
                                          <div>
                                              <h4 class="font-bold mb-1">Integridade</h4>
                                              <p class="text-sm text-on-surface-variant">Compromisso com a ética empresarial, compliance e boas práticas em todas as operações.</p>
                                          </div>
                                      </div>
                                      <div class="flex gap-6 items-start">
                                          <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center text-primary font-black text-sm flex-shrink-0">4</div>
                                          <div>
                                              <h4 class="font-bold mb-1">Responsabilidade</h4>
                                              <p class="text-sm text-on-surface-variant">Prestação de contas clara, com papéis e responsabilidades definidos em todos os níveis.</p>
                                          </div>
                                      </div>
                                  </div>
                              }
                          </div>
                          <div class="p-12 bg-surface-container-low">
                              <span class="text-secondary font-bold tracking-widest uppercase text-xs">Compliance</span>
                              <h2 class="text-3xl font-bold tracking-tight mt-2 mb-8">@(Model.Value<string>("complianceTitle") ?? "Conformidade Regulatória")</h2>
                              @if (Model.HasValue("complianceContent"))
                              {
                                  <div class="text-on-surface-variant leading-relaxed">
                                      @Html.Raw(Model.Value("complianceContent"))
                                  </div>
                              }
                              else
                              {
                                  <div class="space-y-4">
                                      <div class="bg-white p-5 rounded-xl">
                                          <div class="flex items-center gap-3 mb-2">
                                              <span class="material-symbols-outlined text-primary">security</span>
                                              <h4 class="font-bold">LGPD – Lei Geral de Proteção de Dados</h4>
                                          </div>
                                          <p class="text-sm text-on-surface-variant pl-9">Políticas de privacidade, gestão de consentimento e proteção de dados de todos os usuários.</p>
                                      </div>
                                      <div class="bg-white p-5 rounded-xl">
                                          <div class="flex items-center gap-3 mb-2">
                                              <span class="material-symbols-outlined text-primary">gavel</span>
                                              <h4 class="font-bold">Direito Empresarial e Regulatório</h4>
                                          </div>
                                          <p class="text-sm text-on-surface-variant pl-9">Conformidade com legislação comercial, trabalhista e regulações setoriais em cada estado.</p>
                                      </div>
                                      <div class="bg-white p-5 rounded-xl">
                                          <div class="flex items-center gap-3 mb-2">
                                              <span class="material-symbols-outlined text-primary">balance</span>
                                              <h4 class="font-bold">Auditoria e Controles Internos</h4>
                                          </div>
                                          <p class="text-sm text-on-surface-variant pl-9">Processos de auditoria interna e externa garantindo a integridade das operações financeiras.</p>
                                      </div>
                                  </div>
                              }
                          </div>
                      </div>
                  </div>
              </div>
          </section>
      
          <!-- Documents bar -->
          <section class="py-12 bg-surface-container-lowest border-t border-outline-variant/20">
              <div class="max-w-[1440px] mx-auto px-12">
                  <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                      <div>
                          <h3 class="font-bold text-lg">@(Model.Value<string>("documentButtonsTitle") ?? "Documentos Institucionais")</h3>
