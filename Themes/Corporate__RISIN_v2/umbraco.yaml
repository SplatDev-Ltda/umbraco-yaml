  - alias: modeloNegocio
    name: "Modelo de Negocio"
    path: modeloNegocio.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
      .mn-tag{color:var(--risin-green);font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-size:.75rem;display:block;margin-bottom:.5rem}
      .mn-h2{font-size:clamp(1.75rem,3vw,2.5rem);font-weight:800;color:#0f172a;letter-spacing:-.02em;margin:0 0 1.5rem}
      .mn-revenue{padding:var(--risin-section-py) var(--risin-padding);background:#fff}
      .mn-rev-inner{max-width:var(--risin-max-width);margin:0 auto}
      .mn-sec-hd{text-align:center;margin-bottom:3.5rem}
      .mn-sec-hd p{color:#64748b;max-width:560px;margin:.75rem auto 0;line-height:1.6}
      .mn-rev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem}
      .mn-rev-card{background:#f8fafc;border-radius:1rem;padding:2rem;border-top:3px solid var(--risin-green)}
      .mn-rev-card svg{width:36px;height:36px;stroke:var(--risin-green);fill:none;margin-bottom:1rem}
      .mn-rev-card h3{font-weight:700;font-size:1rem;color:#0f172a;margin-bottom:.75rem}
      .mn-rev-card p{font-size:.85rem;color:#64748b;line-height:1.6}
      .mn-rev-pct{display:inline-block;margin-top:1rem;padding:.3rem .875rem;background:rgba(5,150,105,.1);color:var(--risin-green);font-size:.8rem;font-weight:700;border-radius:9999px}
      .mn-contracts{padding:var(--risin-section-py) var(--risin-padding);background:#f8fafc}
      .mn-con-inner{max-width:var(--risin-max-width);margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start}
      .mn-con-body{color:#475569;font-size:.925rem;line-height:1.8;margin-bottom:2rem}
      .mn-con-body p{margin-bottom:1rem}
      .mn-con-body strong{color:#0f172a;font-weight:600}
      .mn-steps{display:flex;flex-direction:column;gap:1rem}
      .mn-step{display:flex;align-items:flex-start;gap:1rem}
      .mn-step-num{width:36px;height:36px;border-radius:50%;background:var(--risin-green);color:#fff;font-weight:900;font-size:.875rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .mn-step-title{font-weight:700;color:#0f172a;margin-bottom:.25rem;font-size:.95rem}
      .mn-step-text{font-size:.85rem;color:#64748b;line-height:1.5}
      .mn-con-visual{position:relative}
      .mn-con-badge{background:#fff;border-radius:1rem;padding:1.5rem;box-shadow:0 8px 32px rgba(0,0,0,.12);margin-bottom:1.5rem}
      .mn-con-badge h3{font-weight:700;font-size:1.1rem;color:#0f172a;margin-bottom:.5rem}
      .mn-con-badge p{font-size:.875rem;color:#64748b;line-height:1.55}
      .mn-con-badge .mn-tag{margin-bottom:.5rem}
      .mn-vagas{padding:var(--risin-section-py) var(--risin-padding);background:#0f172a}
      .mn-vg-inner{max-width:var(--risin-max-width);margin:0 auto;text-align:center}
      .mn-vg-inner .mn-tag{color:#34d399;display:inline-block;text-align:center}
      .mn-vg-h2{font-size:clamp(2rem,4vw,3.5rem);font-weight:900;color:#f1f5f9;letter-spacing:-.02em;margin:.5rem 0 1rem;line-height:1.15}
      .mn-vg-h2 span{background:linear-gradient(135deg,var(--risin-green),var(--risin-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
      .mn-vg-sub{color:#94a3b8;max-width:540px;margin:0 auto 3rem;line-height:1.65;font-size:1.05rem}
      .mn-vg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;margin-bottom:3rem}
      .mn-vg-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:1rem;padding:2rem;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
      .mn-vg-card svg{width:32px;height:32px;stroke:#34d399;fill:none;margin-bottom:1rem}
      .mn-vg-card h3{font-weight:700;color:#f1f5f9;font-size:.95rem;margin-bottom:.5rem}
      .mn-vg-card p{font-size:.8rem;color:#94a3b8;line-height:1.5}
      .mn-vg-cta{display:inline-flex;align-items:center;gap:.75rem;padding:1rem 2.5rem;background:var(--risin-green);color:#fff;font-weight:700;font-size:1rem;border-radius:.75rem;text-decoration:none;transition:background .2s}
      .mn-vg-cta:hover{background:var(--risin-green-dark)}
      .mn-vg-cta svg{width:20px;height:20px;stroke:currentColor;fill:none}
      @@media(max-width:1200px){.mn-rev-grid{grid-template-columns:repeat(2,1fr)}}
      @@media(max-width:1024px){.mn-con-inner{grid-template-columns:1fr;gap:3rem}.mn-vg-grid{grid-template-columns:repeat(2,1fr)}}
      @@media(max-width:640px){.mn-rev-grid{grid-template-columns:1fr}.mn-vg-grid{grid-template-columns:1fr}}
      </style>
      <main>
      <section class="page-hero"><div class="grid-bg"></div><div class="orb-1"></div><div class="orb-2"></div>
      <div class="ph-container"><h1>Modelo de <span class="gradient">Neg&#243;cio</span></h1>
      <p class="ph-subtitle">Receitas recorrentes, contratos estruturados e 5.000 vagas para S&#243;cios Fundadores que querem participar da constru&#231;&#227;o da maior holding digital do Brasil.</p></div></section>
      
      <section class="mn-revenue"><div class="mn-rev-inner">
      <div class="mn-sec-hd"><span class="mn-tag">Receita</span><h2 class="mn-h2" style="margin:.5rem 0 0">4 Fontes de Receita</h2><p>Modelo de neg&#243;cio diversificado com fontes de receita complementares e recorrentes.</p></div>
      <div class="mn-rev-grid">
      <div class="mn-rev-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
      <h3>Receitas Recorrentes</h3><p>Mensalidades e assinaturas dos S&#243;cios Fundadores, regionais e empresas membros da plataforma.</p><span class="mn-rev-pct">Principal fonte</span></div>
      
      <div class="mn-rev-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>
      <h3>Comiss&#245;es por Transa&#231;&#227;o</h3><p>Percentual sobre vendas realizadas no marketplace Clikashop e demais portais transacionais.</p><span class="mn-rev-pct">Escal&#225;vel</span></div>
      
      <div class="mn-rev-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.402m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014 8.855c-.118.38-.245.754-.38 1.125m.38-1.125a23.91 23.91 0 001.014-5.395m0-3.46c.495.413.811 1.035.811 1.73 0 .695-.316 1.317-.811 1.73m0-3.46a24.347 24.347 0 010 3.46"/></svg>
      <h3>Patrocinadores e Publicidade</h3><p>Exposi&#231;&#227;o de marcas para a base de membros em todos os portais da plataforma com alto engajamento.</p><span class="mn-rev-pct">Premium</span></div>
      
      <div class="mn-rev-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0H3"/></svg>
      <h3>Licenciamentos Tecnol&#243;gicos</h3><p>Licenciamento da plataforma para terceiros e receita de API para integra&#231;&#245;es com sistemas externos.</p><span class="mn-rev-pct">Futuro</span></div>
      </div></div></section>
      
      <section class="mn-contracts"><div class="mn-con-inner">
      <div>
      <span class="mn-tag">Contratos</span><h2 class="mn-h2">Estrutura Contratual Simplificada</h2>
      <div class="mn-con-body"><p>A RISIN opera com <strong>contratos padronizados e transparentes</strong>, desenvolvidos para proteger todos os participantes do ecossistema &#8211; S&#243;cios Fundadores, regionais e empresas membros.</p><p>Todos os contratos passam por revis&#227;o jur&#237;dica especializada e est&#227;o em conformidade com o C&#243;digo Civil, Lei das Franquias e regulamenta&#231;&#245;es do setor digital.</p></div>
      <div class="mn-steps">
      <div class="mn-step"><div class="mn-step-num">1</div><div><div class="mn-step-title">Adesão ao Ecossistema</div><div class="mn-step-text">Contrato de S&#243;cio Fundador com direitos, deveres e benef&#237;cios exclusivos.</div></div></div>
      <div class="mn-step"><div class="mn-step-num">2</div><div><div class="mn-step-title">Implanta&#231;&#227;o Regional</div><div class="mn-step-text">Contrato de regional com playbook completo, suporte e exclusividade territorial.</div></div></div>
      <div class="mn-step"><div class="mn-step-num">3</div><div><div class="mn-step-title">Opera&#231;&#227;o nos Portais</div><div class="mn-step-text">Termos de uso espec&#237;ficos para cada portal com regras claras de comiss&#245;es e SLA.</div></div></div>
      <div class="mn-step"><div class="mn-step-num">4</div><div><div class="mn-step-title">Renova&#231;&#227;o e Expans&#227;o</div><div class="mn-step-text">Renova&#231;&#245;es anuais com prioridade para S&#243;cios Fundadores em novas regionais abertas.</div></div></div>
      </div></div>
      <div class="mn-con-visual">
      <div class="mn-con-badge"><span class="mn-tag">Destaque</span><h3>Contrato de S&#243;cio Fundador</h3><p>Acesso vitalício a todos os portais, participação nas decisões estratégicas, comissões diferenciadas e suporte prioritário.</p></div>
      <div class="mn-con-badge"><span class="mn-tag">Regional</span><h3>Contrato de Implanta&#231;&#227;o Regional</h3><p>Exclusividade territorial, playbook completo, treinamento inicial e suporte contínuo da equipe RISIN.</p></div>
      <div class="mn-con-badge"><span class="mn-tag">Operacional</span><h3>Termos de Uso dos Portais</h3><p>Regras transparentes de operação, comissões fixas e políticas de reembolso claramente definidas.</p></div>
      </div></div></section>
      
      <section class="mn-vagas"><div class="mn-vg-inner">
      <span class="mn-tag">Oportunidade &#218;nica</span>
      <h2 class="mn-vg-h2">5.000 Vagas<br><span>S&#243;cios Fundadores</span></h2>
      <p class="mn-vg-sub">Apenas 5.000 vagas para as primeiras regionais modelo. Seja um dos fundadores da maior plataforma digital corporativa do Brasil.</p>
      <div class="mn-vg-grid">
      <div class="mn-vg-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><h3>Acesso Vitalício</h3><p>Todos os portais da plataforma com acesso garantido mesmo ap&#243;s encerramento das vagas fundadoras.</p></div>
      <div class="mn-vg-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg><h3>Comiss&#245;es Diferenciadas</h3><p>Taxa de comiss&#227;o exclusiva para fundadores em todos os portais transacionais da plataforma.</p></div>
      <div class="mn-vg-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg><h3>Participa&#231;&#227;o Estrat&#233;gica</h3><p>Voto no Conselho Consultivo e acesso a reuni&#245;es de planejamento estrat&#233;gico trimestral.</p></div>
      <div class="mn-vg-card"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg><h3>Prioridade Regional</h3><p>Prefer&#234;ncia na abertura de novas regionais e primeiro acesso a novos portais lan&#231;ados.</p></div>
      </div>
      <a href="/contato" class="mn-vg-cta"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>Quero ser S&#243;cio Fundador</a>
      </div></section>
      </main>
  - alias: governanca
    name: "Governanca"
    path: governanca.cshtml
    masterTemplate: "master"
    update: true
    content: |
      @inherits Umbraco.Cms.Web.Common.Views.UmbracoViewPage
      @{ Layout = "master.cshtml"; }
      <style>
      .gov-tag{color:var(--risin-green);font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-size:.75rem;display:block;margin-bottom:.5rem}
      .gov-h2{font-size:clamp(1.75rem,3vw,2.5rem);font-weight:800;color:#0f172a;letter-spacing:-.02em;margin:0 0 1.5rem}
      .gov-panel{padding:var(--risin-section-py) var(--risin-padding);background:#fff}
      .gov-panel-inner{max-width:var(--risin-max-width);margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
      .gov-card{background:#f8fafc;border-radius:1rem;padding:2.5rem}
      .gov-card.dark{background:#0f172a}
      .gov-card-body{color:#475569;line-height:1.7;font-size:.925rem;margin-bottom:2rem}
      .gov-card.dark .gov-h2{color:#f1f5f9}
      .gov-card.dark .gov-tag{color:#34d399}
      .gov-card.dark .gov-card-body{color:#94a3b8}
      .gov-items{display:flex;flex-direction:column;gap:1rem}
      .gov-item{display:flex;align-items:flex-start;gap:1rem;padding:1.25rem;background:#fff;border-radius:.75rem}
      .gov-card.dark .gov-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
      .gov-item-icon{width:40px;height:40px;background:rgba(5,150,105,.1);border-radius:.5rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .gov-card.dark .gov-item-icon{background:rgba(52,211,153,.1)}
      .gov-item-icon svg{width:20px;height:20px;stroke:var(--risin-green);fill:none}
      .gov-card.dark .gov-item-icon svg{stroke:#34d399}
      .gov-item-title{font-weight:700;color:#0f172a;font-size:.95rem;margin-bottom:.2rem}
      .gov-card.dark .gov-item-title{color:#f1f5f9}
      .gov-item-text{font-size:.85rem;color:#64748b;line-height:1.5}
      .gov-card.dark .gov-item-text{color:#94a3b8}
      .gov-docs{padding:var(--risin-section-py) var(--risin-padding);background:#f8fafc}
      .gov-docs-inner{max-width:var(--risin-max-width);margin:0 auto}
      .gov-docs-hd{text-align:center;margin-bottom:3rem}
      .gov-docs-hd h2{font-size:clamp(1.5rem,2.5vw,2rem);font-weight:800;color:#0f172a;margin:.5rem 0 1rem}
      .gov-docs-hd p{color:#64748b;max-width:480px;margin:0 auto;line-height:1.6}
      .gov-docs-bar{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center}
      .gov-doc-btn{display:flex;align-items:center;gap:.75rem;padding:1rem 1.5rem;border-radius:.75rem;text-decoration:none;font-size:.9rem;font-weight:600;transition:all .2s}
      .gov-doc-btn.primary{background:var(--risin-green);color:#fff}
      .gov-doc-btn.primary:hover{background:var(--risin-green-dark)}
      .gov-doc-btn.outline{background:#fff;color:#0f172a;border:2px solid #e2e8f0}
      .gov-doc-btn.outline:hover{border-color:var(--risin-green);color:var(--risin-green)}
      .gov-doc-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;flex-shrink:0}
      .gov-compliance{padding:var(--risin-section-py) var(--risin-padding);background:#fff}
      .gov-compliance-inner{max-width:var(--risin-max-width);margin:0 auto}
      .gov-comp-hd{text-align:center;margin-bottom:3rem}
      .gov-comp-hd h2{font-size:clamp(1.5rem,2.5vw,2rem);font-weight:800;color:#0f172a;margin:.5rem 0}
      .gov-comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem}
      .gov-comp-card{background:#f8fafc;border-radius:1rem;padding:2rem;border-top:3px solid var(--risin-green)}
      .gov-comp-card svg{width:36px;height:36px;stroke:var(--risin-green);fill:none;margin-bottom:1rem}
      .gov-comp-card h3{font-size:1.05rem;font-weight:700;color:#0f172a;margin-bottom:.75rem}
      .gov-comp-card p{font-size:.875rem;color:#64748b;line-height:1.6}
      @@media(max-width:1024px){.gov-panel-inner{grid-template-columns:1fr;gap:2rem}.gov-comp-grid{grid-template-columns:1fr}}
      @@media(max-width:640px){.gov-docs-bar{flex-direction:column;align-items:stretch}.gov-doc-btn{justify-content:center}}
      </style>
      <main>
      <section class="page-hero"><div class="grid-bg"></div><div class="orb-1"></div><div class="orb-2"></div>
      <div class="ph-container"><h1><span class="gradient">Governan&#231;a</span> Corporativa</h1>
      <p class="ph-subtitle">Estrutura de governan&#231;a transparente, compliance regulat&#243;rio e documenta&#231;&#227;o institucional da plataforma RISIN.</p></div></section>
      
      <section class="gov-panel"><div class="gov-panel-inner">
      <div class="gov-card">
      <span class="gov-tag">Princ&#237;pios</span><h2 class="gov-h2">Transpar&#234;ncia e Responsabilidade</h2>
      <p class="gov-card-body">A RISIN opera com governan&#231;a estruturada garantindo direitos dos membros, transpar&#234;ncia financeira e participa&#231;&#227;o ativa na constru&#231;&#227;o da plataforma.</p>
      <div class="gov-items">
      <div class="gov-item"><div class="gov-item-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg></div>
      <div><div class="gov-item-title">Direito dos Membros</div><div class="gov-item-text">Todos os S&#243;cios Fundadores possuem acesso a informa&#231;&#245;es financeiras e estrat&#233;gicas da plataforma.</div></div></div>
      <div class="gov-item"><div class="gov-item-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg></div>
      <div><div class="gov-item-title">Transpar&#234;ncia Financeira</div><div class="gov-item-text">Relatórios peri&#243;dicos de receita, despesas e projetos disponíveis para todos os membros ativos.</div></div></div>
      <div class="gov-item"><div class="gov-item-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg></div>
      <div><div class="gov-item-title">Governan&#231;a Participativa</div><div class="gov-item-text">Conselho Consultivo com representa&#231;&#227;o de S&#243;cios Fundadores nas decis&#245;es estrat&#233;gicas.</div></div></div>
      </div></div>
      <div class="gov-card dark">
      <span class="gov-tag">Compliance</span><h2 class="gov-h2">Conformidade Regulat&#243;ria</h2>
      <p class="gov-card-body">Opera&#231;&#227;o em total conformidade com a legisla&#231;&#227;o brasileira, incluindo LGPD, direito empresarial e auditoria independente.</p>
      <div class="gov-items">
      <div class="gov-item"><div class="gov-item-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg></div>
      <div><div class="gov-item-title">LGPD &#8211; Lei Geral de Prote&#231;&#227;o de Dados</div><div class="gov-item-text">Pol&#237;ticas de privacidade e prote&#231;&#227;o de dados pessoais em conformidade com a Lei n&#186; 13.709/2018.</div></div></div>
      <div class="gov-item"><div class="gov-item-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z"/></svg></div>
      <div><div class="gov-item-title">Direito Empresarial</div><div class="gov-item-text">Estrutura jur&#237;dica robusta com contratos padronizados e assessoria jur&#237;dica especializada em direito digital.</div></div></div>
      <div class="gov-item"><div class="gov-item-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg></div>
      <div><div class="gov-item-title">Auditoria Independente</div><div class="gov-item-text">Auditoria peri&#243;dica por empresa externa garantindo integridade contábil e operacional da plataforma.</div></div></div>
      </div></div>
      </div></section>
      
      <section class="gov-compliance"><div class="gov-compliance-inner">
      <div class="gov-comp-hd"><span class="gov-tag" style="display:inline-block;text-align:center">Estrutura</span><h2>Pilares da Governan&#231;a</h2></div>
      <div class="gov-comp-grid">
